<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compute Graph Viewer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23121318'/%3E%3Ccircle cx='22' cy='32' r='8' fill='%237f55d4'/%3E%3Ccircle cx='42' cy='22' r='8' fill='%234f57c8'/%3E%3Ccircle cx='42' cy='42' r='8' fill='%235d7cc6'/%3E%3C/svg%3E">
<link rel="stylesheet" href="../css/style.css">
<style>
body.layout-page {
  position: relative;
}

body.layout-page .toolbar.layout-header {
  backdrop-filter: blur(12px);
}

body.layout-page #viewport.layout-page-canvas {
  top: auto;
  left: auto;
}

body.layout-page #colorPanel {
  width: 220px;
}

body.layout-page #colorPanel.visible {
  display: block;
}

body.layout-page #colorPanel.card-demo {
  box-shadow: var(--panel-shell-shadow);
  position: absolute;
}

body.layout-page #colorPanel .card-demo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 10px 8px;
}

body.layout-page #colorPanelToggle {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 2;
}

body.layout-page #colorPanel .card-demo-title {
  font-size: 13px;
  padding-right: 28px;
}

body.layout-page #colorPanel > .card-demo-content {
  gap: 10px;
  padding: 10px;
}

.color-panel-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.color-panel-group-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.color-panel-group-label {
  font: var(--text-label);
  color: var(--foreground-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.color-panel-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#colorPanel .cp-btn {
  width: 100%;
  min-height: 38px;
  gap: 8px;
  padding-top: 6px;
  padding-bottom: 6px;
  padding-left: 6px;
  padding-right: 8px;
}

#colorPanel .cp-btn-icon {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: color-mix(in srgb, var(--surface-1) 84%, transparent);
  border: 1px solid var(--border-default);
  color: var(--foreground-secondary);
}

#colorPanel .cp-btn-label {
  font-size: 13px;
  line-height: 1.1;
}

#colorPanel .cp-btn-sub {
  font-size: 11px;
  line-height: 1.05;
  color: rgba(255, 255, 255, 0.75);
}

#colorPanel .action-row-selected .cp-btn-icon {
  background: color-mix(in srgb, var(--surface-2) 92%, transparent) !important;
  border-color: var(--border-default) !important;
  color: var(--foreground) !important;
}

body.layout-page #colorPanel .cp-btn.is-selected .cp-btn-sub,
body.layout-page #colorPanel .cp-btn.active .cp-btn-sub,
body.layout-page #colorPanel .cp-btn.action-row-selected .cp-btn-sub {
  color: rgba(255, 255, 255, 0.75);
}

.color-panel-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding-top: 2px;
}

.color-panel-legend .legend-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  height: 24px;
  border-radius: 999px;
  border: 1px solid var(--border-subtle);
  background: color-mix(in srgb, var(--surface-1) 76%, transparent);
  color: var(--foreground-secondary);
  font: var(--text-label);
}

.color-panel-legend .legend-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  flex-shrink: 0;
}

body.layout-page #colorPanel.is-collapsed {
  width: 44px;
  min-width: 44px;
  padding: 6px;
}

body.layout-page #colorPanel.is-collapsed .card-demo-header {
  justify-content: flex-start;
  padding: 0;
  min-height: 32px;
}

body.layout-page #colorPanel.is-collapsed .card-demo-title,
body.layout-page #colorPanel.is-collapsed > .card-demo-content {
  display: none;
}

body.layout-page #colorPanel.is-collapsed .panel-toggle-collapse {
  display: none;
}

body.layout-page #colorPanel.is-collapsed .panel-toggle-expand {
  display: inline;
}

body.layout-page #minimap.layout-minimap {
  right: 16px;
  bottom: 16px;
}

body.layout-page #minimap.visible {
  display: flex;
}

body.layout-page .layout-minimap-view {
  position: relative;
  flex: 1;
  overflow: hidden;
  background: rgba(62, 62, 62, 0.96);
}

body.layout-page .layout-minimap-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  opacity: 0.45;
}

body.layout-page #minimapCanvas {
  position: absolute;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
}

body.layout-page #detailPanel.detail-panel.layout-sidepanel {
  width: min(320px, calc(100vw - 48px));
  min-height: 0;
  position: absolute;
  top: 24px;
  left: 24px;
  right: auto;
  bottom: auto;
  border-left: none;
  transform: translate3d(0, 8px, 0);
  opacity: 0;
  pointer-events: none;
  z-index: 18;
  padding: 0;
}

body.layout-page #detailPanel.detail-panel.layout-sidepanel.open {
  transform: translate3d(0, 0, 0);
  opacity: 1;
  pointer-events: auto;
}

body.layout-page #detailPanel.card-demo {
  box-shadow: var(--panel-shell-shadow);
}

body.layout-page #detailPanel .card-demo-header {
  padding: 14px 16px 12px;
}

body.layout-page #detailPanel .card-demo-content {
  gap: 14px;
  max-height: min(52vh, 440px);
  overflow-y: auto;
}

/* ── Preview 模式（iframe 嵌入，隐藏所有 UI chrome）── */
body.preview header.toolbar,
body.preview #navBar,
body.preview #cfPanel,
body.preview #colorPanel,
body.preview #minimap,
body.preview #detailPanel,
body.preview #flowPanel {
  display: none !important;
}
/* ── Embed 模式（分屏联动，隐藏重复 chrome，保留交互）── */
body.embed header.toolbar,
body.embed #minimap {
  display: none !important;
}
body.embed #colorPanel {
  top: 12px;
  right: 12px;
}
body.preview #viewport {
  top: 0 !important;
  left: 0 !important;
  transform: scale(1.5);
  transform-origin: center center;
  overflow: hidden;
}
body.preview #viewport * {
  pointer-events: none !important;
  cursor: default !important;
}
</style>
</head>
<body class="pass-ir-page layout-page">

<header class="toolbar layout-header layout-page-topbar">
  <div class="toolbar-l layout-header-left">
    <a class="home-link btn btn-ghost btn-icon" href="../launch.html" title="Back To Home" aria-label="Back To Home">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 6.2L7 2l5 4.2v5.1a.7.7 0 01-.7.7H8.6V8.9a.6.6 0 00-.6-.6H6a.6.6 0 00-.6.6V12H2.7a.7.7 0 01-.7-.7V6.2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="layout-header-brand">
      <span class="layout-header-dot"></span>
      Pass-IR
    </div>
    <button class="cf-reopen-btn" id="cfReopenBtn" title="Show Control Flow" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="2" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
        <path d="M7 5l3 2-3 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <input type="file" id="fileInput" accept=".json">
    <input type="file" id="dirInput" webkitdirectory directory multiple accept=".json">
    <div class="toolbar-sep"></div>
    <span class="graph-title" id="graphTitle"></span>
    <div class="graph-stats" id="graphStats"></div>
  </div>
  <div class="toolbar-r layout-header-right">
    <button class="btn lock-exit" id="graphLockExit" type="button" hidden aria-label="退出链路锁定" title="退出链路锁定">
      <span class="lock-exit-label" id="graphLockLabel">退出链路锁定</span>
    </button>
    <div class="graph-picker" id="graphPicker">
      <button class="btn" id="loadBtn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="1" y="1" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.7"/>
          <rect x="8" y="1" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.7"/>
          <rect x="1" y="8" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.7"/>
          <rect x="8" y="8" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.7"/>
        </svg>
        Select Graph
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none" style="opacity:0.5">
          <path d="M1.5 3l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="graph-menu" id="graphMenu">
        <button class="graph-menu-item" data-sample="samples/mini-attn.json" data-label="Mini Self-Attention">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/><rect x="7" y="1" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/><rect x="1" y="7" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/><rect x="7" y="7" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/></svg>
          Mini Self-Attention
        </button>
        <div class="graph-menu-sep"></div>
        <button class="graph-menu-item" id="graphMenuLocal">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 9.5V8l1.5-1.5H5L6 5h4.5a.5.5 0 01.5.5v4a.5.5 0 01-.5.5H1.5A.5.5 0 011 9.5z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
            <path d="M3.5 4V2.5A.5.5 0 014 2h4.5l1 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Open Local File...
        </button>
        <button class="graph-menu-item" id="graphMenuDir">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1.5 3.5h3L5.5 5H10a.5.5 0 01.5.5v4A.5.5 0 0110 10H2a.5.5 0 01-.5-.5V3.5z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 6.2h5.6M3 7.8h3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
          Open Pass Folder...
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ── Pass Nav Bar ──────────────────────────────────────────── -->
<div class="nav-bar hidden" id="navBar">
  <div class="nav-shell">
    <div class="nav-left">
      <div class="nav-pill-wrap" id="navPassWrap">
        <button class="nav-pill nav-pill-pass" id="navPassPill">
          <span id="navPassLabel">loop</span>
          <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="nav-pill-menu" id="navPassMenu"></div>
      </div>
      <div class="nav-pill-wrap" id="navPathWrap">
        <button class="nav-pill nav-pill-path" id="navPathPill">
          <span id="navPathLabel">unroll</span>
          <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="nav-pill-menu" id="navPathMenu"></div>
      </div>
      <div class="nav-pill-wrap" id="navSideWrap">
        <button class="nav-pill nav-pill-side" id="navSidePill">
          <span id="navSideLabel">After</span>
          <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="nav-pill-menu" id="navSideMenu">
          <div class="nav-pill-item active" data-value="after">After</div>
          <div class="nav-pill-item" data-value="before">Before</div>
        </div>
      </div>
    </div>
    <div class="nav-timeline-wrap" id="navTimelineWrap">
      <div class="nav-timeline" id="navTimeline"></div>
    </div>
    <div class="nav-right">
      <span class="nav-source-tag" id="navSourceTag">output_deepseek</span>
      <div class="nav-pill-wrap" id="navSnapWrap">
        <button class="nav-pill nav-pill-snap" id="navSnapPill">
          <span id="navSnapLabel">main</span>
          <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="nav-pill-menu" id="navSnapMenu"></div>
      </div>
    </div>
  </div>
</div>

<div class="cf-panel" id="cfPanel">
  <div class="cf-panel-header">
    <span class="cf-panel-title">Control Flow</span>
    <button class="cf-toggle-btn" id="cfToggle" title="Collapse panel">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <svg class="cf-mapping-svg" id="cfMappingSvg"></svg>
  <div class="cf-panel-body">
    <div class="cf-columns" id="cfColumns">
      <div class="cf-col cf-col-source" id="cfColSource">
        <div class="cf-col-label">Source .py</div>
      </div>
      <div class="cf-col cf-col-compiled" id="cfColCompiled">
        <div class="cf-col-label">Compiled PATHs</div>
      </div>
    </div>
  </div>
</div>

<div class="viewport layout-page-canvas" id="viewport">
  <div class="graph-root" id="graphRoot">
    <svg class="edges-svg" id="edgesSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow-default" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="rgba(255,255,255,0.15)"/>
        </marker>
        <marker id="arrow-incast" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="var(--incast-accent)"/>
        </marker>
        <marker id="arrow-op" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="var(--op-accent)"/>
        </marker>
        <marker id="arrow-outcast" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="var(--outcast-accent)"/>
        </marker>
      </defs>
    </svg>
    <div class="nodes-layer" id="nodesLayer"></div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-card">
      <div class="empty-icon-wrap">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="4" y="20" width="18" height="14" rx="4" fill="var(--incast-accent)" fill-opacity="0.9"/>
          <rect x="23" y="8"  width="18" height="14" rx="4" fill="var(--op-accent)"     fill-opacity="0.9"/>
          <rect x="23" y="32" width="18" height="14" rx="4" fill="var(--tensor-accent)" fill-opacity="0.9"/>
          <rect x="42" y="20" width="18" height="14" rx="4" fill="var(--outcast-accent)" fill-opacity="0.9"/>
          <path d="M22 27h1M41 27h1M32 22v-1M32 32v1" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2 class="empty-title">Compute Graph Viewer</h2>
      <p class="empty-sub">Visualize Ascend NPU computation graphs</p>
      <div class="empty-actions">
        <button class="btn btn-solid" id="emptyLoadBtn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1.5 4h4.5l1 1.5H14a.5.5 0 01.5.5v7a.5.5 0 01-.5.5H2a.5.5 0 01-.5-.5V4z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Open Pass Folder
        </button>
        <button class="btn btn-ghost" id="emptyLoadFileBtn">Open single JSON file</button>
        <div class="recent-row" id="recentRow">
          <span class="recent-label">Recent</span>
          <button class="recent-chip" id="recentChip">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span id="recentName">—</span>
          </button>
        </div>
      </div>
      <div class="sample-row">
        <span class="recent-label">Samples</span>
        <button class="recent-chip sample-chip" data-sample="samples/mini-attn.json" data-label="Mini Self-Attention">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/><rect x="7" y="1" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/><rect x="1" y="7" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/><rect x="7" y="7" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.6"/></svg>
          Mini Self-Attention
        </button>
      </div>
      <p class="empty-hint">or drag &amp; drop a .json file anywhere</p>
    </div>
  </div>

  <!-- Color panel (top-right of canvas) -->
  <div class="color-panel card-demo layout-page-inline-card" id="colorPanel">
    <div class="card-demo-header">
      <div class="card-demo-title">View Mode</div>
      <button class="panel-toggle-btn" id="colorPanelToggle" type="button" aria-label="Collapse color panel" title="Collapse">
        <span class="panel-toggle-icon panel-toggle-collapse">−</span>
        <span class="panel-toggle-icon panel-toggle-expand">+</span>
      </button>
    </div>
    <div class="card-demo-content">
      <section class="color-panel-group">
        <div class="color-panel-group-head">
          <div class="color-panel-group-label">View</div>
        </div>
        <div class="card-demo-content" style="padding:0; gap:8px; border-top:none;">
          <button class="cp-btn" data-view-mode="original" type="button" style="width:100%;">
            <span class="cp-btn-icon icon-purple">O</span>
            <span class="cp-btn-text">
              <span class="cp-btn-label">原始</span>
              <span class="cp-btn-sub">完整 node graph</span>
            </span>
          </button>
          <button class="cp-btn action-row-selected" data-view-mode="grouped" type="button" style="width:100%;">
            <span class="cp-btn-icon icon-blue">G</span>
            <span class="cp-btn-text">
              <span class="cp-btn-label">聚合</span>
              <span class="cp-btn-sub">grouped structure</span>
            </span>
          </button>
        </div>
      </section>
      <section class="color-panel-group">
        <div class="color-panel-group-head">
          <div class="color-panel-group-label">Color Mode</div>
        </div>
        <div class="card-demo-content" style="padding:0; gap:8px; border-top:none;">
          <button class="cp-btn" data-mode="semantic" type="button" style="width:100%;">
            <span class="cp-btn-icon icon-purple">S</span>
            <span class="cp-btn-text">
              <span class="cp-btn-label">Semantic</span>
              <span class="cp-btn-sub">Highlight operator and tensor semantics.</span>
            </span>
          </button>
          <button class="cp-btn action-row-selected" data-mode="latency" type="button" style="width:100%;">
            <span class="cp-btn-icon icon-blue">L</span>
            <span class="cp-btn-text">
              <span class="cp-btn-label">Latency</span>
              <span class="cp-btn-sub">Reveal hotspots by execution latency.</span>
            </span>
          </button>
          <button class="cp-btn" data-mode="subgraph" type="button" style="width:100%;">
            <span class="cp-btn-icon icon-green">C</span>
            <span class="cp-btn-text">
              <span class="cp-btn-label">Compact</span>
              <span class="cp-btn-sub">Show subgraph ownership in a denser view.</span>
            </span>
          </button>
        </div>
      </section>
      <section class="color-panel-group">
        <div class="color-panel-group-head">
          <div class="color-panel-group-label">Legend</div>
        </div>
        <div class="color-panel-legend" id="legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--incast-accent)"></span>Incast</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--op-accent)"></span>Op</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--tensor-accent)"></span>Tensor</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--outcast-accent)"></span>Outcast</span>
        </div>
      </section>
    </div>
  </div>

  <!-- Minimap with zoom controls -->
  <div class="minimap layout-minimap" id="minimap">
