<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="822" viewBox="0 118 1480 822" role="img" aria-labelledby="title desc">
  <title id="title">Ascend / CANN 典型网表图（netlistsvg 风格示意）</title>
  <desc id="desc">一个概念性的 CANN/Ascend tile 网表图，模拟 netlistsvg 的 port、cell、wire 视觉表达，并体现层次 JSON 网表到计算图的研究思想。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L6,3.5 L1,6 Z" fill="#344054"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101828; }
      .subtitle { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .cell { fill: #ffffff; stroke: #9aa7b8; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .cellHeader { fill: #e9eef7; stroke: #9aa7b8; stroke-width: 1.5; rx: 8; }
      .port { fill: #ffffff; stroke: #667085; stroke-width: 1.4; rx: 5; }
      .portIn { fill: #eef6ff; stroke: #60a5fa; }
      .portOut { fill: #f0fdf4; stroke: #34d399; }
      .wire { stroke: #344054; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .clock { stroke: #7c3aed; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .reset { stroke: #64748b; stroke-width: 1.3; fill: none; stroke-dasharray: 4 5; marker-end: url(#arrow); }
      .traffic { stroke: #f97316; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .intertile { stroke: #dc2626; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .type { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .small { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .pin { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #475467; }
      .noteBox { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.2; rx: 10; }
      .legend { fill: #ffffff; stroke: #d8e0ec; stroke-width: 1.2; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="1480" height="940"/>
  <rect class="legend" x="720" y="806" width="700" height="82"/>
  <text class="label" x="744" y="836">Legend</text>
  <line class="wire" x1="744" y1="862" x2="800" y2="862"/>
  <text class="small" x="814" y="866">control / schedule</text>
  <line class="traffic" x1="980" y1="862" x2="1036" y2="862"/>
  <text class="small" x="1050" y="866">tensor path</text>
  <line class="intertile" x1="1212" y1="862" x2="1268" y2="862"/>
  <text class="small" x="1282" y="866">inter-tile</text>

  <rect class="port portIn" x="56" y="210" width="138" height="44"/>
  <text class="pin" x="82" y="237">host_cmd</text>
  <rect class="port portIn" x="56" y="322" width="138" height="44"/>
  <text class="pin" x="92" y="349">hbm_data</text>
  <rect class="port portIn" x="56" y="486" width="138" height="44"/>
  <text class="pin" x="100" y="513">peer_in</text>
  <rect class="port portIn" x="56" y="644" width="138" height="44"/>
  <text class="pin" x="108" y="671">clk</text>
  <rect class="port portIn" x="56" y="704" width="138" height="44"/>
  <text class="pin" x="100" y="731">rst_n</text>

  <rect class="cell" x="284" y="170" width="230" height="132"/>
  <rect class="cellHeader" x="284" y="170" width="230" height="38"/>
  <text class="label" x="306" y="195">u_graph_engine</text>
  <text class="type" x="306" y="232">CANN_GRAPH_ENGINE</text>
  <text class="small" x="306" y="258">operator fusion + schedule</text>
  <text class="pin" x="306" y="282">graph_node: EquationSystemConstructor</text>

  <rect class="cell" x="284" y="332" width="230" height="118"/>
  <rect class="cellHeader" x="284" y="332" width="230" height="38"/>
  <text class="label" x="306" y="357">u_dma_hbm</text>
  <text class="type" x="306" y="394">DMA_HBM</text>
  <text class="small" x="306" y="420">memory locality / HBM read</text>

  <rect class="cell" x="616" y="332" width="230" height="132"/>
  <rect class="cellHeader" x="616" y="332" width="230" height="38"/>
  <text class="label" x="638" y="357">u_ai_core</text>
  <text class="type" x="638" y="394">AI_CORE_MATMUL</text>
  <text class="small" x="638" y="420">compute kernel</text>
  <text class="pin" x="638" y="444">graph_node: DeviceEquationBlock</text>

  <rect class="cell" x="616" y="170" width="230" height="118"/>
  <rect class="cellHeader" x="616" y="170" width="230" height="38"/>
  <text class="label" x="638" y="195">u_fusion</text>
  <text class="type" x="638" y="232">OP_FUSION</text>
  <text class="small" x="638" y="258">activation / norm / elementwise</text>

  <rect class="cell" x="948" y="332" width="230" height="132"/>
  <rect class="cellHeader" x="948" y="332" width="230" height="38"/>
  <text class="label" x="970" y="357">u_comm_reduce</text>
  <text class="type" x="970" y="394">ALLREDUCE_ENGINE</text>
  <text class="small" x="970" y="420">collective communication</text>
  <text class="pin" x="970" y="444">traffic_class: inter_tile</text>

  <rect class="cell" x="948" y="170" width="230" height="118"/>
  <rect class="cellHeader" x="948" y="170" width="230" height="38"/>
  <text class="label" x="970" y="195">u_output_mux</text>
  <text class="type" x="970" y="232">OUTPUT_MUX</text>
  <text class="small" x="970" y="258">tile output selection</text>

  <rect class="port portOut" x="1284" y="210" width="138" height="44"/>
  <text class="pin" x="1324" y="237">tile_out</text>
  <rect class="port portOut" x="1284" y="486" width="138" height="44"/>
  <text class="pin" x="1324" y="513">peer_out</text>

  <path class="wire" d="M194 232 L284 232"/>
  <text class="pin" x="210" y="220">host_cmd</text>

  <path class="wire" d="M514 232 C556 232 570 229 616 229"/>
  <text class="pin" x="536" y="219">decode_cmd</text>

  <path class="wire" d="M514 256 C556 318 568 393 616 398"/>
  <text class="pin" x="532" y="316">op_schedule</text>

  <path class="traffic" d="M194 344 L284 392"/>
  <text class="pin" x="206" y="374">hbm_data</text>

  <path class="traffic" d="M514 392 L616 398"/>
  <text class="pin" x="535" y="382">local_tensor</text>

  <path class="traffic" d="M846 398 L948 398"/>
  <text class="pin" x="870" y="388">matmul_result</text>

  <path class="traffic" d="M846 230 C890 230 904 230 948 230"/>
  <text class="pin" x="872" y="218">fusion_result</text>

  <path class="traffic" d="M846 230 C908 254 918 356 948 392"/>
  <text class="pin" x="858" y="304">fusion_result</text>

  <path class="intertile" d="M194 508 C382 508 758 508 948 426"/>
  <text class="pin" x="392" y="496">peer_in</text>

  <path class="intertile" d="M1178 426 C1222 456 1240 508 1284 508"/>
  <text class="pin" x="1210" y="496">peer_out</text>

  <path class="wire" d="M1178 232 L1284 232"/>
  <text class="pin" x="1208" y="220">tile_out</text>

  <path class="wire" d="M1178 392 C1232 350 1218 260 1178 230"/>
  <text class="pin" x="1192" y="314">reduce_payload</text>

  <path class="wire" d="M846 230 C890 190 906 190 948 204"/>
  <text class="pin" x="866" y="174">fusion_result</text>

  <path class="clock" d="M194 666 C398 666 398 302 398 302"/>
  <path class="clock" d="M194 666 C398 666 398 450 398 450"/>
  <path class="clock" d="M194 666 C730 666 730 464 730 464"/>
  <path class="clock" d="M194 666 C1063 666 1063 464 1063 464"/>
  <text class="pin" x="214" y="654">clk</text>

  <path class="reset" d="M194 726 C374 726 374 302 374 302"/>
  <path class="reset" d="M194 726 C704 726 704 464 704 464"/>
  <path class="reset" d="M194 726 C1038 726 1038 464 1038 464"/>
  <text class="pin" x="214" y="714">rst_n</text>

  <rect class="noteBox" x="56" y="806" width="632" height="82"/>
  <text class="label" x="84" y="836">Research mapping</text>
  <text class="small" x="84" y="862">层次 JSON 网表中的 cell / connection / attribute 映射为 computational graph。</text>
  <text class="small" x="84" y="884">边界：概念网表示意，不是 Ascend 910B/950 真实内部网表。</text>
</svg>
