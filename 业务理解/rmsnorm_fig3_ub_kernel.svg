<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">

  <rect width="960" height="600" fill="#f8f8f8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="15" font-weight="bold" font-family="monospace" fill="#111">UB Layout · Double Buffer · Kernel Steps</text>
  <text x="480" y="50" text-anchor="middle" font-size="10" font-family="monospace" fill="#666">based on CustVec.h (cann-recipes-infer / Qwen3 RMSNormGated)</text>

  <!-- ═══ LEFT: UB buffer layout ═══ -->

  <text x="30" y="74" font-size="11" font-weight="bold" font-family="monospace" fill="#374151">UB Buffer Layout (BASED=2048 fp32 = 8KB each)</text>

  <rect x="30" y="82" width="290" height="460" rx="6" fill="#fff" stroke="#6b7280" stroke-width="2"/>
  <text x="175" y="100" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#374151">Unified Buffer ~64 KB</text>

  <!-- fp32 left col -->
  <rect x="42" y="108" width="116" height="44" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1.4"/>
  <text x="100" y="125" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#c2410c">fp32_xbuf</text>
  <text x="100" y="140" text-anchor="middle" font-size="9" font-family="monospace" fill="#ea580c">x  8 KB</text>

  <rect x="42" y="158" width="116" height="44" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1.4"/>
  <text x="100" y="175" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#c2410c">fp32_normbuf</text>
  <text x="100" y="190" text-anchor="middle" font-size="9" font-family="monospace" fill="#ea580c">norm(x)  8 KB</text>

  <rect x="42" y="208" width="116" height="44" rx="4" fill="#fdf4ff" stroke="#c026d3" stroke-width="1.4"/>
  <text x="100" y="225" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#86198f">fp32_zbuf</text>
  <text x="100" y="240" text-anchor="middle" font-size="9" font-family="monospace" fill="#a21caf">z  8 KB</text>

  <rect x="42" y="258" width="116" height="44" rx="4" fill="#fdf4ff" stroke="#c026d3" stroke-width="1.4"/>
  <text x="100" y="275" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#86198f">fp32_silubuf</text>
  <text x="100" y="290" text-anchor="middle" font-size="9" font-family="monospace" fill="#a21caf">SiLU(z)  8 KB</text>

  <rect x="42" y="308" width="116" height="44" rx="4" fill="#fef9c3" stroke="#d97706" stroke-width="1.4"/>
  <text x="100" y="325" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#92400e">fp32_squarebuf</text>
  <text x="100" y="340" text-anchor="middle" font-size="9" font-family="monospace" fill="#b45309">x&#178;  8 KB</text>

  <rect x="42" y="358" width="116" height="36" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.4"/>
  <text x="100" y="372" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#15803d">fp32_meanbuf</text>
  <text x="100" y="386" text-anchor="middle" font-size="9" font-family="monospace" fill="#16a34a">mean  ~BASEG x 4B</text>

  <rect x="42" y="400" width="116" height="36" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.4"/>
  <text x="100" y="414" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#15803d">fp32_wbuf</text>
  <text x="100" y="428" text-anchor="middle" font-size="9" font-family="monospace" fill="#16a34a">gamma  BASED/G x 4B</text>

  <!-- bf16 right col -->
  <rect x="164" y="108" width="144" height="44" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="236" y="125" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#1d4ed8">bf16_xbuf</text>
  <text x="236" y="140" text-anchor="middle" font-size="9" font-family="monospace" fill="#2563eb">x transfer  4 KB</text>

  <rect x="164" y="158" width="144" height="44" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="236" y="175" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#1d4ed8">bf16_zbuf</text>
  <text x="236" y="190" text-anchor="middle" font-size="9" font-family="monospace" fill="#2563eb">z transfer  4 KB</text>

  <rect x="164" y="208" width="144" height="44" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="236" y="225" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#1d4ed8">bf16_outbuf</text>
  <text x="236" y="240" text-anchor="middle" font-size="9" font-family="monospace" fill="#2563eb">output  4 KB</text>

  <rect x="164" y="258" width="144" height="44" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="236" y="275" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#1d4ed8">bf16_wbuf</text>
  <text x="236" y="290" text-anchor="middle" font-size="9" font-family="monospace" fill="#2563eb">gamma  4 KB</text>

  <!-- total box -->
  <rect x="42" y="448" width="266" height="82" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="175" y="466" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#475569">Total</text>
  <text x="175" y="482" text-anchor="middle" font-size="10" font-family="monospace" fill="#64748b">fp32: 5 x 8KB + small  ~44 KB</text>
  <text x="175" y="498" text-anchor="middle" font-size="10" font-family="monospace" fill="#64748b">bf16: 4 x 4KB           ~16 KB</text>
  <text x="175" y="516" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#15803d">~60 KB  &lt;= UB  OK</text>
  <text x="175" y="530" text-anchor="middle" font-size="9" font-family="monospace" fill="#9ca3af">BASED=2048 hand-tuned by developer</text>

  <!-- ═══ MIDDLE: Double Buffer ═══ -->

  <text x="355" y="74" font-size="11" font-weight="bold" font-family="monospace" fill="#374151">Double Buffer Pipeline (DEvent)</text>

  <rect x="340" y="82" width="290" height="290" rx="6" fill="#fff" stroke="#c8c8c8" stroke-width="1.5"/>

  <!-- stream rows -->
  <text x="358" y="106" font-size="10" font-weight="bold" font-family="monospace" fill="#1d4ed8">MTE2 (copy in)</text>
  <text x="358" y="120" font-size="9" font-family="monospace" fill="#6b7280">HBM to UB</text>

  <text x="358" y="162" font-size="10" font-weight="bold" font-family="monospace" fill="#7c3aed">Vector (compute)</text>
  <text x="358" y="176" font-size="9" font-family="monospace" fill="#6b7280">in UB</text>

  <text x="358" y="218" font-size="10" font-weight="bold" font-family="monospace" fill="#15803d">MTE3 (copy out)</text>
  <text x="358" y="232" font-size="9" font-family="monospace" fill="#6b7280">UB to HBM</text>

  <!-- tile A -->
  <rect x="446" y="94" width="78" height="28" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="485" y="112" text-anchor="middle" font-size="9" font-family="monospace" fill="#1d4ed8">tile A  cnt=0</text>

  <rect x="446" y="150" width="78" height="28" rx="3" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="485" y="168" text-anchor="middle" font-size="9" font-family="monospace" fill="#6d28d9">compute A</text>

  <rect x="446" y="206" width="78" height="28" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="485" y="224" text-anchor="middle" font-size="9" font-family="monospace" fill="#15803d">write A</text>

  <!-- tile B -->
  <rect x="534" y="94" width="78" height="28" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="573" y="112" text-anchor="middle" font-size="9" font-family="monospace" fill="#1d4ed8">tile B  cnt=1</text>

  <rect x="534" y="150" width="78" height="28" rx="3" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="573" y="168" text-anchor="middle" font-size="9" font-family="monospace" fill="#6d28d9">compute B</text>

  <rect x="534" y="206" width="78" height="28" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="573" y="224" text-anchor="middle" font-size="9" font-family="monospace" fill="#15803d">write B</text>

  <!-- guide lines -->
  <line x1="444" y1="90" x2="444" y2="242" stroke="#e2e8f0" stroke-dasharray="3,2"/>
  <line x1="532" y1="90" x2="532" y2="242" stroke="#e2e8f0" stroke-dasharray="3,2"/>
  <line x1="614" y1="90" x2="614" y2="242" stroke="#e2e8f0" stroke-dasharray="3,2"/>

  <!-- DEvent legend -->
  <rect x="342" y="252" width="286" height="112" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="485" y="270" text-anchor="middle" font-size="10" font-weight="bold" font-family="monospace" fill="#475569">4 DEvent controls</text>
  <text x="356" y="290" font-size="10" font-family="monospace" fill="#1d4ed8">in_ready</text>
  <text x="430" y="290" font-size="9" font-family="monospace" fill="#64748b">MTE2-&gt;Vec: copy done</text>
  <text x="356" y="308" font-size="10" font-family="monospace" fill="#1d4ed8">in_empty</text>
  <text x="430" y="308" font-size="9" font-family="monospace" fill="#64748b">Vec-&gt;MTE2: buf free</text>
  <text x="356" y="326" font-size="10" font-family="monospace" fill="#15803d">out_ready</text>
  <text x="430" y="326" font-size="9" font-family="monospace" fill="#64748b">Vec-&gt;MTE3: result ready</text>
  <text x="356" y="344" font-size="10" font-family="monospace" fill="#15803d">out_empty</text>
  <text x="430" y="344" font-size="9" font-family="monospace" fill="#64748b">MTE3-&gt;Vec: buf free</text>
  <text x="485" y="358" text-anchor="middle" font-size="9" font-family="monospace" fill="#9ca3af">cnt switches 0/1 (ping-pong)</text>

  <!-- Tiling params box -->
  <text x="355" y="398" font-size="11" font-weight="bold" font-family="monospace" fill="#374151">Tiling Parameters</text>

  <rect x="340" y="408" width="290" height="150" rx="6" fill="#fff" stroke="#c8c8c8" stroke-width="1.5"/>

  <line x1="340" y1="426" x2="630" y2="426" stroke="#e2e8f0"/>
  <text x="356" y="442" font-size="10" font-family="monospace" fill="#64748b">BASED</text>
  <text x="485" y="442" text-anchor="middle" font-size="10" font-family="monospace" fill="#111">= 2048  (8KB, hardcoded)</text>

  <line x1="340" y1="450" x2="630" y2="450" stroke="#e2e8f0"/>
  <text x="356" y="466" font-size="10" font-family="monospace" fill="#64748b">BASEG</text>
  <text x="485" y="466" text-anchor="middle" font-size="10" font-family="monospace" fill="#111">= BASED / group_size</text>

  <line x1="340" y1="474" x2="630" y2="474" stroke="#e2e8f0"/>
  <text x="356" y="490" font-size="10" font-family="monospace" fill="#64748b">loopnum</text>
  <text x="485" y="490" text-anchor="middle" font-size="10" font-family="monospace" fill="#111">= ceil(B*S / (Cores*2))</text>

  <line x1="340" y1="498" x2="630" y2="498" stroke="#e2e8f0"/>
  <text x="356" y="514" font-size="10" font-family="monospace" fill="#64748b">vec_d</text>
  <text x="485" y="514" text-anchor="middle" font-size="10" font-family="monospace" fill="#111">= loopnum * D</text>

  <line x1="340" y1="522" x2="630" y2="522" stroke="#e2e8f0"/>
  <text x="356" y="538" font-size="10" font-family="monospace" fill="#64748b">*2 reason</text>
  <text x="485" y="538" text-anchor="middle" font-size="10" font-family="monospace" fill="#111">double buffer: 2 rows/iter</text>

  <text x="485" y="553" text-anchor="middle" font-size="9" font-family="monospace" fill="#9ca3af">src: CustVec.h tilingShapeCustVec()</text>

  <!-- ═══ RIGHT: compute steps ═══ -->

  <text x="660" y="74" font-size="11" font-weight="bold" font-family="monospace" fill="#374151">Process_calc Steps</text>

  <rect x="648" y="82" width="292" height="478" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1.5"/>

  <text x="664" y="106" font-size="10" font-weight="bold" font-family="monospace" fill="#a6e3a1">// Step 1: RMSNorm(x)</text>

  <text x="664" y="124" font-size="10" font-family="monospace" fill="#cdd6f4">Mul(sqbuf, x, x)</text>
  <text x="664" y="138" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; x squared</text>

  <text x="664" y="156" font-size="10" font-family="monospace" fill="#cdd6f4">ReduceSum(meanbuf, sqbuf,</text>
  <text x="664" y="170" font-size="10" font-family="monospace" fill="#cdd6f4">          group_size)</text>
  <text x="664" y="184" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; sum per group (not full row)</text>

  <text x="664" y="202" font-size="10" font-family="monospace" fill="#cdd6f4">Muls(mean, 1.0/group_size)</text>
  <text x="664" y="216" font-size="10" font-family="monospace" fill="#cdd6f4">Adds(mean, eps)</text>
  <text x="664" y="230" font-size="10" font-family="monospace" fill="#cdd6f4">Sqrt(mean)</text>
  <text x="664" y="244" font-size="10" font-family="monospace" fill="#cdd6f4">Div(mean, 1.0, mean)</text>
  <text x="664" y="258" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; rstd = 1/sqrt(mean+eps)</text>

  <text x="664" y="276" font-size="10" font-family="monospace" fill="#cdd6f4">Brcb(normscale, mean)</text>
  <text x="664" y="290" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; broadcast rstd to each elem</text>

  <text x="664" y="308" font-size="10" font-family="monospace" fill="#cdd6f4">Mul(normbuf, normscale, x)</text>
  <text x="664" y="322" font-size="10" font-family="monospace" fill="#cdd6f4">Mul(normbuf, normbuf, gamma)</text>
  <text x="664" y="336" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; norm_x * gamma</text>

  <line x1="650" y1="350" x2="938" y2="350" stroke="#313244"/>
  <text x="664" y="368" font-size="10" font-weight="bold" font-family="monospace" fill="#cba6f7">// Step 2: SiLU(z)</text>

  <text x="664" y="386" font-size="10" font-family="monospace" fill="#cdd6f4">Muls(silu, z, -1.0)</text>
  <text x="664" y="400" font-size="10" font-family="monospace" fill="#cdd6f4">Exp(silu)</text>
  <text x="664" y="414" font-size="10" font-family="monospace" fill="#cdd6f4">Adds(silu, 1.0)</text>
  <text x="664" y="428" font-size="10" font-family="monospace" fill="#cdd6f4">Div(silu, 1.0, silu)</text>
  <text x="664" y="442" font-size="10" font-family="monospace" fill="#cdd6f4">Mul(silu, silu, z)</text>
  <text x="664" y="456" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; z / (1 + exp(-z))</text>

  <line x1="650" y1="470" x2="938" y2="470" stroke="#313244"/>
  <text x="664" y="488" font-size="10" font-weight="bold" font-family="monospace" fill="#f9e2af">// Step 3: output</text>
  <text x="664" y="506" font-size="10" font-family="monospace" fill="#cdd6f4">Mul(out, normbuf, silubuf)</text>
  <text x="664" y="520" font-size="9" font-family="monospace" fill="#6c7086">  -&gt; norm_x * SiLU(z)</text>

  <text x="664" y="542" font-size="9" font-family="monospace" fill="#a6e3a1">Group reduce: no 2-pass needed</text>
  <text x="664" y="555" font-size="9" font-family="monospace" fill="#a6e3a1">single pass, no re-read of x</text>

</svg>
