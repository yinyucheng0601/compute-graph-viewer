<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Prototype Lab</title>
  <link rel="stylesheet" href="./styles.css?v=20260317a">
</head>
<body>
  <div class="app-shell">
    <header class="toolbar">
      <div class="toolbar-group">
        <a href="../launch.html" class="toolbar-btn toolbar-home" title="Back to Launcher">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M1 7L7 1.5L13 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 5.5V12.5H11V5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div id="toolbarGraphName" class="toolbar-graph-name">Loading…</div>
      </div>
      <div class="toolbar-group toolbar-controls">
        <label class="toolbar-field">
          <span>Sample</span>
          <select id="sampleSelect"></select>
        </label>
        <label class="toolbar-field" id="realPassField">
          <span>Real File</span>
          <select id="realPassSelect"></select>
        </label>
        <div class="toolbar-field">
          <div class="segmented">
            <button type="button" class="segmented-btn" data-direction="TB" title="竖排（上→下）">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <rect x="4" y="1" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.2"/>
                <rect x="4" y="9" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.2"/>
                <line x1="7" y1="5" x2="7" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <polyline points="5.5,7.5 7,9 8.5,7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </button>
            <button type="button" class="segmented-btn" data-direction="LR" title="横排（左→右）">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <rect x="1" y="4" width="4" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
                <rect x="9" y="4" width="4" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
                <line x1="5" y1="7" x2="9" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <polyline points="7.5,5.5 9,7 7.5,8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </button>
          </div>
        </div>
        <label class="toolbar-field">
          <span>Tensors</span>
          <select id="tensorModeSelect">
            <option value="auto">Auto</option>
            <option value="nodes">Nodes</option>
            <option value="edges">Edge Data</option>
          </select>
        </label>
        <button type="button" id="fitBtn" class="toolbar-btn">Fit</button>
        <button type="button" id="reloadBtn" class="toolbar-btn">Reload</button>
      </div>
    </header>

    <main class="workspace">
      <section class="canvas-panel">
        <div class="canvas-meta">
          <div id="statsMeta" class="meta-secondary"></div>
        </div>
<div class="canvas-stage" id="canvasStage">
          <svg id="graphSvg" class="graph-svg" aria-label="graph canvas"></svg>
          <div id="emptyState" class="empty-state" hidden>
            <div class="empty-title">No graph loaded</div>
            <div class="empty-copy">Choose a sample to start the prototype.</div>
          </div>
        </div>
      </section>

      <aside class="detail-panel" id="detailPanel">
        <div class="detail-head">
          <div class="detail-title">Inspector</div>
          <div class="detail-head-right">
            <div id="detailKind" class="detail-kind">-</div>
            <button id="detailClose" class="detail-close" aria-label="Close inspector">✕</button>
          </div>
        </div>
        <div id="detailSummary" class="detail-summary">Select a node or edge label.</div>
        <div id="detailBody" class="detail-body"></div>
      </aside>
    </main>
  </div>

  <script src="./vendor/dagre.min.js"></script>
  <script type="module" src="./app.js?v=20260317a"></script>
</body>
</html>
