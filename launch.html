<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compute Graph 项目启动页</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23121318'/%3E%3Ccircle cx='22' cy='32' r='8' fill='%237f55d4'/%3E%3Ccircle cx='42' cy='22' r='8' fill='%234f57c8'/%3E%3Ccircle cx='42' cy='42' r='8' fill='%235d7cc6'/%3E%3C/svg%3E">
<style>
:root {
  --bg-0: #1a1b1f;
  --bg-1: #121318;
  --card-bg: rgba(21, 22, 28, 0.9);
  --card-border: rgba(255, 255, 255, 0.14);
  --text-main: #f5f6f8;
  --text-sub: rgba(245, 246, 248, 0.66);
  --btn-primary-a: #7f55d4;
  --btn-primary-b: #6a4fc4;
  --btn-primary-c: #4f57c8;
  --btn-primary-d: #5d7cc6;
  --btn-disabled-a: rgba(142, 142, 142, 0.26);
  --btn-disabled-b: rgba(90, 90, 90, 0.26);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  color: var(--text-main);
  background: #202020;
}

.page {
  min-height: 100vh;
  padding: 24px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-grid {
  width: min(1100px, 100%);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  justify-content: center;
  gap: 16px;
}

.card {
  width: 100%;
  min-height: 260px;
  border: 1px solid var(--card-border);
  border-radius: 24px;
  background: var(--card-bg);
  padding: 24px 20px 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  transition: transform 180ms ease, border-color 180ms ease;
}

.card:hover {
  transform: translateY(-2px);
  border-color: rgba(255, 255, 255, 0.22);
}

.card-title {
  margin: 0;
  font-family: "PingFang SC", sans-serif;
  font-size: 20px;
  font-weight: 520;
  line-height: 1.2;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge-beta {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.10);
  border: 1px solid rgba(255, 255, 255, 0.18);
  color: rgba(245, 246, 248, 0.60);
  flex-shrink: 0;
  align-self: center;
  line-height: 1.4;
}

.card-desc {
  margin: 16px 0 0;
  color: var(--text-sub);
  font-size: 14px;
  line-height: 1.5;
  min-height: 78px;
}

.actions {
  margin-top: auto;
  display: grid;
  gap: 10px;
}

/* Keep colored CTA at the bottom across all cards */
.actions .btn-secondary {
  order: 1;
}

.actions .btn-primary {
  order: 2;
}

.btn {
  height: 36px;
  width: 100%;
  border-radius: 18px;
  border: 1px solid transparent;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  line-height: 1;
  transition: transform 160ms ease, filter 160ms ease, border-color 160ms ease;
  cursor: pointer;
  user-select: none;
}

.btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.04);
}

.btn:active {
  transform: translateY(0);
}

.btn-primary {
  color: #f6f4ff;
  background: linear-gradient(90deg, var(--btn-primary-a), var(--btn-primary-b));
}

.btn-primary.alt {
  background: linear-gradient(90deg, var(--btn-primary-c), var(--btn-primary-d));
}

.btn-secondary {
  color: rgba(245, 246, 248, 0.92);
  border-color: rgba(255, 255, 255, 0.17);
  background: rgba(12, 13, 18, 0.45);
}

.btn[aria-disabled="true"],
.btn.is-disabled {
  cursor: not-allowed;
  pointer-events: none;
  color: rgba(255, 255, 255, 0.34);
  border-color: rgba(255, 255, 255, 0.16);
  background: linear-gradient(90deg, var(--btn-disabled-a), var(--btn-disabled-b));
  filter: grayscale(0.28);
}

.btn-secondary.is-disabled {
  background: rgba(17, 18, 24, 0.45);
}

@media (max-width: 1200px) {
  .page {
    padding: 24px 16px;
  }

  .card-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 760px) {
  .page {
    padding: 28px 14px;
  }

  .card-grid {
    grid-template-columns: 1fr;
    gap: 14px;
    justify-items: center;
  }

  .card {
    width: 100%;
    max-width: 320px;
    height: auto;
    min-height: 220px;
    border-radius: 20px;
    padding: 20px 16px 16px;
  }

  .card-title {
    font-size: 20px;
  }

  .card-desc {
    margin-top: 14px;
    font-size: 14px;
    min-height: 60px;
  }

  .actions {
    gap: 8px;
  }

  .btn {
    height: 40px;
    border-radius: 20px;
    font-size: 15px;
  }
}
</style>
</head>
<body>
<main class="page">
  <section class="card-grid" aria-label="项目入口导航">
    <article class="card">
      <h2 class="card-title">Pass IR计算图</h2>
      <p class="card-desc">查看节点/连线/详情面板/Pass 导航条/节点聚类视图/锁定一条计算流</p>
      <div class="actions">
        <a class="btn btn-primary alt" href="index.html?file=deepseek_out_pass/After_000_RemoveRedundantReshape_TENSOR_LOOP_RESHAPE_Unroll1_PATH0_4.json">查看sample</a>
        <button class="btn btn-secondary" id="openProjectFolderBtn" type="button">选择文件夹</button>
        <a class="btn btn-secondary" href="index.html?action=open-file">选择本地文件（.json）</a>
      </div>
    </article>

    <article class="card">
      <h2 class="card-title">大模型整网架构</h2>
      <p class="card-desc">DeepSeek V3模型交互式浏览：L1 整网模型架构 → L2 融合算子 → L3 基础算子</p>
      <div class="actions">
        <a class="btn btn-primary" href="mvp/index.html">查看 DeepSeek V3</a>
        <a class="btn btn-secondary" href="test/index.html">Test Model</a>
      </div>
    </article>

    <article class="card">
      <h2 class="card-title">源码计算流 <span class="badge-beta">beta</span></h2>
      <p class="card-desc">从算子Python源码得到计算路径、数据依赖与分块循环。</p>
      <div class="actions">
        <a class="btn btn-primary" href="visual-test.html">查看sample</a>
        <button class="btn btn-secondary" id="openPyFileBtn" type="button">选择本地文件（.py）</button>
        <input type="file" id="pyFileInput" accept=".py" style="display:none;">
      </div>
    </article>

  </section>
</main>
<script>
(function () {
  const openProjectFolderBtn = document.getElementById('openProjectFolderBtn');
  const BRIDGE_DB = 'pto-launch-bridge';
  const BRIDGE_STORE = 'pending-dir-handles';

  function openBridgeDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(BRIDGE_DB, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(BRIDGE_STORE)) {
          db.createObjectStore(BRIDGE_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveDirHandle(handle) {
    const token = `dir_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    const db = await openBridgeDb();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(BRIDGE_STORE, 'readwrite');
      tx.objectStore(BRIDGE_STORE).put(handle, token);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });
    db.close();
    return token;
  }

  async function openFolderFromLauncher() {
    if (!window.showDirectoryPicker) {
      location.href = 'index.html?action=open-folder';
      return;
    }
    try {
      const dirHandle = await window.showDirectoryPicker({ id: 'pto-pass-folder' });
      const token = await saveDirHandle(dirHandle);
      location.href = `index.html?action=consume-folder&token=${encodeURIComponent(token)}`;
    } catch (err) {
      if (err?.name !== 'AbortError') {
        console.error('Launch folder picker failed:', err);
        alert('Failed to open folder picker.');
      }
    }
  }

  openProjectFolderBtn?.addEventListener('click', openFolderFromLauncher);

  // Python file picker for visual-test.html
  const openPyFileBtn = document.getElementById('openPyFileBtn');
  const pyFileInput = document.getElementById('pyFileInput');

  openPyFileBtn?.addEventListener('click', () => {
    pyFileInput?.click();
  });

  pyFileInput?.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (file) {
      try {
        const text = await file.text();
        sessionStorage.setItem('vtSelectedFile', JSON.stringify({
          name: file.name,
          size: file.size,
          type: file.type,
          lastModified: file.lastModified
        }));
        sessionStorage.setItem('vtSelectedFileText', text);
        location.href = 'visual-test.html?action=open-py-file';
      } catch (err) {
        console.error('Failed to read Python source file:', err);
        alert('Failed to read the selected .py file.');
      }
    }
    // Reset input to allow selecting the same file again
    pyFileInput.value = '';
  });
})();
</script>
</body>
</html>
