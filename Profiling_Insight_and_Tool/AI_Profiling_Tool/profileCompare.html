<!doctype html>
<!--
  PyPTO 泳道分析器 — Mix 子图核间同步稳定演示版
  课题: 04-uxdesign/02-swimlane-profiler/ux-analysis.md (Issue #1121)

  数据等级: L2 / schema-generated / share-safe
    - task literal、schema 与数量级来自登记 L1 来源；组合关系与诊断异常为可追溯 L2 构造。
    - 三条 run 分别由同步竞争、调度空泡、FFN 流水失衡构造器生成；
      每条 run 只承载该场景需要验证的性能特征，不把全部问题拼成一次伪运行。
  分享级别: exploration-only (不可外发)

  设计系统: 复用 compute-graph-viewer/vendor/pto-design-system bundle
    - css/style.css + patterns/ide-frame + patterns/workbench-shell —— 运行时加载
    - patterns/swimlane-task/pattern.js —— 运行时加载, task bar 经 drawTaskBar 渲染
    - 共享组件类: .btn / .btn-ghost / .segmented-control / .stat-chip / .pto-ide-frame__*
    - 同步弧线 / 等待段斜纹 / mix group 配色 属 data-viz exempt
-->

/* ── 对比双方左右卡片 ── */
.sl-compare-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3);
  margin-bottom: var(--space-3);
}
.sl-compare-card {
  position: relative;
  display: flex; flex-direction: column;
  border-radius: var(--radius-lg); overflow: hidden;
  background: var(--surface-2);
}
.sl-compare-card__head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px 0;
}
.sl-compare-card__dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sl-compare-card__name {
  flex: 1 1 auto; min-width: 0;
  padding: 2px 0;
  font: 500 12px / 1.35 var(--font-mono); color: var(--foreground);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sl-compare-card__badge {
  position: absolute; top: 0; right: 0; z-index: 2;
  font-size: 7px; font-family: var(--font-mono); font-weight: 600;
  padding: 1px 5px 2px 6px;
  border-radius: 0 var(--radius-lg) 0 var(--radius-lg);
  background: color-mix(in srgb, var(--accent) 85%, var(--foreground));
  color: var(--background);
  pointer-events: none;
}
/* 缩小版仪表盘 */
.sl-compare-card__gauge {
  position: relative; width: 100%; height: 144px;
}
.sl-compare-card__gauge svg {
  display: block; width: 100%; height: 100%; overflow: visible;
}
.sl-compare-gauge-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transform: translateY(8%);
  pointer-events: none; text-align: center;
}
.sl-compare-gauge-grade {
  font-size: 10px; font-weight: 700; line-height: 1;
  padding: 2px 8px; border-radius: 999px; margin-bottom: 2px;
}
.sl-compare-gauge-score {
  font-size: 26px; font-weight: 700; line-height: 1.04;
  font-family: var(--font-sans); letter-spacing: -0.5px;
}
.sl-compare-gauge-sub {
  font-size: 10px; color: var(--foreground-muted); margin-top: 2px;
  display: flex; align-items: center; gap: 4px;
}
.sl-compare-gauge-sub b { color: var(--foreground-secondary); font-weight: 600; }
.sl-compare-gauge-estbadge {
  font-size: 9px; font-weight: 700; line-height: 1.4;
  padding: 1px 6px; border-radius: 999px;
}

/* ── 跨栏 Bezier 连线（SVG overlay，白色曲线，高层级）── */
#crossLaneSvgOverlay {
  position: absolute; inset: 0; z-index: 200; pointer-events: none;
}
#crossLaneSvgOverlay line,
#crossLaneSvgOverlay path {
  stroke: rgba(255, 255, 255, 0.85);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
}

/* ── 对比详情（下钻视图）── */
.sl-detail-back {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; padding: 0; margin-right: 6px; flex-shrink: 0;
  border: 0; border-radius: var(--radius-sm);
  background: transparent; color: var(--foreground-muted); cursor: pointer;
  line-height: 1; vertical-align: middle;
}
.sl-detail-back:hover { background: var(--state-hover); color: var(--foreground); }
.sl-detail-back svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.sl-detail-meta { display: flex; flex-direction: column; gap: 2px; }
.sl-detail-meta__row { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; font: var(--text-body-sm); }
.sl-detail-meta__row + .sl-detail-meta__row { border-top: 1px solid var(--border-subtle); }
.sl-detail-meta__key { color: var(--foreground-secondary); flex-shrink: 0; }
.sl-detail-meta__val { color: var(--foreground); text-align: right; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sl-detail-meta__val.monospace { font-family: var(--font-mono); }

/* 对比详情：三列表格（行高缩小、表头自适应） */
.sl-detail-compare { display: flex; flex-direction: column; }
.sl-detail-compare__head,
.sl-detail-compare__row {
  display: grid;
  grid-template-columns: minmax(72px, 1fr) 1fr 1fr;
  align-items: center; gap: 4px;
}
.sl-detail-compare__head {
  padding: 4px 0 6px;
  border-bottom: 1px solid var(--border-default);
}
.sl-detail-compare__row {
  padding: 3px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.sl-detail-compare__col {
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sl-detail-compare__col--label {
  font: 500 11px / 1.3 var(--font-sans); color: var(--foreground-secondary);
}
.sl-detail-compare__col--top,
.sl-detail-compare__col--bottom {
  font: 500 11px / 1.35 var(--font-mono); color: var(--foreground);
  text-align: right;
}
.sl-detail-compare__col--top.is-better {
  color: var(--success); font-weight: 700;
}
.sl-detail-compare__col--bottom.is-better {
  color: var(--success); font-weight: 700;
}
.sl-detail-compare__head .sl-detail-compare__col--label {
  font: 500 10px / 1.25 var(--font-sans); color: var(--foreground-muted);
}
.sl-detail-compare__head .sl-detail-compare__col--top,
.sl-detail-compare__head .sl-detail-compare__col--bottom {
  font: 500 10px / 1.25 var(--font-sans); color: var(--foreground-muted);
  text-align: right; gap: 4px;
}
/* 表头行用 flex 承载 dot + 截断名称 */
.sl-detail-compare__head .sl-detail-compare__col--top,
.sl-detail-compare__head .sl-detail-compare__col--bottom {
  display: flex; align-items: center; justify-content: flex-end; gap: 4px;
  min-width: 0; overflow: hidden;
}
.sl-detail-compare__head .sl-detail-compare__col--top .sl-detail-compare__dot,
.sl-detail-compare__head .sl-detail-compare__col--bottom .sl-detail-compare__dot {
  flex-shrink: 0;
}
.sl-detail-compare__head .sl-detail-compare__col--top span:last-child,
.sl-detail-compare__head .sl-detail-compare__col--bottom span:last-child {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
.sl-detail-compare__dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}

/* ── 关联代码面板（底部栏保留，不在点击任务时自动展开）── */
.sl-code-view {
  display: flex; flex-direction: column; height: 100%; overflow: auto;
  font-family: 'Cascadia Code', 'Consolas', 'SF Mono', 'Menlo', 'Monaco', 'Courier New', var(--font-mono), monospace;
  font-size: 12px; line-height: 1.55;
  background: var(--surface-1);
}
.sl-code-view__header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; flex: 0 0 auto;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-2);
}
.sl-code-view__filename {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; color: var(--foreground);
}
.sl-code-view__filename svg {
  width: 15px; height: 15px; fill: none; stroke: var(--foreground-muted); stroke-width: 1.8;
}
.sl-code-view__lines {
  counter-reset: codeline;
  flex: 1 1 auto; overflow: auto;
  padding: 6px 0;
}

/* ── 内联代码块（嵌入右侧 inspector 面板，紧凑版）── */
.sl-inline-code {
  display: flex; flex-direction: column;
  max-height: 340px; overflow: hidden;
  border-radius: var(--radius-md);
  background: var(--surface-1);
  font-family: 'Cascadia Code', 'Consolas', 'SF Mono', 'Menlo', 'Monaco', 'Courier New', var(--font-mono), monospace;
  font-size: 11px; line-height: 1.5;
}
.sl-inline-code__header {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px; flex: 0 0 auto;
  border-bottom: 1px solid var(--border-subtle);
}
.sl-inline-code__icon {
  width: 13px; height: 13px; flex-shrink: 0;
  fill: none; stroke: var(--foreground-muted); stroke-width: 1.8;
}
.sl-inline-code__filename {
  font-size: 11px; font-weight: 600; color: var(--foreground-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sl-inline-code__lines {
  counter-reset: codeline;
  overflow-y: auto; flex: 1 1 auto;
  padding: 4px 0;
}
/* 代码行：允许折行，避免横向滚动条 */
.sl-inline-code__lines .sl-code-line__text {
  white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
}

/* ── 面板滚动条柔化（inspector / 代码块 / 对比表格区域共享）── */
.sl-insp-body::-webkit-scrollbar,
.sl-inline-code__lines::-webkit-scrollbar,
.sl-detail-compare::-webkit-scrollbar {
  width: 5px; height: 5px;
}
.sl-insp-body::-webkit-scrollbar-track,
.sl-inline-code__lines::-webkit-scrollbar-track,
.sl-detail-compare::-webkit-scrollbar-track {
  background: transparent;
}
.sl-insp-body::-webkit-scrollbar-thumb,
.sl-inline-code__lines::-webkit-scrollbar-thumb,
.sl-detail-compare::-webkit-scrollbar-thumb {
  background: color-mix(in srgb, var(--foreground) 18%, transparent);
  border-radius: 999px;
}
.sl-insp-body::-webkit-scrollbar-thumb:hover,
.sl-inline-code__lines::-webkit-scrollbar-thumb:hover,
.sl-detail-compare::-webkit-scrollbar-thumb:hover {
  background: color-mix(in srgb, var(--foreground) 30%, transparent);
}
/* Firefox 滚动条 */
.sl-insp-body,
.sl-inline-code__lines,
.sl-detail-compare {
  scrollbar-width: thin;
  scrollbar-color: color-mix(in srgb, var(--foreground) 18%, transparent) transparent;
}

/* ── 语义标签：渐变填充 pill（与被选节点颜色一致，圆角与泳道任务条一致）── */
.sl-detail-label-pill {
  display: inline-flex; align-items: center;
  height: 18px; padding: 0 8px; border-radius: 3px;
  font-size: 10px; font-weight: 700; line-height: 1;
  color: #fff; white-space: nowrap;
  background: #5A92E6;
}
.sl-code-line {
  display: flex; min-height: 18px;
  padding: 0 12px;
  counter-increment: codeline;
}
.sl-code-line::before {
  content: counter(codeline);
  flex: 0 0 46px; text-align: right; padding-right: 14px;
  color: var(--foreground-disabled); font-size: 11px; user-select: none;
}
.sl-code-line__text {
  flex: 1 1 auto; white-space: pre; overflow-x: auto; color: var(--foreground-secondary);
}
/* syntax highlight token */
.sl-code-line .k { color: #c586c0; }   /* keyword */
.sl-code-line .f { color: #dcdcaa; }   /* function */
.sl-code-line .s { color: #ce9178; }   /* string */
.sl-code-line .c { color: #6a9955; font-style: italic; }  /* comment */
.sl-code-line .n { color: #9cdcfe; }   /* number / literal */
.sl-code-line .t { color: #4ec9b0; }   /* type */
.sl-code-line .p { color: #808080; }   /* punctuation */
.sl-code-line .v { color: #569cd6; }   /* variable / pragma */
/* highlighted key line */
.sl-code-line.is-key {
  background: color-mix(in srgb, var(--warning) 18%, transparent);
}
.sl-code-line.is-key::before {
  color: var(--warning); font-weight: 700;
}
.sl-code-line.is-key .sl-code-line__text {
  color: var(--foreground);
}

.sl-top-task {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  background: var(--surface-2);
  cursor: pointer;
  transition: background var(--duration-fast) var(--easing-default);
}

.sl-top-task:hover,
.sl-top-task.is-active {
  background: var(--surface-3);
}

.sl-top-task.is-active {
  background: color-mix(in srgb, var(--warning) 10%, var(--surface-3));
}

.sl-top-task__top,
.sl-top-task__row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}

.sl-top-task__id {
  min-width: 0;
  overflow: hidden;
  color: var(--foreground);
  font: 500 12px / 1.4 var(--font-mono);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sl-top-task__row {
  color: var(--foreground-secondary);
  font: 500 11px / 1.2 var(--font-sans);
}

.sl-top-task__row .v {
  color: var(--foreground);
  font-family: var(--font-mono);
}

.sl-top-task__sub {
  color: var(--foreground-muted);
  font: var(--text-body-sm);
  line-height: 1.45;
}

.sl-task-detail-head {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: var(--space-2);
}

.sl-task-back {
  gap: 5px;
  min-height: 24px;
  padding-inline: 0 var(--space-2);
}

.sl-task-back svg {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.sl-task-detail-title {
  min-width: 0;
  overflow: hidden;
  color: var(--foreground);
  font: var(--text-title-2);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sl-task-summary {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}

.sl-task-basic-card {
  gap: 0;
}

.sl-task-basic-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  margin-top: var(--space-2);
}

.sl-task-connection-control {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px solid var(--border-subtle);
}

.sl-task-connection-control__copy {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.sl-task-connection-control__title {
  color: var(--foreground);
  font-family: var(--font-sans);
  font-size: var(--font-size-label-xs);
  font-weight: var(--font-weight-medium);
  line-height: var(--line-height-label);
  letter-spacing: var(--letter-spacing-label);
}

.sl-task-connection-control__hint {
  color: var(--foreground-muted);
  font: var(--text-body-sm);
}

.sl-object-path {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sl-object-path__item {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sl-object-path__item:not(.is-current) {
  color: var(--foreground-secondary);
  cursor: pointer;
}

.sl-object-path__sep {
  flex: none;
  color: var(--foreground-disabled);
}

.sl-task-tab-panel > .sl-insp-section:first-child {
  margin-top: 0;
}

#globalRulerTicks {
  position: absolute;
  inset: 0;
}

.sl-global-ruler__tick {
  position: absolute;
  top: 10px;
  bottom: 0;
  border-left: 1px solid color-mix(in srgb, var(--border-subtle) 58%, transparent);
}

.sl-global-ruler__tick.is-major {
  top: 0;
  border-left-color: var(--border-default);
  padding-left: 4px;
  color: var(--foreground-muted);
  font: 500 10px/1.4 var(--font-mono);
}

.sl-global-ruler__brush {
  position: absolute;
  inset-block: 2px;
  min-width: 3px;
  border: 1px solid color-mix(in srgb, var(--accent) 70%, transparent);
  border-radius: 2px;
  background: color-mix(in srgb, var(--accent) 20%, transparent);
  box-sizing: border-box;
  pointer-events: none;
}

.sl-swimlane-scroll-shell {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.sl-timestamp-guide {
  position: absolute;
  top: 27px;
  bottom: 0;
  z-index: 45;
  width: 1px;
  background: color-mix(in srgb, var(--foreground) 62%, transparent);
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--background) 28%, transparent);
  pointer-events: none;
}

.sl-timestamp-guide[hidden] {
  display: none;
}

.sl-block-graph-view {
  min-width: 0;
  min-height: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.sl-block-graph-view[hidden] {
  display: none;
}

.sl-block-graph-tools {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.sl-block-graph-tools {
  margin-left: auto;
}

.sl-block-graph-tools .btn svg {
  width: 15px;
  height: 15px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.sl-block-graph-body {
  position: relative;
  min-width: 0;
  min-height: 0;
  flex: 1 1 auto;
  overflow: hidden;
  background-color: var(--surface-1);
  background-image: radial-gradient(circle, var(--pass-ir-pattern-stage-dot) 1px, transparent 1.2px);
  background-size: 24px 24px;
  cursor: grab;
  touch-action: none;
}

.sl-block-graph-canvas-tools {
  position: absolute;
  top: var(--space-2);
  right: var(--space-3);
  z-index: 3;
  height: 28px;
  min-height: 28px;
  gap: 6px;
  padding: 3px 8px;
  border: 0;
  border-radius: var(--radius-pill);
  background: var(--surface-3);
  box-shadow: none;
}

.sl-block-graph-canvas-tools .btn {
  width: 22px;
  min-width: 22px;
  height: 22px;
  min-height: 22px;
  border-radius: var(--radius-md);
}

.sl-block-graph-canvas-tools .btn svg {
  width: 15px;
  height: 15px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.sl-block-graph-body.is-panning {
  cursor: grabbing;
}

.sl-block-graph-stage {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: 0 0;
  will-change: transform;
}

.sl-compare-swimlane-view {
  min-width: 0;
  min-height: 0;
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
}

.sl-compare-swimlane-view[hidden] {
  display: none;
}

.sl-compare-grid {
  position: relative;
  background: var(--surface-1);
}

.sl-compare-timestamp-guide {
  top: 0;
  bottom: 0;
}

/* ── 训练级 Timeline 泳道（对比模式上下两栏统一用这套结构：Host ▸ Rank ▸
   Ascend Hardware / Communication / Overlap Analysis；结构对齐 index_v3.html
   Timeline 页签的 .tl-viewport/.tl-inner，内容由 buildTrainingSwimlaneData 自由构造）── */
.sl-train-tl-layout {
  flex: 1 1 auto;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sl-train-tl-layout[hidden] {
  display: none;
}

.sl-train-tl-viewport {
  flex: 1 1 auto;
  min-height: 0;
  position: relative;
  overflow: auto;
  margin: 8px var(--space-3);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg, 10px);
  background: var(--surface-1);
  scrollbar-width: thin;
  scrollbar-color: color-mix(in srgb, var(--foreground) 20%, transparent) transparent;
}

.sl-train-tl-viewport::-webkit-scrollbar { width: 8px; height: 8px; }
.sl-train-tl-viewport::-webkit-scrollbar-track { background: transparent; }
.sl-train-tl-viewport::-webkit-scrollbar-thumb {
  background-color: color-mix(in srgb, var(--foreground) 20%, transparent);
  background-clip: padding-box;
  border: 2px solid transparent;
  border-radius: var(--radius-pill);
}
.sl-train-tl-viewport:hover::-webkit-scrollbar-thumb {
  background-color: color-mix(in srgb, var(--foreground) 32%, transparent);
}
.sl-train-tl-viewport::-webkit-scrollbar-corner { background: transparent; }

.sl-train-tl-inner {
  display: flex;
  position: relative;
  margin-top: -30px;
}

.sl-train-tl-label {
  flex-shrink: 0;
  z-index: 10;
  background: var(--surface-2);
}

.sl-train-tl-canvas {
  flex: 1;
  min-width: 0;
}

.sl-train-tl-corner {
  position: sticky;
  top: 0;
  left: 0;
  z-index: 30;
  width: 200px;
  height: 30px;
  box-sizing: border-box;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-subtle);
  border-right: 1px solid var(--border-subtle);
}

/* 对比框上下两栏（analysisColumn）固定等高、禁止拖拽：分隔条保留做视觉分界，
   但去掉指针交互；实际锁定 50/50 的逻辑见 init() 里对 analysisGutter 的处理 + 上面
   swimlane-analysis 分栏的 data-sizes="50,50"（storage key 也一并换新，甩掉旧的拖拽记忆）。 */
[data-ide-split="swimlane-analysis"] > .pto-workbench-shell__split-gutter {
  pointer-events: none;
  cursor: default;
}

.sl-block-graph-flow {
  min-width: 1px;
  min-height: 1px;
  padding: 0;
  display: block;
}

.sl-block-graph-node {
  position: absolute;
  z-index: 2;
}

.sl-block-graph-edge-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow: visible;
  pointer-events: none;
}

.sl-block-graph-edge-line {
  fill: none;
  stroke: var(--foreground-muted);
  stroke-width: 1.4;
  stroke-linecap: round;

/* ── 左侧「分析记录」勾选面板：移植自 compute-graph-viewer-wzh 的
   training-run-twin-standalone/TaskCompare.html 任务勾选栏，替换原先的运行记录卡片
   （展开/产物菜单那一套）。本工具固定两两对比：勾中的固定是「基线」(state.selectedRunId，
   对比框上栏) + 一个「对比对象」(state.comparisonRunId，对比框下栏)，两者的 checkbox 常态
   disabled——基线只能靠点另一行的「基线」标签切换；对比对象靠勾选一行新的来替换，
   不支持直接取消勾选到 0/1 个（该工具不支持多于两路对比）。 */
.cmp-task-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 0 0 var(--space-2);
}

.cmp-task-item {
  display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: var(--radius-lg);
  cursor: pointer; color: var(--foreground-secondary); border: 1px solid transparent;
  transition: all var(--duration-fast) var(--easing-default); user-select: none;
}
.cmp-task-item:hover { background: var(--state-hover); }
.cmp-task-item.is-selected { color: var(--foreground); font-weight: 500;
  background: color-mix(in srgb, var(--primary) 8%, transparent); }
.cmp-task-name { flex: 1; display: flex; min-width: 0; overflow: hidden; font: 500 12px/1.3 var(--font-mono); }
.cmp-task-name-head { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.cmp-task-name-tail { white-space: nowrap; flex-shrink: 0; }
.cmp-cb {
  appearance: none; -webkit-appearance: none; width: 14px; height: 14px; margin: 0; border-radius: 3px; flex-shrink: 0;
  cursor: pointer; border: 1.5px solid var(--border-default); background: var(--surface-2); position: relative;
  transition: background var(--duration-fast) var(--easing-default), border-color var(--duration-fast) var(--easing-default);
}
.cmp-cb:hover { border-color: var(--border-strong); }
.cmp-cb:checked { background: var(--primary); border-color: var(--primary); }
.cmp-cb:checked::after {
  content: ""; position: absolute; left: 4px; top: 1px; width: 3px; height: 7px;
  border: solid var(--primary-foreground); border-width: 0 1.6px 1.6px 0; transform: rotate(45deg);
}
.cmp-cb:disabled { cursor: default; opacity: 0.75; }
.cmp-base-tag {
  font-size: 10px; font-family: var(--font-mono); color: var(--foreground-muted); border: 1px solid var(--border-default);
  border-radius: 999px; padding: 1px 8px; cursor: pointer; flex-shrink: 0; opacity: 0;
  transition: all var(--duration-fast) var(--easing-default);
}
.cmp-task-item:hover .cmp-base-tag, .cmp-base-tag.is-selected { opacity: 1; }
.cmp-base-tag:hover { border-color: var(--border-strong); color: var(--foreground-secondary); }
.cmp-base-tag.is-selected { background: var(--surface-4); color: var(--foreground); border-color: var(--surface-4); }
/* 任务身份点：颜色仅作行间区分（同 TaskCompare.html），非健康度语义 */
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.red { background: var(--highlight-copy-blue-400); }
.dot.blue { background: var(--highlight-ub-green-700); }
.dot.green { background: var(--highlight-accum-orange-700); }
.dot.orange { background: var(--highlight-l0a-violet-400); }
.dot.purple { background: var(--highlight-mte-amber-700); }

.sl-history-stack {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  padding: 0 0 var(--space-2);
}

.sl-run-card {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  padding: var(--space-3);
  border-radius: var(--radius-lg);
  background: var(--surface-2);
}

.sl-run-card.is-selected {

}

.sl-run-card--past:not(.is-expanded) {

}

.sl-run-card__head {

  justify-content: space-between;
  gap: var(--space-2);

  border: 0;

.sl-run-card__identity {

}

.sl-history-sm {

}

.sl-history-artifact-more {

}

}

.sl-history-artifact:hover .rl,
.sl-history-artifact.is-menu-open .rl {
  opacity: 0;
}

.sl-history-artifact:hover .sl-history-artifact-more,

  opacity: 1;

function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

    aiv: '#9B6BF0',
    mte: '#EAB308',
    other: '#7C8DB8',

/* ============================================================

const DATASET = window.SWIMLANE_PROFILER_DATA;
if (!DATASET?.runs?.length) throw new Error('swimlane-data.js 未加载或没有运行记录');
const RUN_BY_ID = Object.fromEntries(DATASET.runs.map((run) => [run.id, run]));

}
rebuildModelIndexes();

/* ---- 聚合视图：临时把 MODEL/CURRENT_RUN/edgeById/taskById 切到另一个 run 的上下文，
   同步执行 fn 后原样切回。聚合视图下 hover/select 对比 run 的任务时，
   借此零改动复用 focusInfo/依赖闭包/tooltip/inspector 等既有单 run 分析逻辑。 ---- */
const compareIndexCache = new Map();

  if (!run || run === CURRENT_RUN) return fn();
  if (!compareIndexCache.has(run.id)) {
    compareIndexCache.set(run.id, {
      edgeById: Object.fromEntries(run.model.edges.map((edge) => [edge.id, edge])),
      taskById: Object.fromEntries(run.model.tasks.map((task) => [task.id, task])),
    });
  }
  const idx = compareIndexCache.get(run.id);
  const saved = { run: CURRENT_RUN, model: MODEL, edgeById, taskById };
  CURRENT_RUN = run; MODEL = run.model; edgeById = idx.edgeById; taskById = idx.taskById;
  try { return fn(); } finally {
    CURRENT_RUN = saved.run; MODEL = saved.model; edgeById = saved.edgeById; taskById = saved.taskById;
  }
}
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[ch]));
}
function runList() {
  return DATASET.runs.map((run) => ({
    id: run.id,
    operator: run.operator,
    scenarioTitle: run.scenario?.title || '通用性能场景',
    scenarioFocus: run.scenario?.focus || 'baseline',
    characteristics: run.scenario?.characteristics || [],
    builderId: run.dataConstructor?.id || 'legacy-single-builder',
    dur: Math.round(run.model.timelineEnd),
    tasks: run.model.tasks.length,
    timestamp: run.timestamp,
    current: run.id === state?.selectedRunId,
  }));
}

const ROW_H = 21, SUB_ROW_H = 17, CORE_GAP_H = 6, BAR_PAD = 3, SUB_BAR_PAD = 3, BAR_H = ROW_H - 2 * BAR_PAD, SUB_BAR_H = SUB_ROW_H - 2 * SUB_BAR_PAD;
const AXIS_H = 34, ZOOM_MIN = 100, ZOOM_MAX = 1600, ZOOM_BUTTON_STEP = 50;
const MAX_CANVAS_SIDE = 8192, MAX_CANVAS_PIXELS = 14_000_000, MIN_CANVAS_RENDER_SCALE = 0.25;

const KIND_ACCENT = Object.fromEntries(
  ['host', 'memory', 'cpu', 'hub', 'aic', 'aiv', 'mte'].map((kind) => [kind, OPERATOR_TASK_COLORMAP.colorForLaneKind(kind)]),
);
KIND_ACCENT.worker = KIND_ACCENT.aic;
const AIC_SUBLANES = ['Scalar', 'MTE_2', 'MTE_1', 'Cube', 'FixPipe'];
const AIV_SUBLANES = ['Scalar', 'MTE_2', 'Vector', 'MTE_3'];

const state = {
  zoomPct: 100, mixMode: false, syncPathOnly: false,
  query: '',
  hoverTask: null,
  hoverSubtask: null,
  hoverWrapBandKey: null,
  hoverLaneKey: null,
  hoverLaneUtilKey: null,
  hoverLaneUtil: null,
  hoverLayer: null,
  reportTab: 'overview',
  taskReportTab: 'overview',
  pmuGroup: 2,
  taskConnectionDepth: -1,
  level: 'overview',      // overview | group | wrap | task
  selGroup: null, selWrap: null, selTask: null, selSubtask: null,
  selTaskRun: 'base',     // base | compare —— selTask 归属哪个 run，避免聚合视图下跨 run 撞 id
  hoverTaskRun: 'base',
  selectedRunId: CURRENT_RUN_ID,
  secondaryViewMode: null,
  comparisonRunId: null,
  diffSelectedLane: null,
  inspectorView: 'dashboard', // dashboard | detail
  detailTaskKey: null,        // { coreName, subGraphId, label, ordinal } — 点击泳道任务条时置入，驱动详情下钻
  swimlaneViewMode: 'grouped', // grouped | aggregated —— 对比模式下「分组视图/聚合视图」页签
  collapsedLaneGroups: new Set(['host', 'ai_core_worker_phases']),
  expandedLaneCores: new Set(),
};

const LANE_GROUPS = [
  { id: 'host', label: 'Host' },
  { id: 'ai_cpu', label: 'AI CPU' },
  { id: 'ai_core_worker_phases', label: 'AI Core 工作阶段' },
  { id: 'ai_core_topology', label: 'AI Core 拓扑枢纽' },
  { id: 'die0', label: 'AI Core Die 0' },
  { id: 'die1', label: 'AI Core Die 1' },
];

/* ---- 显示顺序: rowItems[row]={type, ...}; rowToCore[row]=coreIdx|null, rowOf[coreIdx]=row ----
   聚合视图下每个 core 拆成 base/compare 两行：rowOf 继续指向 base 行（基线 run 的既有逻辑不用改），
   compareRowOf[coreIdx]=row 指向紧邻的对比行。 ---- */
let rowItems = [], rowToCore = [], rowOf = [], subRowOf = [], compareRowOf = [];

  return state.swimlaneViewMode === 'aggregated' && state.secondaryViewMode === 'comparison' && Boolean(state.comparisonRunId);
}
function comparisonRun() {

}
function coreLaneOrder(a, b) {
  if (a.laneGroup !== b.laneGroup) return a.idx - b.idx;
  if (a.die == null || b.die == null) return a.idx - b.idx;
  if (a.core !== b.core) return a.core - b.core;
  const rank = (c) => state.mixMode
    ? (c.kind === 'aic' ? 1 : (c.vector === 0 ? 0 : 2))
    : (c.kind === 'aic' ? 0 : (c.vector === 0 ? 1 : 2));
  return rank(a) - rank(b);
}
function coreSublanes(core) {

  return [];
}

}
function pushRowItem(item) {
  const row = rowItems.length;
  rowItems.push(item);

  if (item.type === 'core') {
    if (item.runSlot === 'compare') compareRowOf[item.coreIdx] = row;
    else rowOf[item.coreIdx] = row;
  }
  if (item.type === 'subcore') {

}

    item.h = rowItemHeight(item);

}

  rowItems = [];

  const aggregated = isAggregatedSwimlane();
  const cmpRun = aggregated ? comparisonRun() : null;
  LANE_GROUPS.forEach((group) => {
    const cores = MODEL.cores.filter((c) => c.laneGroup === group.id).sort(coreLaneOrder);
    pushRowItem({ type: 'section', id: group.id, label: group.label, count: cores.length });
    if (state.collapsedLaneGroups.has(group.id)) return;
    cores.forEach((c, index) => {
      pushRowItem({ type: 'core', coreIdx: c.idx, runSlot: cmpRun ? 'base' : null });
      if (cmpRun) {
        pushRowItem({ type: 'core', coreIdx: c.idx, runSlot: 'compare' });
      } else if (state.expandedLaneCores.has(c.idx)) {
        coreSublanes(c).forEach((sublane) => {
          pushRowItem({ type: 'subcore', coreIdx: c.idx, sublane });
        });
      }
      const isDieGroup = group.id.startsWith('die');
      const next = cores[index + 1];
      if (isDieGroup && next && next.core !== c.core) {
        pushRowItem({ type: 'spacer', id: `${group.id}-core-${c.core}-gap` });
      }

/* wrap / group 当前可见行区间 [起, 止] (含) */
function taskSublane(t) {
  if (t.primarySublane) return t.primarySublane;
  const core = MODEL.cores[t.coreIdx];
  const name = String(t.name || '');
  if (core.kind === 'aic') {
    if (/Pack/i.test(name)) return 'MTE_2';
    if (/Accum/i.test(name)) return 'FixPipe';
    if (/BMM|MatMul|GEMM/i.test(name)) return 'Cube';
    return 'Scalar';
  }
  if (core.kind === 'aiv') {
    if (/RMSNorm|Reduce/i.test(name)) return 'Scalar';
    if (/Cast/i.test(name)) return 'MTE_3';

}

    if (Number.isFinite(row)) return row;

}
/* 聚合视图下对比 run 任务条所在行——没有 Mix 展开子泳道，直接按 coreIdx 查 compareRowOf */
function compareTaskRow(t) {

   7. 主体画布渲染

function focusInfo(runSide = 'base') {
  /* 返回当前需高亮的 task / edge / group / wrap, 用于渐进式聚焦。
     聚合视图下基线/对比两侧各自独立渲染，selTask/hoverTask 只在归属的一侧生效——
     否则跨 run 的 task/edge id 可能撞号，被另一侧误当成"自己的"任务高亮。 */
  const relTasks = new Set();
  const relEdges = new Set();
  let dimGroup = null, dimWrap = null;
  const selHere = state.selTask && (state.selTaskRun || 'base') === runSide ? state.selTask : null;
  const hoverHere = state.hoverTask && (state.hoverTaskRun || 'base') === runSide ? state.hoverTask : null;
  const focusTask = selHere || hoverHere;
  if (state.level === 'group' && state.selGroup != null) dimGroup = state.selGroup;
  if (state.level === 'wrap' && state.selWrap != null) { dimGroup = groupForWrap(state.selWrap); dimWrap = state.selWrap; }
  if (state.level === 'task' && selHere) {
    dimGroup = selHere.group;
    dimWrap = selHere.wrap;
  }
  let crossLayerMode = null;
  let dependencyMode = Boolean(selHere);
  if (selHere) {
    const dep = dependencyClosure(selHere, state.taskConnectionDepth);
    dep.tasks.forEach((id) => relTasks.add(id));
    dep.edges.forEach((id) => relEdges.add(id));
    if (state.taskConnectionDepth === -1) {
      const crossLayer = crossLayerClosure(selHere);
      crossLayer.tasks.forEach((id) => relTasks.add(id));
      crossLayerMode = crossLayer.mode;
      if (crossLayerMode) {
        dimGroup = null;
        dimWrap = null;
      }
    }
  } else if (focusTask) {
    const crossLayer = crossLayerClosure(focusTask);
    if (crossLayer.mode) {
      if (!isAiCoreDieTask(focusTask)) {
        const dep = dependencyClosure(focusTask);
        dep.tasks.forEach((id) => relTasks.add(id));
        dep.edges.forEach((id) => relEdges.add(id));
      }
      crossLayer.tasks.forEach((id) => relTasks.add(id));
      crossLayerMode = crossLayer.mode;
      dimGroup = null;
      dimWrap = null;
    } else {
      relTasks.add(focusTask.id);
      focusTask.syncIn.concat(focusTask.syncOut).forEach((eid) => {
        const edge = edgeById[eid];
        if (!edge || !edgeVisibleInCurrentMode(edge)) return;
        relEdges.add(eid);
        relTasks.add(edge.fromTask);
        relTasks.add(edge.toTask);
      });
    }
  }
  const relCoreIds = new Set([...relTasks].map((id) => taskById[id]?.coreIdx).filter(Number.isFinite));
  const showDependencyCurves = dependencyMode || (Boolean(crossLayerMode) && relEdges.size > 0);
  return { relTasks, relEdges, relCoreIds, dimGroup, dimWrap, focusTask,
    dependencyMode, showDependencyCurves, crossLayerMode };
}

function edgeVisibleInCurrentMode(edge) {
  return state.mixMode || edge.relation !== 'sync';
}

function taskHasSyncRelation(task) {
  return task.syncIn.concat(task.syncOut).some((edgeId) => edgeById[edgeId]?.relation === 'sync');
}

function isAiCoreDieTask(task) {
  const laneGroup = MODEL.cores[task?.coreIdx]?.laneGroup;
  return laneGroup === 'die0' || laneGroup === 'die1';
}

function dependencyClosure(rootTask, maxDepth = -1) {
  const tasks = new Set([rootTask.id]);
  const edges = new Set();
  if (maxDepth === 0) return { tasks, edges };
  const visit = (seed, edgeKey, nextKey) => {
    const queue = [{ task: seed, depth: 0 }];
    const seen = new Set([seed.id]);
    while (queue.length) {
      const { task: cur, depth } = queue.shift();
      if (maxDepth >= 0 && depth >= maxDepth) continue;
      cur[edgeKey].forEach((eid) => {
        const e = edgeById[eid];
        if (!e || !edgeVisibleInCurrentMode(e)) return;
        edges.add(eid);
        const next = taskById[e[nextKey]];
        if (!next) return;
        tasks.add(next.id);
        if (!seen.has(next.id)) {
          seen.add(next.id);
          queue.push({ task: next, depth: depth + 1 });
        }
      });
    }
  };
  visit(rootTask, 'syncIn', 'fromTask');
  visit(rootTask, 'syncOut', 'toTask');
  return { tasks, edges };
}

const AICPU_SCHED_TO_WORKER_PHASE = Object.freeze({
  DEV_TASK_RCV: 'DEV_TASK_RCV_MODEL',
  DEV_TASK_SEND_FIRST_LEAF_TASK: 'DEV_TASK_WAIT_RCV_FIRST_LEAF_TASK',
  DEV_TASK_SYNC_CORE_STOP: 'DEV_TASK_WAIT_SYNC_STOP_NOTIFY',
});
const AICPU_WORKER_TO_SCHED_PHASE = Object.freeze(Object.fromEntries(
  Object.entries(AICPU_SCHED_TO_WORKER_PHASE).map(([schedulerPhase, workerPhase]) => [workerPhase, schedulerPhase]),
));

function crossLayerClosure(rootTask) {
  const tasks = new Set([rootTask.id]);
  const devTaskId = rootTask.devTaskId;
  if (!devTaskId) return { tasks, mode: null };

  const schedulerId = rootTask.schedulerOwnerId ?? rootTask.schedulerId;
  const isBuild = rootTask.phase === 'DEV_TASK_BUILD';
  const isSchedExec = rootTask.phase === 'DEV_TASK_SCHED_EXEC';
  const isWorkerExec = rootTask.phase === 'DEV_TASK_ALL_LEAF_TASK_EXEC';
  const isMachineTask = rootTask.phase === 'MACHINE_LEAF_TASK' || rootTask.kind === 'aic' || rootTask.kind === 'aiv';

  if (isBuild) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId === devTaskId) tasks.add(task.id);
    });
    return { tasks, mode: 'devtask' };
  }

  const workerPhase = AICPU_SCHED_TO_WORKER_PHASE[rootTask.phase];
  if (workerPhase && schedulerId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === rootTask.phase && sameScheduler)
          || (task.phase === workerPhase && sameScheduler)) tasks.add(task.id);
    });
    return { tasks, mode: 'scheduler-phase-pair' };
  }

  const schedulerPhase = AICPU_WORKER_TO_SCHED_PHASE[rootTask.phase];
  if (schedulerPhase && schedulerId != null && rootTask.workerCoreId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      const sameWorker = task.workerCoreId === rootTask.workerCoreId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === schedulerPhase && sameScheduler)
          || (task.phase === rootTask.phase && sameScheduler && sameWorker)) tasks.add(task.id);
    });
    return { tasks, mode: 'worker-phase-pair' };
  }

  if (isSchedExec && schedulerId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === 'DEV_TASK_SCHED_EXEC' && sameScheduler)
          || (task.phase === 'DEV_TASK_ALL_LEAF_TASK_EXEC' && sameScheduler)
          || (task.phase === 'MACHINE_LEAF_TASK' && sameScheduler)) tasks.add(task.id);
    });
    return { tasks, mode: 'scheduler-partition' };
  }

  if ((isWorkerExec || isMachineTask) && schedulerId != null && rootTask.workerCoreId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      const sameWorker = task.workerCoreId === rootTask.workerCoreId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === 'DEV_TASK_SCHED_EXEC' && sameScheduler)
          || (task.phase === 'DEV_TASK_ALL_LEAF_TASK_EXEC' && sameScheduler && sameWorker)
          || (task.phase === 'MACHINE_LEAF_TASK' && sameScheduler && sameWorker)) tasks.add(task.id);
    });
    return { tasks, mode: 'worker-chain' };
  }

  return { tasks, mode: null };
}

function taskVisualState(t, fi) {
  const related = !fi.dependencyMode || fi.relTasks.has(t.id);
  const baseColor = related ? taskBaseColor(t) : '#6F7480';
  let alpha = 1;
  if (state.syncPathOnly && !taskHasSyncRelation(t)) alpha = 0.16;
  if (fi.dependencyMode) {
    if (!related) alpha = Math.min(alpha, 0.24);
  } else {
    if (fi.dimWrap != null) { if (t.wrap !== fi.dimWrap) alpha = Math.min(alpha, 0.2); }
    else if (fi.dimGroup != null) { if (t.group !== fi.dimGroup) alpha = Math.min(alpha, 0.2); }
    if (fi.focusTask && !fi.relTasks.has(t.id)) alpha = Math.min(alpha, 0.34);
  }
  if (!taskMatchesQuery(t)) alpha = Math.min(alpha, 0.15);
  const core = MODEL.cores[t.coreIdx];
  const expanded = state.expandedLaneCores.has(core.idx);
  const sourceSegments = expanded
    ? (t.pipelineSegments || [])
    : (state.mixMode && t.microSegments?.length ? t.microSegments : [
      { kind: 'compute', start: t.start, end: t.end },
    ]);
  return { related, baseColor, alpha, core, expanded, sourceSegments };
}

/* ---- 聚合视图：对比 run 任务条独立一趟绘制，直接画进主画布（bctx / crispCtx），
   不再借道旧的 compareBodyCanvas 镜像面板。不处理 wait/sync 标记与 Mix 微分段——
   聚合视图下 Mix 模式本就禁用，和 renderComparisonBody() 现有的简化画法保持一致。 ---- */
function comparisonTaskSelected(t) {
  return Boolean(state.selTask && state.selTaskRun === 'compare' && state.selTask.id === t.id);
}
function comparisonTaskHovered(t) {
  return Boolean(state.hoverTask && state.hoverTaskRun === 'compare' && state.hoverTask.id === t.id);
}
function drawAggregatedComparePass(ctx, viewport = null) {
  const run = comparisonRun();
  if (!isAggregatedSwimlane() || !run) return;
  const model = run.model;
  const scale = pxPerUs();
  const fi = withRunContext(run, () => focusInfo('compare'));
  const fontFamily = "'Inter', sans-serif";
  for (const task of model.tasks) {
    const row = compareTaskRow(task);
    if (!Number.isFinite(row)) continue;
    const related = !fi.dependencyMode || fi.relTasks.has(task.id);
    let alpha = 1;
    if (fi.dependencyMode) {
      if (!related) alpha = Math.min(alpha, 0.24);
    } else {
      if (fi.dimWrap != null) { if (task.wrap !== fi.dimWrap) alpha = Math.min(alpha, 0.2); }
      else if (fi.dimGroup != null) { if (task.group !== fi.dimGroup) alpha = Math.min(alpha, 0.2); }
      if (fi.focusTask && !fi.relTasks.has(task.id)) alpha = Math.min(alpha, 0.34);
    }
    const bar = barMetricsForRow(row);
    const geometry = taskBarGeometry(task, task.start, task.end, scale);
    const x = geometry.x, width = geometry.width;
    const y = rowTop(row) + bar.pad;
    if (width < 1) continue;
    if (viewport && (x + width < viewport.left || x > viewport.right
        || y + bar.height < viewport.top || y > viewport.bottom)) continue;
    const group = task.group != null ? model.groups[task.group] : null;
    ctx.globalAlpha = alpha;
    window.PtoSwimlaneTaskPattern.drawTaskBar(ctx, {
      x, y, width, height: bar.height,
      baseColor: related ? (group?.color || KIND_ACCENT[task.kind]) : '#6F7480',
      fontFamily, task,
      isSelected: comparisonTaskSelected(task),
      isRelated: fi.relTasks.has(task.id) && fi.focusTask && fi.focusTask.id !== task.id,
      isEmphasized: comparisonTaskHovered(task),
    });
    ctx.globalAlpha = 1;
  }
}

function drawCrispTaskLayer() {
  if (!bodyCrispCanvas || !bodyWrap.clientWidth || !bodyWrap.clientHeight) return;
  const viewportWidth = bodyWrap.clientWidth;
  const viewportHeight = bodyWrap.clientHeight;
  const scrollLeft = bodyWrap.scrollLeft;
  const scrollTop = bodyWrap.scrollTop;
  const dpr = window.devicePixelRatio || 1;
  const pixelWidth = Math.max(1, Math.round(viewportWidth * dpr));
  const pixelHeight = Math.max(1, Math.round(viewportHeight * dpr));
  if (bodyCrispCanvas.width !== pixelWidth) bodyCrispCanvas.width = pixelWidth;
  if (bodyCrispCanvas.height !== pixelHeight) bodyCrispCanvas.height = pixelHeight;
  bodyCrispCanvas.style.width = viewportWidth + 'px';
  bodyCrispCanvas.style.height = viewportHeight + 'px';
  bodyCrispCanvas.style.transform = `translate3d(${scrollLeft}px, ${scrollTop}px, 0)`;
  bodyCrispCanvas.dataset.renderScale = dpr.toFixed(3);
  crispCtx = bodyCrispCanvas.getContext('2d');
  crispCtx.setTransform(1, 0, 0, 1, 0, 0);
  crispCtx.clearRect(0, 0, pixelWidth, pixelHeight);
  crispCtx.setTransform(dpr, 0, 0, dpr, -scrollLeft * dpr, -scrollTop * dpr);

  const fi = focusInfo();
  const scale = pxPerUs();
  const viewportRight = scrollLeft + viewportWidth;
  const viewportBottom = scrollTop + viewportHeight;
  const fontFamily = "'Inter', sans-serif";
  let renderedTaskBars = 0;
  for (const t of MODEL.tasks) {
    const row = taskRow(t);
    if (!Number.isFinite(row)) continue;
    const visual = taskVisualState(t, fi);
    visual.sourceSegments.forEach((segment) => {
      if (segment.kind !== 'compute') return;
      const segmentRow = visual.expanded ? subRowOf[visual.core.idx]?.[segment.sublane] : row;
      if (!Number.isFinite(segmentRow)) return;
      const bar = barMetricsForRow(segmentRow);
      const geometry = taskBarGeometry(t, segment.start, segment.end, scale);
      const x = geometry.x;
      const width = geometry.width;
      const y = rowTop(segmentRow) + bar.pad;
      if (width < 1 || x + width < scrollLeft || x > viewportRight
          || y + bar.height < scrollTop || y > viewportBottom) return;
      const segmentSelected = segment.id
        ? state.selSubtask?.id === segment.id
        : Boolean((state.selTaskRun || 'base') === 'base' && state.selTask?.id === t.id && !state.selSubtask);
      const segmentHovered = segment.id
        ? state.hoverSubtask?.id === segment.id
        : Boolean((state.hoverTaskRun || 'base') === 'base' && state.hoverTask?.id === t.id && !state.hoverSubtask);
      const renderTask = segment.id ? subtaskView(t, segment) : t;
      crispCtx.globalAlpha = visual.alpha;
      window.PtoSwimlaneTaskPattern.drawTaskBar(crispCtx, {
        x, y, width, height: bar.height, baseColor: visual.baseColor, fontFamily, task: renderTask,
        isSelected: segmentSelected,
        isRelated: fi.relTasks.has(t.id) && fi.focusTask && fi.focusTask.id !== t.id,
        isEmphasized: segmentHovered,
      });
      renderedTaskBars += 1;
    });
  }
  drawAggregatedComparePass(crispCtx, {
    left: scrollLeft, right: viewportRight, top: scrollTop, bottom: viewportBottom,
  });
  crispCtx.globalAlpha = 1;
  bodyCrispCanvas.dataset.renderedTaskBars = String(renderedTaskBars);
}

function drawCrispComparisonLayer() {
  if (isAggregatedSwimlane()) return;
  if (state.secondaryViewMode !== 'comparison' || !compareBodyCrispCanvas
      || !compareBodyWrap?.clientWidth || !compareBodyWrap.clientHeight) return;
  const run = RUN_BY_ID[state.comparisonRunId];
  if (!run) return;
  const model = run.model;
  const viewportWidth = compareBodyWrap.clientWidth;
  const viewportHeight = compareBodyWrap.clientHeight;
  const scrollLeft = compareBodyWrap.scrollLeft;
  const scrollTop = compareBodyWrap.scrollTop;
  const dpr = window.devicePixelRatio || 1;
  const pixelWidth = Math.max(1, Math.round(viewportWidth * dpr));
  const pixelHeight = Math.max(1, Math.round(viewportHeight * dpr));
  if (compareBodyCrispCanvas.width !== pixelWidth) compareBodyCrispCanvas.width = pixelWidth;
  if (compareBodyCrispCanvas.height !== pixelHeight) compareBodyCrispCanvas.height = pixelHeight;
  compareBodyCrispCanvas.style.width = viewportWidth + 'px';
  compareBodyCrispCanvas.style.height = viewportHeight + 'px';
  compareBodyCrispCanvas.style.transform = `translate3d(${scrollLeft}px, ${scrollTop}px, 0)`;
  compareBodyCrispCanvas.dataset.renderScale = dpr.toFixed(3);
  const ctx = compareBodyCrispCanvas.getContext('2d');
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, pixelWidth, pixelHeight);
  ctx.setTransform(dpr, 0, 0, dpr, -scrollLeft * dpr, -scrollTop * dpr);
  const scale = pxPerUs();
  const viewportRight = scrollLeft + viewportWidth;
  const viewportBottom = scrollTop + viewportHeight;
  let renderedTaskBars = 0;
  for (const task of model.tasks) {
    const row = rowOf[task.coreIdx];
    if (!Number.isFinite(row)) continue;
    const bar = barMetricsForRow(row);
    const geometry = taskBarGeometry(task, task.start, task.end, scale);
    const x = geometry.x;
    const y = rowTop(row) + bar.pad;
    if (geometry.width < 1 || x + geometry.width < scrollLeft || x > viewportRight
        || y + bar.height < scrollTop || y > viewportBottom) continue;
    const group = task.group != null ? model.groups[task.group] : null;
    window.PtoSwimlaneTaskPattern.drawTaskBar(ctx, {
      x, y, width: geometry.width, height: bar.height,
      baseColor: group?.color || KIND_ACCENT[task.kind],
      fontFamily: "'Inter', sans-serif", task,
    });
    renderedTaskBars += 1;
  }
  compareBodyCrispCanvas.dataset.renderedTaskBars = String(renderedTaskBars);
}

function scheduleCrispTaskLayer() {
  if (crispRenderFrame) return;
  crispRenderFrame = window.requestAnimationFrame(() => {
    crispRenderFrame = 0;
    drawCrispTaskLayer();
    drawCrispComparisonLayer();
  });
}

function drawBody() {
  const w = bodyW(), h = bodyH(), scale = pxPerUs();
  bctx.clearRect(0, 0, w, h);
  const fi = focusInfo();

  /* 行底纹 */
  for (let row = 0; row < rowItems.length; row++) {
    const item = rowItems[row];
    const y = rowTop(row), rh = rowHeight(row);
    if (item.type === 'section') {
      bctx.fillStyle = 'rgba(255,255,255,0.026)';
      bctx.fillRect(0, y, w, rh);
      continue;
    }
    if (isRowHovered(row)) {
      bctx.fillStyle = 'rgba(255,255,255,0.045)';
      bctx.fillRect(0, y, w, rh);
    }
  }

  /* Mix 模式按单个 Wrap instance 框选 1C2V / 1C1V，不合并多个 Wrap。 */
  if (state.mixMode) drawWrapBands(fi);

  /* 调用范围 barrier：任务区只保留虚线，不延伸局部时间刻度实线。 */
  MODEL.layerMarks.forEach((m) => {
    const x = Math.round(m.t * scale) + 0.5;
    bctx.strokeStyle = 'rgba(255,255,255,0.15)'; bctx.setLineDash([4, 4]);
    bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, h); bctx.stroke();
    bctx.setLineDash([]);
  });

  /* section / wrap / group 分隔线 */
  drawSeparators(bctx, w);

  /* task bars */
  const fontFamily = "'Inter', sans-serif";
  for (const t of MODEL.tasks) {
    const row = taskRow(t);
    if (!Number.isFinite(row)) continue;
    const visual = taskVisualState(t, fi);
    visual.sourceSegments.forEach((segment) => {
      const segmentRow = visual.expanded ? subRowOf[visual.core.idx]?.[segment.sublane] : row;
      if (!Number.isFinite(segmentRow)) return;
      const bar = barMetricsForRow(segmentRow);
      const geometry = taskBarGeometry(t, segment.start, segment.end, scale);
      const x = geometry.x;
      const width = geometry.width;
      const y = rowTop(segmentRow) + bar.pad;
      const segmentSelected = segment.id
        ? state.selSubtask?.id === segment.id
        : Boolean((state.selTaskRun || 'base') === 'base' && state.selTask?.id === t.id && !state.selSubtask);
      const segmentHovered = segment.id
        ? state.hoverSubtask?.id === segment.id
        : Boolean((state.hoverTaskRun || 'base') === 'base' && state.hoverTask?.id === t.id && !state.hoverSubtask);
      bctx.globalAlpha = visual.alpha;
      if (segment.kind === 'wait') {
        if (width >= 1) {
          drawWaitSegment(x, y, width, bar.height, fi.dependencyMode && !visual.related);
          drawSubtaskFocus(x, y, width, bar.height, segmentSelected, segmentHovered);
        }
      } else if (segment.kind === 'set') {
        const markerX = Math.round(x) + 0.5;
        bctx.fillStyle = '#1FB6C9';
        bctx.fillRect(markerX - 0.5, y - 1, 1, bar.height + 2);
        bctx.beginPath();
        bctx.arc(markerX, y - 1, 2.2, 0, Math.PI * 2);
        bctx.fill();
      } else if (segment.kind === 'wait-point') {
        const markerX = Math.round(x) + 0.5;
        bctx.fillStyle = '#FFAA3B';
        bctx.fillRect(markerX - 0.5, y - 1, 1, bar.height + 2);
        bctx.beginPath();
        bctx.moveTo(markerX - 3, y - 2);
        bctx.lineTo(markerX + 3, y - 2);
        bctx.lineTo(markerX, y + 2.5);
        bctx.closePath();
        bctx.fill();
      } else if (width >= 1) {
        const renderTask = segment.id ? subtaskView(t, segment) : t;
        window.PtoSwimlaneTaskPattern.drawTaskBar(bctx, {
          x, y, width, height: bar.height, baseColor: visual.baseColor, fontFamily, task: renderTask,
          isSelected: segmentSelected,
          isRelated: fi.relTasks.has(t.id) && fi.focusTask && fi.focusTask.id !== t.id,
          isEmphasized: segmentHovered,
        });
      }
    });
    bctx.globalAlpha = 1;
  }

  if (fi.showDependencyCurves) drawDependencyCurves(fi);
  else if (state.mixMode) drawSyncCurves(fi);
  drawAggregatedComparePass(bctx);
  copyCanvasPixels(bodyCanvas, compareBodyCanvas);
  scheduleCrispTaskLayer();
}

function wrapBandKey(wrapId, iteration) {
  return `${iteration}:${wrapId}`;
}

function wrapBandSpecs() {
  const scale = pxPerUs();
  const specs = [];
  for (let iteration = 0; iteration < MODEL.LAYERS; iteration++) {
    for (const wrap of MODEL.wraps || []) {
      const tasks = MODEL.tasks.filter((task) => task.wrap === wrap.id && task.iteration === iteration);
      if (!tasks.length) continue;
      const rows = [...new Set(tasks.map((task) => taskRow(task)).filter(Number.isFinite))];
      if (!rows.length) continue;
      const start = Math.min(...tasks.map((task) => task.start)) - 0.8;
      const end = Math.max(...tasks.map((task) => task.end)) + 0.8;
      const firstRow = Math.min(...rows);
      const lastRow = Math.max(...rows);
      specs.push({
        key: wrapBandKey(wrap.id, iteration),
        wrapId: wrap.id,
        iteration,
        groupId: groupForWrap(wrap.id),
        x: start * scale,
        y: rowTop(firstRow),
        width: Math.max(1, (end - start) * scale),
        height: rowBottom(lastRow) - rowTop(firstRow),
      });
    }
  }
  return specs;
}

function drawWrapBands(fi) {
  for (const spec of wrapBandSpecs()) {
    const grp = MODEL.groups[spec.groupId];
    const isFocus = fi.dimWrap === spec.wrapId;
    const isHovered = state.hoverWrapBandKey === spec.key;
    const groupFocus = fi.dimWrap == null && fi.dimGroup === spec.groupId;
    const faded = !isHovered && ((fi.dimWrap != null && !isFocus)
      || (fi.dimWrap == null && fi.dimGroup != null && !groupFocus));
    const bright = isHovered || isFocus;
    bctx.save();
    bctx.fillStyle = hexToRgba(grp.color, faded ? 0.018 : (bright ? 0.11 : 0.04));
    bctx.fillRect(spec.x, spec.y, spec.width, spec.height);
    bctx.strokeStyle = hexToRgba(grp.color, faded ? 0.12 : (bright ? 0.94 : 0.34));
    bctx.lineWidth = bright ? 1.4 : 1;
    bctx.setLineDash([5, 3]);
    bctx.beginPath();
    bctx.roundRect(spec.x + 0.5, spec.y + 1.5, spec.width - 1, spec.height - 3, 8);
    bctx.stroke();
    bctx.setLineDash([]);
    bctx.font = "600 8px 'JetBrains Mono', monospace";
    bctx.textAlign = 'left';
    bctx.textBaseline = 'alphabetic';
    bctx.fillStyle = hexToRgba(grp.color, faded ? 0.2 : (bright ? 0.96 : 0.5));
    bctx.fillText(`Wrap ${wrapInstanceDisplayId(spec.wrapId, spec.iteration)}`, spec.x + 1, Math.max(8, spec.y - 2));
    bctx.restore();
  }
}

function hitWrapBand(px, py) {
  if (!state.mixMode) return null;
  const specs = wrapBandSpecs();
  for (let index = specs.length - 1; index >= 0; index--) {
    const spec = specs[index];
    if (px >= spec.x && px <= spec.x + spec.width && py >= spec.y && py <= spec.y + spec.height) return spec;
  }
  return null;
}

function drawSeparators(ctx, w) {
  const line = (row, color, weight) => {
    const y = rowTop(row) + 0.5;
    ctx.strokeStyle = color; ctx.lineWidth = weight;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  };
  rowItems.forEach((item, row) => {
    if (item.type === 'section') line(row, 'rgba(255,255,255,0.16)', 1);
  });
  copyCanvasPixels(laneCanvas, compareLaneCanvas);
}

function drawWaitSegment(x, y, w, h, muted = false) {
  const waitColor = muted ? '#6F7480' : '#FFAA3B';
  bctx.save();
  bctx.beginPath(); bctx.roundRect(x, y, w, h, 2); bctx.clip();
  bctx.fillStyle = hexToRgba(waitColor, muted ? 0.18 : 0.14);
  bctx.fillRect(x, y, w, h);
  bctx.strokeStyle = muted ? 'rgba(111,116,128,0.48)' : 'rgba(255,170,59,0.5)';
  bctx.lineWidth = 1;
  for (let i = -h; i < w + h; i += 5) {
    bctx.beginPath(); bctx.moveTo(x + i, y + h); bctx.lineTo(x + i + h, y); bctx.stroke();
  }
  bctx.restore();
  bctx.strokeStyle = muted ? 'rgba(111,116,128,0.44)' : 'rgba(255,170,59,0.4)';
  bctx.lineWidth = 1;
  bctx.beginPath(); bctx.roundRect(x + 0.5, y + 0.5, Math.max(0, w - 1), h - 1, 2); bctx.stroke();
  if (w >= 6) {
    bctx.fillStyle = waitColor;
    bctx.beginPath();
    bctx.moveTo(x, y - 1); bctx.lineTo(x + 5, y - 1); bctx.lineTo(x + 2.5, y + 3.5);
    bctx.closePath(); bctx.fill();
  }
}

function drawSubtaskFocus(x, y, w, h, selected, hovered) {
  if (!selected && !hovered) return;
  bctx.save();
  bctx.strokeStyle = selected ? 'rgba(255,255,255,0.96)' : 'rgba(255,255,255,0.72)';
  bctx.lineWidth = selected ? 1.5 : 1;
  bctx.beginPath();
  bctx.roundRect(x + 0.5, y + 0.5, Math.max(0, w - 1), Math.max(0, h - 1), 2);
  bctx.stroke();
  bctx.restore();
}

/* 依赖贝塞尔曲线：渐进显示
   overview -> 不画; group -> 该子图弧线中等; wrap -> 该 wrap 弧线强;
   任务 -> 选中任务弧线最强, 同 Wrap 其余弱 */
function drawDependencyCurves(fi) {
  const edges = MODEL.edges.filter((e) => fi.relEdges.has(e.id) && edgeVisibleInCurrentMode(e));
  edges.forEach((e) => drawDependencyCurve(e, true));
}

function drawSyncCurves(fi) {
  let visible, strongPred;
  if (fi.focusTask) {
    visible = MODEL.edges.filter((e) => e.wrap === fi.focusTask.wrap);
    strongPred = (e) => fi.relEdges.has(e.id);
  } else if (fi.dimWrap != null) {
    visible = MODEL.edges.filter((e) => e.wrap === fi.dimWrap);
    strongPred = () => true;
  } else if (fi.dimGroup != null) {
    visible = MODEL.edges.filter((e) => e.group === fi.dimGroup);
    strongPred = () => false;
  } else {
    return; /* overview: 保持干净, 不画弧线 */
  }
  /* 先弱后强, 保证强线在上层 */
  visible.filter((e) => !strongPred(e)).forEach((e) => drawDependencyCurve(e, false));
  visible.filter((e) => strongPred(e)).forEach((e) => drawDependencyCurve(e, true));
  /* 选中 task 的同步点 barrier 竖线 */
  if (fi.focusTask) {
    fi.focusTask.syncIn.concat(fi.focusTask.syncOut).forEach((eid) => {
      const e = edgeById[eid];
      if (!e || e.relation !== 'sync') return;
      const color = MODEL.groups[e.group]?.color || KIND_ACCENT.aic;
      drawBarrier(e.fromT, color);
      drawBarrier(e.toT, color);
    });
  }
}

function drawDependencyCurve(e, strong) {
  const scale = pxPerUs();
  const fromRow = taskRow(taskById[e.fromTask]), toRow = taskRow(taskById[e.toTask]);
  if (!Number.isFinite(fromRow) || !Number.isFinite(toRow)) return;
  const x1 = e.fromT * scale, y1 = rowMidY(fromRow);
  const x2 = e.toT * scale, y2 = rowMidY(toRow);
  const fromColor = taskBaseColor(taskById[e.fromTask]);
  const toColor = taskBaseColor(taskById[e.toTask]);
  const grad = bctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, hexToRgba(fromColor, strong ? 0.98 : 0.32));
  grad.addColorStop(1, hexToRgba(toColor, strong ? 0.98 : 0.32));
  const midX = x1 + (x2 - x1) * 0.5;
  bctx.save();
  bctx.strokeStyle = grad;
  bctx.lineWidth = strong ? 1.7 : 1;
  /* 任务依赖为实线；AI Core 内部同步/等待为虚线。 */
  bctx.setLineDash(e.relation === 'sync' ? (strong ? [6, 4] : [4, 4]) : []);
  bctx.beginPath();
  bctx.moveTo(x1, y1);
  bctx.bezierCurveTo(midX, y1, midX, y2, x2, y2);
  bctx.stroke();
  bctx.setLineDash([]);
  bctx.fillStyle = hexToRgba(fromColor, strong ? 1 : 0.5);
  bctx.beginPath(); bctx.arc(x1, y1, strong ? 2.6 : 1.8, 0, Math.PI * 2); bctx.fill();
  bctx.fillStyle = hexToRgba(toColor, strong ? 1 : 0.5);
  const arrow = strong ? 5.2 : 4.2;
  const direction = Math.sign(x2 - x1) || 1;
  bctx.beginPath();
  bctx.moveTo(x2, y2);
  bctx.lineTo(x2 - direction * arrow, y2 - arrow * 0.72);
  bctx.lineTo(x2 - direction * arrow, y2 + arrow * 0.72);
  bctx.closePath();
  bctx.fill();
  bctx.restore();
}

function drawBarrier(tUs, color) {
  const x = Math.round(tUs * pxPerUs()) + 0.5;
  bctx.save();
  bctx.strokeStyle = hexToRgba(color, 0.45);
  bctx.lineWidth = 1; bctx.setLineDash([2, 3]);
  bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, bodyH()); bctx.stroke();
  bctx.restore();
}

/* ---- 时间轴 ---- */
function drawAxis() {
  const w = bodyW(), scale = pxPerUs();
  actx.clearRect(0, 0, w, AXIS_H);
  actx.fillStyle = 'rgba(255,255,255,0.40)';
  actx.font = "500 10px 'JetBrains Mono', monospace";
  actx.textBaseline = 'middle';
  const { majorStep, minorStep } = adaptiveTimeSteps(MODEL.timelineEnd, w, 54);
  for (let t = 0; t <= MODEL.timelineEnd + minorStep * 0.25; t += minorStep) {
    const x = Math.round(t * scale) + 0.5;
    const major = Math.abs(t / majorStep - Math.round(t / majorStep)) < 1e-6;
    actx.strokeStyle = major ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
    actx.beginPath();
    actx.moveTo(x, major ? AXIS_H - 11 : AXIS_H - 6); actx.lineTo(x, AXIS_H); actx.stroke();
    if (major) { actx.textAlign = 'left'; actx.fillText(formatTimeTick(t) + 'μs', x + 3, 9); }
  }
  MODEL.layerMarks.forEach((m) => {
    const x = m.t * scale;
    const hovered = state.hoverLayer === m.layer;
    if (hovered) {
      actx.fillStyle = 'rgba(255,255,255,0.10)';
      actx.beginPath();
      actx.roundRect(x + 1, 12, 52, 18, 4);
      actx.fill();
    }
    actx.fillStyle = hovered ? 'rgba(255,255,255,0.94)' : 'rgba(255,255,255,0.62)';
    actx.font = "600 10px 'Inter', sans-serif";
    actx.textAlign = 'left';
    actx.fillText('DevTask ' + m.label, x + 4, 22);
    if (hovered) {
      actx.fillStyle = 'rgba(255,255,255,0.78)';
      actx.fillRect(x + 4, 29, 44, 1);
    }
  });
}

function adaptiveTimeSteps(total, pixelWidth, targetLabelPx = 58) {
  const targetTicks = Math.max(4, Math.min(64, Math.floor(pixelWidth / targetLabelPx)));
  const rawStep = Math.max(Number.EPSILON, total / targetTicks);
  const magnitude = 10 ** Math.floor(Math.log10(rawStep));
  const normalized = rawStep / magnitude;
  const nice = [1, 2, 2.5, 5, 10].find((candidate) => candidate >= normalized) || 10;
  const majorStep = nice * magnitude;
  const minorStep = majorStep / (nice === 2.5 ? 5 : 2);
  return { majorStep, minorStep };
}

function formatTimeTick(value) {
  if (Math.abs(value) >= 100 || Number.isInteger(value)) return String(Math.round(value));
  return value.toFixed(1).replace(/\.0$/, '');
}

function layerWindow(layer) {
  const tasks = MODEL.tasks.filter((t) => t.iteration === layer);
  if (!tasks.length) return null;
  const start = Math.max(0, Math.min(...tasks.map((t) => t.start)) - 8);
  const end = Math.min(MODEL.timelineEnd, Math.max(...tasks.map((t) => t.end)) + 8);
  return { start, end };
}

function fitLayer(layer) {
  const win = layerWindow(layer);
  if (!win) return;
  const span = Math.max(1, win.end - win.start);
  const desiredZoom = Math.floor((MODEL.timelineEnd / span) * 100);
  setZoom(desiredZoom);
  window.requestAnimationFrame(() => {
    bodyWrap.scrollLeft = Math.max(0, win.start * pxPerUs());
    axisWrap.scrollLeft = bodyWrap.scrollLeft;
    overviewWrap.scrollLeft = bodyWrap.scrollLeft;
    syncGlobalRulerBrush();
  });
}

function hitLayerLabel(canvasX, canvasY) {
  if (canvasY < 8 || canvasY > AXIS_H) return null;
  const scale = pxPerUs();
  return MODEL.layerMarks.find((m) => {
    const x = m.t * scale;
    return canvasX >= x && canvasX <= x + 62;
  }) || null;
}

function laneUtil(coreIdx, sublane = null) {
  const core = MODEL.cores[coreIdx];
  const explicit = sublane ? core?.sublaneUtilization?.[sublane] : core?.utilization;
  if (Number.isFinite(explicit)) {
    return { active: explicit * MODEL.timelineEnd, ratio: explicit };
  }
  let active = 0;
  MODEL.tasks.forEach((t) => {
    if (t.coreIdx !== coreIdx) return;
    if (sublane) {
      (t.pipelineSegments || []).forEach((segment) => {
        if (segment.sublane === sublane) active += Math.max(0, segment.end - segment.start);
      });
      return;
    }
    active += t.end - t.start;
  });
  const ratio = Math.max(0, Math.min(1, active / Math.max(1, MODEL.timelineEnd)));
  return { active, ratio };
}
function laneUtilForItem(item) {
  if (!item || (item.type !== 'core' && item.type !== 'subcore')) return null;
  return laneUtil(item.coreIdx, item.type === 'subcore' ? item.sublane : null);
}

function hitLaneUtil(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  if (canvasX < 104 || canvasX > LABEL_W - 2) return null;
  const item = rowItems[row];
  const coreIdx = rowToCore[row];
  if (coreIdx == null || (item.type !== 'core' && item.type !== 'subcore')) return null;
  return { core: MODEL.cores[coreIdx], sublane: item.sublane || null, item, util: laneUtilForItem(item), key: rowLaneKey(row) };
}

function hitLaneSection(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  const item = rowItems[row];
  if (item.type !== 'section') return null;
  return item;
}

function hitExpandableLane(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  const item = rowItems[row];
  if (item.type !== 'core' || item.runSlot) return null;
  const core = MODEL.cores[item.coreIdx];
  if (!isExpandableCore(core)) return null;
  return { item, core, row, inIcon: canvasX >= 4 && canvasX <= 22 };
}

/* ---- 泳道标签列 ---- */
function drawLanes() {
  const h = bodyH();
  lctx.clearRect(0, 0, LABEL_W, h);
  lctx.textBaseline = 'middle';
  const fi = focusInfo();
  for (let row = 0; row < rowItems.length; row++) {
    const item = rowItems[row];
    const y = rowTop(row), rh = rowHeight(row);
    if (item.type === 'section') {
      const collapsed = state.collapsedLaneGroups.has(item.id);
      const groupRelated = fi.crossLayerMode && MODEL.cores.some((core) => core.laneGroup === item.id && fi.relCoreIds.has(core.idx));
      lctx.fillStyle = groupRelated ? 'rgba(255,255,255,0.085)' : 'rgba(255,255,255,0.04)';
      lctx.fillRect(0, y, LABEL_W, rh);
      lctx.fillStyle = 'rgba(255,255,255,0.72)';
      lctx.font = "700 10px 'Inter', sans-serif";
      lctx.textAlign = 'left';
      lctx.beginPath();
      if (collapsed) {
        lctx.moveTo(9, y + ROW_H / 2 - 4);
        lctx.lineTo(15, y + ROW_H / 2);
        lctx.lineTo(9, y + ROW_H / 2 + 4);
      } else {
        lctx.moveTo(7, y + ROW_H / 2 - 2);
        lctx.lineTo(16, y + ROW_H / 2 - 2);
        lctx.lineTo(11.5, y + ROW_H / 2 + 4);
      }
      lctx.closePath();
      lctx.fill();
      lctx.fillText(item.label, 24, y + ROW_H / 2 + 0.5);
      lctx.fillStyle = 'rgba(255,255,255,0.34)';
      lctx.font = "600 9px 'JetBrains Mono', monospace";
      lctx.textAlign = 'right';
      lctx.fillText(String(item.count), LABEL_W - 8, y + ROW_H / 2 + 0.5);
      continue;
    }
    if (item.type !== 'core' && item.type !== 'subcore') continue;

    const c = MODEL.cores[item.coreIdx];
    const hovered = isRowHovered(row);
    if (hovered) {
      lctx.fillStyle = 'rgba(255,255,255,0.055)';
      lctx.fillRect(0, y, LABEL_W, rh);
    }
    const dim = fi.crossLayerMode && fi.dependencyMode
      ? !fi.relCoreIds.has(c.idx)
      : (fi.dimWrap != null && !coreParticipates(c.idx, null, fi.dimWrap))
        || (fi.dimWrap == null && fi.dimGroup != null && !coreParticipates(c.idx, fi.dimGroup));

    if (item.type === 'core' && c.kind === 'aic' && !item.runSlot) {
      lctx.fillStyle = dim ? 'rgba(124,141,184,0.24)' : 'rgba(124,141,184,0.68)';
      lctx.fillRect(0, y + 2, 3, Math.max(2, rh - 4));
    }

    if (item.runSlot) {
      const runId = item.runSlot === 'compare' ? state.comparisonRunId : state.selectedRunId;
      lctx.fillStyle = runDotColor(runId);
      lctx.beginPath();
      lctx.arc(15, y + rh / 2, 3, 0, Math.PI * 2);
      lctx.fill();
    }

    if (item.type === 'core' && !item.runSlot && hovered && isExpandableCore(c)) {
      const expanded = state.expandedLaneCores.has(c.idx);
      lctx.fillStyle = 'rgba(255,255,255,0.62)';
      lctx.beginPath();
      if (expanded) {
        lctx.moveTo(8, y + rh / 2 - 2);
        lctx.lineTo(17, y + rh / 2 - 2);
        lctx.lineTo(12.5, y + rh / 2 + 4);
      } else {
        lctx.moveTo(10, y + rh / 2 - 4);
        lctx.lineTo(16, y + rh / 2);
        lctx.lineTo(10, y + rh / 2 + 4);
      }
      lctx.closePath();
      lctx.fill();
    }

    /* 标签：聚合视图下每个 core 拆成 base/compare 两行，标签用该行归属的 run.id（而非重复的 core 名），
       和左侧勾选栏的颜色点一一对应，紧邻的两行即视觉上"贴靠对比"的同一条物理泳道。 */
    lctx.fillStyle = dim ? 'rgba(255,255,255,0.3)' : (item.type === 'subcore' ? 'rgba(255,255,255,0.56)' : 'rgba(255,255,255,0.8)');
    lctx.font = item.type === 'subcore' ? "500 10px 'Inter', sans-serif" : "500 11px 'Inter', sans-serif";
    lctx.textAlign = 'left';
    const label = item.type === 'subcore'
      ? item.sublane
      : (item.runSlot === 'compare' ? state.comparisonRunId : item.runSlot === 'base' ? state.selectedRunId : c.label);
    const labelX = item.type === 'subcore' ? 38 : (item.runSlot ? 24 : 24);
    const labelMax = item.type === 'subcore' ? 62 : (item.runSlot ? 74 : 80);
    lctx.fillText(label, labelX, y + rh / 2 + 0.5, labelMax);

    const util = item.runSlot === 'compare'
      ? withRunContext(comparisonRun(), () => laneUtilForItem(item))
      : laneUtilForItem(item);
    const ux = 108;
    const uh = item.type === 'subcore' ? 5 : 8;
    const uy = y + rh / 2 - uh / 2;
    const uw = 42;
    const utilHovered = state.hoverLaneUtilKey === rowLaneKey(row);
    lctx.fillStyle = utilHovered ? 'rgba(255,255,255,0.11)' : 'rgba(255,255,255,0.055)';
    lctx.beginPath();
    lctx.roundRect(ux, uy, uw, uh, 2);
    lctx.fill();
    const lowUtilization = util.ratio < LOW_UTILIZATION_THRESHOLD;
    const utilColor = lowUtilization
      ? (utilHovered ? 'rgba(255,170,59,0.94)' : 'rgba(255,170,59,0.72)')
      : (utilHovered ? 'rgba(124,141,184,0.86)' : 'rgba(124,141,184,0.62)');
    lctx.fillStyle = dim
      ? (lowUtilization ? 'rgba(255,170,59,0.32)' : 'rgba(124,141,184,0.28)')
      : utilColor;
    lctx.beginPath();
    lctx.roundRect(ux, uy, Math.max(2, uw * util.ratio), uh, 2);
    lctx.fill();
    if (utilHovered) {
      lctx.strokeStyle = 'rgba(255,255,255,0.24)';
      lctx.lineWidth = 1;
      lctx.beginPath();
      lctx.roundRect(ux + 0.5, uy + 0.5, uw - 1, uh - 1, 2);
      lctx.stroke();
    }
    lctx.fillStyle = dim
      ? (lowUtilization ? 'rgba(255,170,59,0.38)' : 'rgba(255,255,255,0.22)')
      : (lowUtilization ? 'rgba(255,170,59,0.88)' : 'rgba(255,255,255,0.42)');
    lctx.font = item.type === 'subcore' ? "600 8px 'JetBrains Mono', monospace" : "600 9px 'JetBrains Mono', monospace";
    lctx.textAlign = 'right';
    lctx.fillText(Math.round(util.ratio * 100) + '%', LABEL_W - 7, y + rh / 2 + 0.5);
  }
  /* 分隔线 */
  const line = (row, color, weight) => {
    const yy = rowTop(row) + 0.5;
    lctx.strokeStyle = color; lctx.lineWidth = weight;
    lctx.beginPath(); lctx.moveTo(0, yy); lctx.lineTo(LABEL_W, yy); lctx.stroke();
  };
  rowItems.forEach((item, row) => {
    if (item.type === 'section') line(row, 'rgba(255,255,255,0.16)', 1);
  });
}

function smoothPath(points) {
  if (!points.length) return '';
  if (points.length === 1) return `M${points[0].x},${points[0].y}`;
  let d = `M${points[0].x.toFixed(2)},${points[0].y.toFixed(2)}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(points.length - 1, i + 2)];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
  }
  return d;
}

function clampMetric(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function physicalAiCoreKey(core) {
  const die = core?.aiCoreDieId ?? core?.die;
  if (die != null && core?.core != null) return `${die}:${core.core}`;
  if (core?.wrap != null) return `wrap:${core.wrap}`;
  return `lane:${core?.idx}`;
}

function buildOverviewMetrics() {
  const cacheKey = state.selectedRunId;
  if (overviewMetricCache.has(cacheKey)) return overviewMetricCache.get(cacheKey);
  const samples = 72;
  const metricDefs = [
    { key: 'hostQueue', label: 'Host CPU 队列', unit: '', max: 8, color: '#7C8DB8' },
    { key: 'activeAi', label: '活跃 AI Core', unit: ' 核', max: 32, color: '#5A92E6' },
    { key: 'aivIdle', label: 'AIV 空闲', unit: '%', max: 100, color: '#FFAA3B' },
    { key: 'ubLive', label: 'UB Live', unit: '%', max: 100, color: '#9B6BF0' },
    { key: 'mteBw', label: 'MTE 带宽', unit: ' GB/s', max: 900, color: '#04D793' },
  ];
  const series = metricDefs.map((m) => ({ ...m, values: [] }));
  for (let i = 0; i < samples; i++) {
    const f = i / Math.max(1, samples - 1);
    const t = f * MODEL.timelineEnd;
    let hostActive = 0, aivTotal = 0, aivWaiting = 0, mteActive = 0;
    const activeAiCores = new Set();
    MODEL.tasks.forEach((task) => {
      const core = MODEL.cores[task.coreIdx];
      const active = t >= task.start && t <= task.end;
      const computing = t >= task.start && t <= task.computeEnd;
      const waiting = t > task.computeEnd && t <= task.end;
      if (core.kind === 'cpu' && active) hostActive++;
      if ((core.kind === 'aic' || core.kind === 'aiv') && computing) activeAiCores.add(physicalAiCoreKey(core));
      if (core.kind === 'aiv') {
        aivTotal++;
        if (waiting) aivWaiting++;
      }
      if (core.kind === 'mte' && active) mteActive++;
    });
    const aiCompute = activeAiCores.size;
    const pulse = 0.5 + 0.5 * Math.sin(f * Math.PI * 9);
    const bottleneck = Math.exp(-Math.pow((t - (MODEL.LAYER0 + MODEL.LAYER_SPAN + MODEL.STAGGER * 1.4)) / 230, 2));
    series[0].values.push(clampMetric(hostActive + 1.6 * pulse + 2.2 * bottleneck, 0, 8));
    series[1].values.push(clampMetric(aiCompute, 0, 32));
    series[2].values.push(clampMetric((aivWaiting / Math.max(1, aivTotal)) * 100 + 20 * bottleneck, 0, 100));
    series[3].values.push(clampMetric(34 + aiCompute * 0.72 + mteActive * 8 + 18 * bottleneck + 8 * pulse, 0, 100));
    series[4].values.push(clampMetric(120 + mteActive * 230 + 90 * pulse + 140 * Math.max(0, Math.sin(f * Math.PI * 6)), 0, 900));
  }
  overviewMetricCache.set(cacheKey, series);
  return series;
}

function renderOverviewBand() {
  const w = bodyW();
  const h = 62;
  const top = 7;
  const bottom = 9;
  overviewMetricSeries = buildOverviewMetrics();
  const grid = [0.25, 0.5, 0.75].map((p) => {
    const y = top + (h - top - bottom) * p;
    return `<path d="M0 ${y.toFixed(2)} H${w}" stroke="rgba(255,255,255,0.055)" stroke-width="1"></path>`;
  }).join('');
  const layerGuides = MODEL.layerMarks.map((mark) => {
    const x = mark.t * pxPerUs();
    return `<path d="M${x.toFixed(2)} 0 V${h}" stroke="rgba(255,255,255,0.24)" stroke-width="1" stroke-dasharray="4 4"></path>`;
  }).join('');
  const paths = overviewMetricSeries.map((metric) => {
    const points = metric.values.map((value, i) => {
      const f = i / Math.max(1, metric.values.length - 1);
      const y = top + (1 - value / metric.max) * (h - top - bottom);
      return { x: f * w, y };
    });
    const line = smoothPath(points);
    const area = `${line} L${w.toFixed(2)},${(h - bottom).toFixed(2)} L0,${(h - bottom).toFixed(2)} Z`;
    return `<path d="${area}" fill="${metric.color}" opacity="0.10"></path><path d="${line}" fill="none" stroke="${metric.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"></path>`;
  }).join('');
  let marker = '';
  if (state.selTask) {
    const selected = selectedTaskView();
    const x = selected.start * pxPerUs();
    const mw = Math.max(2, (selected.end - selected.start) * pxPerUs());
    marker = `<div class="sl-overview-marker" style="left:${x}px;width:${mw}px"></div>`;
  }
  overviewBand.style.width = w + 'px';
  overviewBand.innerHTML = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">${grid}${layerGuides}${paths}</svg>${marker}<div class="sl-overview-tooltip pto-swimlane-task-tooltip" id="overviewTooltip" hidden aria-hidden="true"></div>`;
}

function renderGlobalRuler() {
  if (!globalRulerTicks) return;
  const rulerWidth = visibleTrackW();
  globalRulerScale.style.width = rulerWidth + 'px';
  const { majorStep, minorStep } = adaptiveTimeSteps(MODEL.timelineEnd, rulerWidth, 46);
  let html = '';
  for (let t = 0; t <= MODEL.timelineEnd + minorStep * 0.25; t += minorStep) {
    const major = Math.abs(t / majorStep - Math.round(t / majorStep)) < 1e-6;
    html += `<div class="sl-global-ruler__tick ${major ? 'is-major' : ''}" style="left:${(t / MODEL.timelineEnd * 100).toFixed(4)}%">${major ? formatTimeTick(t) + 'μs' : ''}</div>`;
  }
  globalRulerTicks.innerHTML = html;
  syncGlobalRulerBrush();
}

function syncGlobalRulerBrush() {
  if (!globalRulerBrush) return;
  const w = bodyW();
  const visible = Math.max(1, bodyWrap.clientWidth || visibleTrackW());
  const leftF = Math.max(0, Math.min(1, bodyWrap.scrollLeft / w));
  const widthF = Math.max(0.01, Math.min(1 - leftF, visible / w));
  const trackW = visibleTrackW();
  const isFull = leftF <= 0.002 && widthF >= 0.998;
  globalRulerBrush.style.left = (isFull ? 0 : leftF * trackW) + 'px';
  globalRulerBrush.style.width = (isFull ? trackW : Math.max(3, widthF * trackW)) + 'px';
}

function formatMetricValue(metric, value) {
  if (metric.key === 'hostQueue') return value.toFixed(1);
  if (metric.key === 'activeAi') return Math.round(value) + metric.unit;
  if (metric.key === 'mteBw') return Math.round(value) + metric.unit;
  return value.toFixed(1) + metric.unit;
}

function showTimestampGuideAt(clientX) {
  if (!timestampGuide || !swimlaneScrollShell) return;
  const shellRect = swimlaneScrollShell.getBoundingClientRect();
  const left = Math.max(LABEL_W, Math.min(shellRect.width - 1, clientX - shellRect.left));
  timestampGuide.style.left = left + 'px';
  timestampGuide.hidden = false;
  timestampGuide.setAttribute('aria-hidden', 'false');
  if (state.secondaryViewMode === 'comparison' && compareTimestampGuide && compareGrid) {
    const compareRect = compareGrid.getBoundingClientRect();
    const compareLeft = Math.max(LABEL_W, Math.min(compareRect.width - 1, clientX - compareRect.left));
    compareTimestampGuide.style.left = compareLeft + 'px';
    compareTimestampGuide.hidden = false;
    compareTimestampGuide.setAttribute('aria-hidden', 'false');
  }
}

function hideTimestampGuide() {
  if (timestampGuide) {
    timestampGuide.hidden = true;
    timestampGuide.setAttribute('aria-hidden', 'true');
  }
  if (compareTimestampGuide) {
    compareTimestampGuide.hidden = true;
    compareTimestampGuide.setAttribute('aria-hidden', 'true');
  }
}

function showOverviewTooltip(e) {
  if (!overviewMetricSeries.length) return;
  const rect = overviewBand.getBoundingClientRect();
  if (!rect.width) return;
  const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
  const f = x / rect.width;
  const idx = Math.max(0, Math.min(overviewMetricSeries[0].values.length - 1, Math.round(f * (overviewMetricSeries[0].values.length - 1))));
  const t = f * MODEL.timelineEnd;
  const tip = document.getElementById('overviewTooltip');
  if (!tip) return;
  showTimestampGuideAt(e.clientX);
  const rows = overviewMetricSeries.map((metric) => (
    `<div class="pto-swimlane-task-tooltip__row"><span class="pto-swimlane-task-tooltip__key"><span class="sl-overview-tip-swatch" style="background:${metric.color}"></span>${metric.label}</span><span class="pto-swimlane-task-tooltip__value">${formatMetricValue(metric, metric.values[idx])}</span></div>`
  )).join('');
  tip.innerHTML = `<div class="pto-swimlane-task-tooltip__title">时间戳 ${t.toFixed(1)}μs</div>${rows}`;
  tip.hidden = false;
  tip.classList.add('is-visible');
  tip.setAttribute('aria-hidden', 'false');
  const tw = tip.offsetWidth || 214;
  const left = x + 12 + tw > rect.width ? x - tw - 12 : x + 12;
  tip.style.left = Math.max(2, Math.min(rect.width - tw - 2, left)) + 'px';
  tip.style.top = '6px';
}

function hideOverviewTooltip() {
  const tip = document.getElementById('overviewTooltip');
  hideTimestampGuide();
  if (tip) {
    tip.classList.remove('is-visible');
    tip.setAttribute('aria-hidden', 'true');
    tip.hidden = true;
  }
}

function runDotClass(runId) {

const runDotColorCache = new Map();
function runDotColor(runId) {
  const cls = runDotClass(runId);
  if (runDotColorCache.has(cls)) return runDotColorCache.get(cls);
  const probe = document.createElement('span');
