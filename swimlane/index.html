<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimlane Viewer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23121318'/%3E%3Crect x='12' y='18' width='40' height='8' rx='4' fill='%237b57bf'/%3E%3Crect x='12' y='30' width='28' height='8' rx='4' fill='%234d79d4'/%3E%3Crect x='12' y='42' width='34' height='8' rx='4' fill='%234da56d'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="./styles.css">
<style>
html.preview .toolbar,
html.preview #swSummary,
html.preview #swEmptyState,
html.preview .sw-lane-header,
html.preview .sw-lane-label-viewport { display: none !important; }
html.preview .sw-page { overflow: hidden; }
html.preview #swViewer { padding: 0; flex: 1; }
html.preview .sw-grid {
  height: 100vh;
  grid-template-columns: 1fr !important;
  grid-template-rows: 46px 1fr !important;
}
html.preview * { pointer-events: none !important; cursor: default !important; }
</style>
<script>if(new URLSearchParams(location.search).get('preview')==='1')document.documentElement.classList.add('preview');</script>
</head>
<body>
  <div class="sw-page">
    <header class="toolbar">
      <div class="toolbar-l">
        <a class="home-link" href="../launch.html" title="Back To Home" aria-label="Back To Home">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 6.2L7 2l5 4.2v5.1a.7.7 0 01-.7.7H8.6V8.9a.6.6 0 00-.6-.6H6a.6.6 0 00-.6.6V12H2.7a.7.7 0 01-.7-.7V6.2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="toolbar-logo">Swimlane 执行视图</div>
        <span class="graph-title" id="swFileMeta">正在准备内置泳道样例</span>
      </div>
      <div class="toolbar-r">
        <div class="sw-search-group">
          <input id="swSearchInput" class="sw-search-input" type="search" placeholder="搜索 task / lane / label">
          <button id="swSearchPrev" class="sw-btn sw-btn-secondary" type="button">上一个</button>
          <button id="swSearchNext" class="sw-btn sw-btn-secondary" type="button">下一个</button>
          <span id="swSearchCount" class="sw-search-count">0 / 0</span>
        </div>
        <div class="sw-action-group">
          <button id="swOpenLocalBtn" class="sw-btn sw-btn-primary" type="button">选择本地文件（.json）</button>
          <button id="swZoomOutBtn" class="sw-btn sw-btn-secondary" type="button">缩小</button>
          <button id="swZoomInBtn" class="sw-btn sw-btn-secondary" type="button">放大</button>
          <button id="swZoomFitBtn" class="sw-btn sw-btn-secondary" type="button">适配</button>
          <input id="swFileInput" type="file" accept=".json,application/json" hidden>
        </div>
      </div>
    </header>

    <section class="sw-summary" id="swSummary"></section>

    <section id="swEmptyState" class="sw-empty-state">
      <div class="sw-empty-card">
        <h2>正在准备泳道视图</h2>
        <p>页面默认会打开内置样例，也可从 Launcher 或当前页面选择本地 <code>merged_swimlane.json</code>。</p>
      </div>
    </section>

    <section id="swViewer" class="sw-viewer" hidden>
      <div class="sw-grid">
        <div class="sw-lane-header">Machine View</div>
        <div class="sw-timeline-viewport" id="swTimelineViewport">
          <div class="sw-timeline-track" id="swTimelineTrack"></div>
        </div>
        <div class="sw-lane-label-viewport">
          <div class="sw-lane-label-track" id="swLaneLabelTrack"></div>
        </div>
        <div class="sw-lane-main-viewport" id="swLaneMainViewport">
          <div class="sw-lane-main-track" id="swLaneMainTrack"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
