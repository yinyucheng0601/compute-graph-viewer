function hitTest(px, py) {
  const row = hitRowAt(py);
  if (row < 0 || row >= rowItems.length) return null;
  const coreIdx = rowToCore[row];
  if (coreIdx == null) return null;
  const scale = pxPerUs();
  /* 聚合视图下每个 core 拆成 base/compare 两行：命中对比行时改扫对比 run 自己的任务列表
     （聚合视图里 Mix 模式恒为关闭，对比行不需要处理微分段/流水子泳道）。 */
  if (rowItems[row]?.runSlot === 'compare') {
    const run = comparisonRun();
    if (!run) return null;
    for (const t of run.model.tasks) {
      if (t.coreIdx !== coreIdx) continue;
      const geometry = taskBarGeometry(t, t.start, t.end, scale);
      if (compareTaskRow(t) === row && px >= geometry.x - 1 && px <= geometry.x + geometry.width + 1) {
        return { task: t, segment: null, run: 'compare' };
      }
    }
    return null;
  }
  for (const t of MODEL.tasks) {
    if (t.coreIdx !== coreIdx) continue;
    if (state.mixMode && t.microSegments?.length) {
      const expanded = state.expandedLaneCores.has(coreIdx);
      const sublane = expanded ? rowItems[row]?.sublane : null;
      const segments = expanded ? (t.pipelineSegments || []) : t.microSegments;
      const eligible = (candidate) => candidate.id
        && (!expanded || candidate.sublane === sublane)
        && (expanded || taskRow(t) === row);
      const marker = !expanded ? segments.find((candidate) => eligible(candidate)
        && (candidate.kind === 'set' || candidate.kind === 'wait-point')
        && Math.abs(px - candidate.start * scale) <= 3) : null;
      const segment = marker || segments.find((candidate) => eligible(candidate)
        && px >= candidate.start * scale - 1 && px <= candidate.end * scale + 1);
      if (segment) return { task: t, segment, run: 'base' };
    }
    if (state.expandedLaneCores.has(coreIdx)) {
      const sublane = rowItems[row]?.sublane;
      const hit = (t.pipelineSegments || []).some((segment) => segment.sublane === sublane
        && px >= segment.start * scale - 1 && px <= segment.end * scale + 1);
      if (hit) return { task: t, segment: null, run: 'base' };
      continue;
    }
    const geometry = taskBarGeometry(t, t.start, t.end, scale);
    if (taskRow(t) === row && px >= geometry.x - 1 && px <= geometry.x + geometry.width + 1) {
      return { task: t, segment: null, run: 'base' };
    }
  }
  return null;
}

function coreStats(coreIdx, group, wrap) {
  let compute = 0, wait = 0, n = 0;
  for (const t of MODEL.tasks) {
    if (t.coreIdx !== coreIdx) continue;
    if (group != null && t.group !== group) continue;
    const blocked = taskBlockedWait(t);
    compute += Math.max(0, t.end - t.start - blocked); wait += blocked; n++;
  }
  return { compute, wait, n, ratio: wait / (compute + wait || 1) };
}
function intervalUnionDuration(intervals) {
  const sorted = intervals
    .filter(([start, end]) => Number.isFinite(start) && Number.isFinite(end) && end > start)
    .sort((left, right) => left[0] - right[0]);
  const merged = [];
  sorted.forEach(([start, end]) => {
    const previous = merged[merged.length - 1];
    if (!previous || start > previous[1]) merged.push([start, end]);
    else previous[1] = Math.max(previous[1], end);
  });
  return merged.reduce((sum, [start, end]) => sum + end - start, 0);
}
function taskBlockedIntervals(task) {
  return (task.syncIn || [])
    .map((id) => edgeById[id])
    .filter((edge) => edge?.relation === 'sync' && edge.waitTask?.id === task.id && edge.blockedWait > 0)
    .map((edge) => [edge.waitTime, edge.releaseTime]);
}
function taskBlockedWait(task) {
  return intervalUnionDuration(taskBlockedIntervals(task));
}
function groupStats(g) {
  let compute = 0, wait = 0;
  for (const t of MODEL.tasks) {
    if (t.group !== g) continue;
    if (MODEL.cores[t.coreIdx].kind !== 'aic' && MODEL.cores[t.coreIdx].kind !== 'aiv') continue;
    const blocked = taskBlockedWait(t);
    compute += Math.max(0, t.end - t.start - blocked); wait += blocked;
  }
  return { compute, wait, ratio: wait / (compute + wait || 1) };
}
function wrapStats(w) {
  const tasks = MODEL.tasks.filter((task) => task.wrap === w);
  const s = (kind, vector = null) => {
    const selected = tasks.filter((task) => {
      const core = MODEL.cores[task.coreIdx];
      return core.kind === kind && (vector == null || core.vector === vector);
    });
    const wait = selected.reduce((sum, task) => sum + taskBlockedWait(task), 0);
    const compute = selected.reduce((sum, task) => sum + Math.max(0, task.end - task.start - taskBlockedWait(task)), 0);
    return { compute, wait, n: selected.length, ratio: wait / (compute + wait || 1) };
  };
  const all = [s('aic'), s('aiv', 0), s('aiv', 1)];
  let compute = 0, wait = 0;
  all.forEach((x) => { compute += x.compute; wait += x.wait; });
  return { aic: all[0], aiv0: all[1], aiv1: all[2], ratio: wait / (compute + wait || 1) };
}

function runMetricChips() {
  const machineDuration = MODEL.tasks
    .filter((task) => task.phase === 'MACHINE_LEAF_TASK')
    .reduce((sum, task) => sum + task.end - task.start, 0);
  const wait = CURRENT_RUN.performanceStatistics.taskWaitUnionSum;
  const ratio = (wait / Math.max(1, machineDuration) * 100).toFixed(1);
  const syncCount = MODEL.edges.filter((edge) => edge.relation === 'sync').length;
  const dependencyCount = MODEL.edges.length - syncCount;
  return `<div class="sl-report-metrics">
    <span class="stat-chip">${MODEL.cores.length} 条泳道</span>
    <span class="stat-chip">${MODEL.tasks.length} 个任务</span>
    <span class="stat-chip">${dependencyCount} 条任务依赖</span>
    <span class="stat-chip">${syncCount} 条同步/等待</span>
    <span class="stat-chip" style="color:var(--warning)">同步等待 ${ratio}%</span>
  </div>`;
}

function blockGraphSpec(t) {

function blockGraphEdgePath(source, target) {
  const x1 = source.x + Number(source.frame?.width || 190);
  const y1 = source.y + Number(source.frame?.height || source.frame?.minHeight || 72) / 2;
  const x2 = target.x;
  const y2 = target.y + Number(target.frame?.height || target.frame?.minHeight || 72) / 2;
  const bend = Math.max(36, Math.abs(x2 - x1) * 0.42);
  return `M${x1},${y1} C${x1 + bend},${y1} ${x2 - bend},${y2} ${x2},${y2}`;
}

/* ============================================================
   9b. 训练级 Timeline 泳道（对比模式）
   对比的不再是单个算子，而是整个训练：上下两栏统一换成 index_v3.html
   Timeline 页签的 Host ▸ Rank ▸ {Ascend Hardware / Communication /
   Overlap Analysis} 树结构（复用同一套 parser.js + swimlane.js 引擎）。
   泳道内的具体任务条数据按 run.id 哈希自由构造，用于呈现两次训练的差异。
   ============================================================ */
function hashSeed(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return h >>> 0;
}

// mulberry32() 复用文件顶部已声明的同名 PRNG。

// 训练级泳道沿用「原版」算子级泳道（本页 OPERATOR_TASK_COLORMAP）的取色体系，
// 不用 swimlane.js 自带的 Timeline 语义色——保持对比模式与本页其余泳道视觉语言一致。
// 按 labelColors 的 8 色逐类分配（不只挑 kind 色那 4 种），把绿/粉这类原版里用过、
// 但之前的 aic/aiv/mte/other 4 色子集里没覆盖到的颜色也用上。
const TRAIN_LABEL_KIND_COLOR = {
  'Computing-AIC': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'QKV' }, 'semantic'),       // 蓝
  'Computing-AIV': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'AttnQK' }, 'semantic'),    // 紫
  'Computing': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'FFN-Dn' }, 'semantic'),        // 绿
  'Comm-Transmit': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'AttnV' }, 'semantic'),     // 青
  'Comm-Wait': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'Resid' }, 'semantic'),         // 粉
  'Communication': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'KV-Upd' }, 'semantic'),    // 金
  'Communication(Not Overlapped)': OPERATOR_TASK_COLORMAP.colorForTask({ colorKey: 'FFN-Up' }, 'semantic'), // 橙
  'Free': OPERATOR_TASK_COLORMAP.colorForLaneKind('other'),                                    // 中性灰，空闲不抢视觉
};
if (typeof colorForTask === 'function') {
  const trainSwimlaneBaseColorForTask = colorForTask;
  // eslint-disable-next-line no-func-assign
  colorForTask = function (task, mode) {
    const override = task && TRAIN_LABEL_KIND_COLOR[task.label];
    if (override) return override;
    return trainSwimlaneBaseColorForTask(task, mode);
  };
}

function buildTrainingSwimlaneData(run) {
  const rnd = mulberry32(hashSeed(String(run?.id || 'run')));
  // STEP_GAP_US 刻意压小：真实训练里 step 之间几乎背靠背，间隔不该比 step 本身还长，
  // 否则整条泳道乍看全是空隙（此前 20000us 的间隔比一个 step 的内容还长好几倍）。
  const HOSTS = 2, RANKS_PER_HOST = 2, STEPS = 4, STEP_GAP_US = 400;
  const jitter = () => 0.85 + rnd() * 0.3;
  // 每次 run 的整体健康度偏置：由 run.id 哈希决定，让两次对比的训练看起来不同
  const commWaitBias = 0.15 + rnd() * 0.35;
  const freeBias = 0.05 + rnd() * 0.22;

  const coreTasks = [];
  let tid = 0;
  const hostNodes = [];

  for (let h = 0; h < HOSTS; h++) {
    const hostId = `node-${h}`;
    // 节点 id 不带 run.id 前缀：两栏结构完全一致的字符串，才能按行做跨栏选中同步。
    const hostNode = { id: hostId, label: `Host ${hostId}`, children: [] };
    for (let r = 0; r < RANKS_PER_HOST; r++) {
      const rankId = h * RANKS_PER_HOST + r;
      const P = `${hostId}▸R${rankId}`;
      const rankNode = { id: P, label: `Rank ${rankId}`, children: [], collapsed: !(h === 0 && r === 0) };

      const hwTasks = { AI_CORE: [], AI_VECTOR_CORE: [] };
      const commTasks = { 'G1·collective': [], 'G2·p2p': [] };
      const overlapTasks = { Computing: [], Communication: [], 'Communication(Not Overlapped)': [], Free: [] };

      let cursor = 0;
      for (let s = 0; s < STEPS; s++) {
        const stepStart = cursor;
        const computeUs = (2200 + rnd() * 800) * jitter();
        const commUs = (900 + rnd() * 500) * (1 + commWaitBias);
        const commOverlapUs = Math.max(0, commUs * (1 - commWaitBias)) * 0.6;
        const commNotOverlapUs = Math.max(0, commUs - commOverlapUs);
        const freeUs = (150 + rnd() * 300) * (1 + freeBias);

        let t = stepStart;
        const nKernels = 6 + Math.floor(rnd() * 4);
        for (let k = 0; k < nKernels; k++) {
          const dur = (computeUs / nKernels) * jitter();
          hwTasks.AI_CORE.push({
            taskId: tid++, subGraphId: s,
            execStart: Number(t.toFixed(2)), execEnd: Number((t + dur).toFixed(2)),
            semanticLabel: 'Computing-AIC',
            taskName: `Rank ${rankId} · Step ${s} · MatMul/FA kernel ${(dur / 1000).toFixed(2)}ms`,
          });
          t += dur;
          if (rnd() > 0.5) {
            const vdur = dur * 0.3;
            hwTasks.AI_VECTOR_CORE.push({
              taskId: tid++, subGraphId: s,
              execStart: Number(t.toFixed(2)), execEnd: Number((t + vdur).toFixed(2)),
              semanticLabel: 'Computing-AIV',
              taskName: `Rank ${rankId} · Step ${s} · Vector kernel ${(vdur / 1000).toFixed(2)}ms`,
            });
          }
        }
        const computeEnd = stepStart + computeUs;

        let ct = computeEnd;
        commTasks['G1·collective'].push({
          taskId: tid++, subGraphId: s,
          execStart: Number(ct.toFixed(2)), execEnd: Number((ct + commOverlapUs).toFixed(2)),
          semanticLabel: 'Comm-Transmit',
          taskName: `Rank ${rankId} · Step ${s} · AllReduce 传输 ${(commOverlapUs / 1000).toFixed(2)}ms`,
        });
        ct += commOverlapUs;
        commTasks['G2·p2p'].push({
          taskId: tid++, subGraphId: s,
          execStart: Number(ct.toFixed(2)), execEnd: Number((ct + commNotOverlapUs).toFixed(2)),
          semanticLabel: 'Comm-Wait',
          taskName: `Rank ${rankId} · Step ${s} · P2P 等待同步 ${(commNotOverlapUs / 1000).toFixed(2)}ms`,
        });
        const commEnd = ct + commNotOverlapUs;
        const stepEnd = commEnd + freeUs;

        overlapTasks.Computing.push({ taskId: tid++, subGraphId: s, execStart: stepStart, execEnd: computeEnd, semanticLabel: 'Computing', taskName: `Rank ${rankId} · Step ${s} · Computing ${(computeUs / 1000).toFixed(2)}ms` });
        overlapTasks.Communication.push({ taskId: tid++, subGraphId: s, execStart: computeEnd, execEnd: commEnd, semanticLabel: 'Communication', taskName: `Rank ${rankId} · Step ${s} · Communication ${(commUs / 1000).toFixed(2)}ms` });
        overlapTasks['Communication(Not Overlapped)'].push({ taskId: tid++, subGraphId: s, execStart: computeEnd + commOverlapUs, execEnd: commEnd, semanticLabel: 'Communication', taskName: `Rank ${rankId} · Step ${s} · 未掩盖通信 ${(commNotOverlapUs / 1000).toFixed(2)}ms` });
        overlapTasks.Free.push({ taskId: tid++, subGraphId: s, execStart: commEnd, execEnd: stepEnd, semanticLabel: 'Free', taskName: `Rank ${rankId} · Step ${s} · Free（调度空泡）${(freeUs / 1000).toFixed(2)}ms` });

        cursor = stepEnd + STEP_GAP_US;
      }

      const hwNode = { id: `${P}▸AHW`, label: 'Ascend Hardware', children: [] };
      const streamNode = { id: `${P}▸AHW▸S0`, label: 'Stream 0', children: [] };
      for (const core of ['AI_CORE', 'AI_VECTOR_CORE']) {
        const tasks = hwTasks[core];
        if (!tasks.length) continue;
        const leafKey = `${P}▸AHW▸S0▸${core}`;
        coreTasks.push({ blockIdx: coreTasks.length, coreType: leafKey, tasks });
        streamNode.children.push({ id: leafKey, label: `${core} (${tasks.length})`, leafKey });
      }
      hwNode.children.push(streamNode);
      rankNode.children.push(hwNode);

      const commNode = { id: `${P}▸COMM`, label: 'Communication', children: [] };
      for (const key of Object.keys(commTasks)) {
        const tasks = commTasks[key];
        if (!tasks.length) continue;
        const leafKey = `${P}▸COMM▸${key}`;
        coreTasks.push({ blockIdx: coreTasks.length, coreType: leafKey, tasks });
        commNode.children.push({ id: leafKey, label: `${key} (${tasks.length})`, leafKey });
      }
      rankNode.children.push(commNode);

      const overlapNode = { id: `${P}▸OVL`, label: 'Overlap Analysis', children: [] };
      for (const key of Object.keys(overlapTasks)) {
        const tasks = overlapTasks[key];
        if (!tasks.length) continue;
        const leafKey = `${P}▸OVL▸${key}`;
        coreTasks.push({ blockIdx: coreTasks.length, coreType: leafKey, tasks });
        overlapNode.children.push({ id: leafKey, label: key, leafKey });
      }
      rankNode.children.push(overlapNode);

      hostNode.children.push(rankNode);
    }
    hostNodes.push(hostNode);
  }

  return { coreTasks, laneTree: { children: hostNodes } };
}

/* 聚合视图：把基线/对比两个 run 的训练泳道树按叶子泳道两两拼接，每个叶子下拆成
   base/compare 两个子行紧邻显示——两个 run 的 laneTree 结构（Host/Rank/... 的 id 命名）
   完全一致（buildTrainingSwimlaneData 内部注释已写明"两栏结构完全一致的字符串"），
   直接按 leafKey 对应拼接即可，不需要改 SwimlaneRenderer 本身。子行 coreName 里
   带 §base/§compare 后缀，天然跟 positionalKeyOfEvent 的按 coreName 定位方式对齐，
   不会和另一侧的任务条撞 key。 */
function buildAggregatedTrainingSwimlane(topRun, bottomRun) {
  const topBuilt = buildTrainingSwimlaneData(topRun);
  const bottomBuilt = buildTrainingSwimlaneData(bottomRun);
  const topTasksByLeaf = new Map(topBuilt.coreTasks.map((c) => [c.coreType, c.tasks]));
  const bottomTasksByLeaf = new Map(bottomBuilt.coreTasks.map((c) => [c.coreType, c.tasks]));
  const mergedCoreTasks = [];
  const walkNode = (node) => {
    if (Array.isArray(node.children)) {
      return Object.assign({}, node, { children: node.children.map(walkNode) });
    }
    const leafKey = node.leafKey;
    const baseLeafKey = `${leafKey}§base`, compareLeafKey = `${leafKey}§compare`;
    mergedCoreTasks.push({ blockIdx: mergedCoreTasks.length, coreType: baseLeafKey, tasks: topTasksByLeaf.get(leafKey) || [] });
    mergedCoreTasks.push({ blockIdx: mergedCoreTasks.length, coreType: compareLeafKey, tasks: bottomTasksByLeaf.get(leafKey) || [] });
    return {
      id: `${node.id}§agg`, label: node.label,
      children: [
        { id: baseLeafKey, label: truncateRunId(topRun.id, 22), leafKey: baseLeafKey },
        { id: compareLeafKey, label: truncateRunId(bottomRun.id, 22), leafKey: compareLeafKey },
      ],
    };
  };
  const mergedLaneTree = { children: (topBuilt.laneTree.children || []).map(walkNode) };
  return { coreTasks: mergedCoreTasks, laneTree: mergedLaneTree };
}

/* ============================================================
   训练级对比 · 泳道差异看板（右侧性能统计面板在对比模式下的替代内容）
   ------------------------------------------------------------
   数据来自 buildTrainingSwimlaneData 的确定性构造（同一 run.id 复算结果一致），
   按叶子泳道（leafKey，两侧结构对齐）汇总 busy 时长，再取相对差异幅度排序。
   ============================================================ */
const TRAIN_GROUP_LABELS = { AHW: 'Ascend Hardware', COMM: 'Communication', OVL: 'Overlap Analysis' };
const TRAIN_LEAF_LABELS = {
  AI_CORE: 'AI Core',
  AI_VECTOR_CORE: 'AI Vector Core',
  'G1·collective': 'G1 · Collective',
  'G2·p2p': 'G2 · P2P',
  Computing: 'Computing',
  Communication: 'Communication',
  'Communication(Not Overlapped)': 'Communication（未掩盖）',
  Free: 'Free（调度空泡）',
};
const DIFF_WARN_THRESHOLD = 10;

function laneGroupIdOf(leafKey) {
  return leafKey.split('▸').slice(0, 2).join('▸');
}

function laneKeyPath(leafKey) {
  const segs = leafKey.split('▸');
  const rankLabel = `Rank ${segs[1].replace(/^R/, '')}`;
  const groupToken = segs[2];
  const groupLabel = TRAIN_GROUP_LABELS[groupToken] || groupToken;
  const leafToken = groupToken === 'AHW' ? segs[4] : segs[3];
  const leafLabel = TRAIN_LEAF_LABELS[leafToken] || leafToken;
  return `${rankLabel} › ${groupLabel} › ${leafLabel}`;
}

function laneBusyStats(run) {
  const built = buildTrainingSwimlaneData(run);
  const stats = new Map();
  built.coreTasks.forEach(({ coreType, tasks }) => {
    const busyUs = tasks.reduce((sum, t) => sum + Math.max(0, t.execEnd - t.execStart), 0);
    stats.set(coreType, { busyUs, count: tasks.length });
  });
  return stats;
}

function computeLaneDiffCards() {
  const topRun = RUN_BY_ID[state.selectedRunId];
  const bottomRun = RUN_BY_ID[state.comparisonRunId];
  if (!topRun || !bottomRun) return [];
  const topStats = laneBusyStats(topRun);
  const bottomStats = laneBusyStats(bottomRun);
  const leafKeys = new Set([...topStats.keys(), ...bottomStats.keys()]);
  const cards = [];
  leafKeys.forEach((leafKey) => {
    const top = topStats.get(leafKey) || { busyUs: 0, count: 0 };
    const bottom = bottomStats.get(leafKey) || { busyUs: 0, count: 0 };
    const base = Math.max(top.busyUs, bottom.busyUs, 1e-6);
    const diffPct = (Math.abs(top.busyUs - bottom.busyUs) / base) * 100;
    cards.push({
      leafKey,
      path: laneKeyPath(leafKey),
      topUs: top.busyUs, bottomUs: bottom.busyUs, diffPct,
      itemCount: top.count + bottom.count,
      direction: bottom.busyUs > top.busyUs ? 'up' : (bottom.busyUs < top.busyUs ? 'down' : 'flat'),
    });
  });
  cards.sort((a, b) => b.diffPct - a.diffPct);
  return cards;
}

/* ── PHS 仪表盘（缩小版，复用 index_v3.html app.js 的 renderPhsGauge / gradeColorAt / gradeToColor / hexA）── */
function compareGradeColorAt(v) {
  const stops = [
    [0, [255, 75, 123]],
    [30, [255, 112, 81]],
    [45, [255, 151, 55]],
    [60, [233, 181, 27]],
    [75, [163, 203, 69]],
    [90, [4, 215, 147]],
    [100, [4, 215, 147]],
  ];
  v = Math.max(0, Math.min(100, v));
  for (let i = 0; i < stops.length - 1; i++) {
    const [v0, c0] = stops[i], [v1, c1] = stops[i + 1];
    if (v <= v1) {
      const t = (v - v0) / (v1 - v0 || 1);
      const r = Math.round(c0[0] + (c1[0] - c0[0]) * t);
      const g = Math.round(c0[1] + (c1[1] - c0[1]) * t);
      const b = Math.round(c0[2] + (c1[2] - c0[2]) * t);
      return `rgb(${r},${g},${b})`;
    }
  }
  return 'rgb(2,153,49)';
}
function compareHexA(hex, a) {
  const h = hex.replace('#', '');
  const full = h.length === 3 ? h.split('').map(function (c) { return c + c; }).join('') : h;
  const n = parseInt(full, 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}
function compareGradeToColor(g) {
  return { S: '#13a692', A: '#00782d', 'B+': '#929710', B: '#845a00', C: '#eb5a04', D: '#b60254' }[g] || '#999999';
}
function compareScoreToGrade(v) {
  if (v >= 85) return 'S';
  if (v >= 70) return 'A';
  if (v >= 55) return 'B+';
  if (v >= 40) return 'B';
  if (v >= 25) return 'C';
  return 'D';
}

/* 从训练级泳道数据推算 PHS 近似值（busy 比例 × 100） */
function computeRunPhs(run) {
  if (!run) return { current: 0, estimated: 0, grade: 'N/A', estGrade: 'N/A' };
  // 基线 > 对比：以 run.id 中是否含 baseline/base 等关键词区分
  var id = String(run.id || '');
  var isBase = /baseline|base|001/.test(id);
  var current = isBase ? 82 + (hashSeed(id) % 8) : 58 + (hashSeed(id) % 14);
  var estimated = Math.min(100, Math.round(current * 1.14 + (hashSeed(id + 'est') % 7)));
  return { current: current, estimated: estimated, grade: compareScoreToGrade(current), estGrade: compareScoreToGrade(estimated) };
}

/* 缩小版仪表盘 SVG 渲染（原 300×200 → 220×140） */
function renderCompareGauge(box, phs) {
  if (!box) return;
  var cur = Math.max(0, Math.min(100, Math.round(phs.current || 0)));
  var est = Math.max(cur, Math.min(100, Math.round(phs.estimated || cur)));
  var grade = phs.grade || 'N/A';
  var estGrade = phs.estGrade || grade;
  var curColor = compareGradeToColor(grade);
  var estColor = compareGradeToColor(estGrade);

  var W = 220, H = 140, cx = 110, cy = 112;
  var rOut = 96, rIn = 78;
  var N = 52;
  var A0 = 180, A1 = 0;
  var polar = function (r, aDeg) {
    var a = aDeg * Math.PI / 180;
    return [cx + r * Math.cos(a), cy - r * Math.sin(a)];
  };
  var angOf = function (v) { return A0 - (v / 100) * (A0 - A1); };

  var ticks = '';
  for (var i = 0; i < N; i++) {
    var v = (i + 0.5) / N * 100;
    var aDeg = angOf(v);
    var p1 = polar(rIn, aDeg), p2 = polar(rOut, aDeg);
    var color, opacity;
    if (v <= cur)      { color = compareGradeColorAt(v); opacity = 1; }
    else if (v <= est) { color = compareGradeColorAt(v); opacity = 0.42; }
    else               { color = '#8a8a96'; opacity = 0.5; }
    ticks += '<line x1="' + p1[0].toFixed(1) + '" y1="' + p1[1].toFixed(1) + '" x2="' + p2[0].toFixed(1) + '" y2="' + p2[1].toFixed(1) + '" stroke="' + color + '" stroke-width="3" stroke-linecap="round" opacity="' + opacity + '"/>';
  }

  var aCur = angOf(cur);
  var fmtPt = function (r, a) { var p = polar(r, a); return p[0].toFixed(1) + ',' + p[1].toFixed(1); };
  var pointer = '<polygon points="' + fmtPt(rIn - 1, aCur) + ' ' + fmtPt(rIn - 10, aCur - 3) + ' ' + fmtPt(rIn - 10, aCur + 3) + '" fill="var(--foreground)"/>';

  var gainArrow = '';
  if (est > cur + 1) {
    var aEst = angOf(est);
    var r2 = rOut + 13;
    var sx = polar(r2, aCur), ex = polar(r2, aEst);
    gainArrow += '<path d="M ' + sx[0].toFixed(1) + ' ' + sx[1].toFixed(1) + ' A ' + r2 + ' ' + r2 + ' 0 0 1 ' + ex[0].toFixed(1) + ' ' + ex[1].toFixed(1) + '" fill="none" stroke="' + estColor + '" stroke-width="1.6" stroke-linecap="round"/>';
    var bx = polar(r2, aEst + 4);
    var dx = ex[0] - bx[0], dy = ex[1] - bx[1];
    var len = Math.hypot(dx, dy) || 1; dx /= len; dy /= len;
    var px = -dy, py = dx;
    if (px * (ex[0] - cx) + py * (ex[1] - cy) < 0) { px = -px; py = -py; }
    var l = 6, w = 4;
    var barb = (ex[0] - dx * l + px * w).toFixed(1) + ',' + (ex[1] - dy * l + py * w).toFixed(1);
    var shaft = (ex[0] - dx * l).toFixed(1) + ',' + (ex[1] - dy * l).toFixed(1);
    gainArrow += '<polygon points="' + ex[0].toFixed(1) + ',' + ex[1].toFixed(1) + ' ' + barb + ' ' + shaft + '" fill="' + estColor + '"/>';
  }

  box.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">' + ticks + gainArrow + pointer + '</svg>' +
    '<div class="sl-compare-gauge-center">' +
      '<span class="sl-compare-gauge-grade" style="background:' + compareHexA(curColor, 0.15) + ';color:' + curColor + '">' + grade + '</span>' +
      '<div class="sl-compare-gauge-score" style="color:' + curColor + '">' + cur + '</div>' +
      '<div class="sl-compare-gauge-sub">优化后预估可达 <b>' + est + '</b>' +
        '<span class="sl-compare-gauge-estbadge" style="background:' + compareHexA(estColor, 0.15) + ';color:' + estColor + '">' + estGrade + '</span>' +
      '</div>' +
    '</div>';
}

/* ── 语义标签 → 渐变填充色（与泳道任务条配色一致）── */
function labelColorForTag(label) {
  var map = {
    'Computing-AIC': '#3F7DF6',
    'Computing-AIV': '#9B6BF0',
    'Computing': '#86C541',
    'Comm-Transmit': '#1FB6C9',
    'Comm-Wait': '#E25A92',
    'Communication': '#C9A24B',
    'Communication(Not Overlapped)': '#EF8A3C',
    'Free': '#7C8DB8',
  };
  return map[label] || '#5A92E6';
}

/* ── 对比详情：点击泳道任务条后下钻到单任务左右对比视图 ── */
function diffDetailHtml(taskKey) {
  var topRun = RUN_BY_ID[state.selectedRunId];
  var bottomRun = RUN_BY_ID[state.comparisonRunId];
  if (!topRun || !bottomRun || !taskKey) return '<div class="sl-empty-state">未找到可对比的运行。</div>';

  var topEvent = trainRenderers.top ? trainRenderers.top.findEventByPositionalKey(taskKey) : null;
  var bottomEvent = trainRenderers.bottom ? trainRenderers.bottom.findEventByPositionalKey(taskKey) : null;

  // 基线侧事件不存在则 fallback 到对比侧
  var primaryEvent = topEvent || bottomEvent;
  if (!primaryEvent) return '<div class="sl-empty-state">所选任务在当前数据中未找到。</div>';

  // 提取任务元信息
  var taskName = primaryEvent.displayName || primaryEvent.name || '';
  var laneName = taskKey.coreName || '';
  var label = primaryEvent.label || '';
  var stepId = primaryEvent.subGraphId != null ? 'Step ' + primaryEvent.subGraphId : '';

  // 构造示意对比项（用两 run 的 seed 派生差异值）
  var seedVal = hashSeed(topRun.id + '|' + bottomRun.id + '|' + taskKey.coreName + '|' + taskKey.label + '|' + taskKey.ordinal);
  var rnd = mulberry32(seedVal);

  var topDur = topEvent ? Math.round(topEvent.dur) : 0;
  var bottomDur = bottomEvent ? Math.round(bottomEvent.dur) : 0;
  var topStart = topEvent ? Math.round(topEvent.ts) : 0;
  var bottomStart = bottomEvent ? Math.round(bottomEvent.ts) : 0;
  var topEnd = topStart + topDur;
  var bottomEnd = bottomStart + bottomDur;

  // 额外构造项
  var topExec = Math.round(topDur * (0.65 + rnd() * 0.25));
  var bottomExec = Math.round(bottomDur * (0.62 + rnd() * 0.28));
  var topWait = topDur - topExec;
  var bottomWait = bottomDur - bottomExec;
  var topOverlap = Math.round(topDur * rnd() * 0.35);
  var bottomOverlap = Math.round(bottomDur * rnd() * 0.38);
  var topIdle = Math.round(topDur * rnd() * 0.12);
  var bottomIdle = Math.round(bottomDur * rnd() * 0.15);

  var rows = [
    { label: '启动时间', unit: 'μs', top: topStart, bottom: bottomStart, better: 'low' },
    { label: '结束时间', unit: 'μs', top: topEnd, bottom: bottomEnd, better: 'low' },
    { label: '持续时长', unit: 'μs', top: topDur, bottom: bottomDur, better: 'low' },
    { label: '执行耗时', unit: 'μs', top: topExec, bottom: bottomExec, better: 'low' },
    { label: '同步等待', unit: 'μs', top: topWait, bottom: bottomWait, better: 'low' },
    { label: '计算-通信重叠', unit: 'μs', top: topOverlap, bottom: bottomOverlap, better: 'high' },
    { label: '空闲间隙', unit: 'μs', top: topIdle, bottom: bottomIdle, better: 'low' },
  ];

  var topDotClass = runDotClass(topRun.id);
  var bottomDotClass = runDotClass(bottomRun.id);

  var html = '';
  // 任务信息摘要
  html += '<div class="sl-report-card">';
  html += '<div class="sl-report-card__title">选中任务</div>';
  html += '<div class="sl-detail-meta">';
  html += '<div class="sl-detail-meta__row"><span class="sl-detail-meta__key">任务名称</span><span class="sl-detail-meta__val monospace" title="' + escapeHtml(taskName) + '">' + escapeHtml(taskName) + '</span></div>';
  html += '<div class="sl-detail-meta__row"><span class="sl-detail-meta__key">归属泳道</span><span class="sl-detail-meta__val">' + escapeHtml(laneName) + '</span></div>';
  html += '<div class="sl-detail-meta__row"><span class="sl-detail-meta__key">语义标签</span><span class="sl-detail-meta__val"><span class="sl-detail-label-pill" style="background:' + (labelColorForTag(label)) + '">' + escapeHtml(label) + '</span></span></div>';
  html += '<div class="sl-detail-meta__row"><span class="sl-detail-meta__key">' + escapeHtml(stepId ? '所属 Step' : 'Wrap') + '</span><span class="sl-detail-meta__val monospace">' + escapeHtml(stepId || '—') + '</span></div>';
  html += '</div></div>';

  // 左右对比表
  html += '<div class="sl-report-card">';
  html += '<div class="sl-report-card__title">指标对比</div>';
  html += '<div class="sl-detail-compare">';
  // 表头
  html += '<div class="sl-detail-compare__head">';
  html += '<div class="sl-detail-compare__col sl-detail-compare__col--label">指标</div>';
  html += '<div class="sl-detail-compare__col sl-detail-compare__col--top"><span class="sl-detail-compare__dot dot ' + topDotClass + '"></span>' + escapeHtml(truncateRunId(topRun.id, 18)) + '</div>';
  html += '<div class="sl-detail-compare__col sl-detail-compare__col--bottom"><span class="sl-detail-compare__dot dot ' + bottomDotClass + '"></span>' + escapeHtml(truncateRunId(bottomRun.id, 18)) + '</div>';
  html += '</div>';
  // 数据行
  for (var ri = 0; ri < rows.length; ri++) {
    var r = rows[ri];
    var topBetter = false, bottomBetter = false;
    if (r.better === 'low') {
      topBetter = r.top < r.bottom;
      bottomBetter = r.bottom < r.top;
    } else {
      topBetter = r.top > r.bottom;
      bottomBetter = r.bottom > r.top;
    }
    html += '<div class="sl-detail-compare__row">';
    html += '<div class="sl-detail-compare__col sl-detail-compare__col--label">' + escapeHtml(r.label) + '</div>';
    html += '<div class="sl-detail-compare__col sl-detail-compare__col--top' + (topBetter ? ' is-better' : '') + '">' + formatCompareVal(r.top, r.unit) + '</div>';
    html += '<div class="sl-detail-compare__col sl-detail-compare__col--bottom' + (bottomBetter ? ' is-better' : '') + '">' + formatCompareVal(r.bottom, r.unit) + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  // 关联代码（嵌入右侧面板，不再使用底部栏）
  html += renderInlineCodeBlock();
  return html;
}

/* ── 内联代码块（嵌入 inspector 面板，缩小版）── */
function renderInlineCodeBlock() {
  var h = '';
  h += '<div class="sl-report-card">';
  h += '<div class="sl-report-card__title">关联代码</div>';
  h += '<div class="sl-inline-code">';
  h += '<div class="sl-inline-code__header">';
  h += '<svg class="sl-inline-code__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg>';
  h += '<span class="sl-inline-code__filename">ascend_kernels/attention/self_attention_fusion.py</span>';
  h += '</div>';
  h += '<div class="sl-inline-code__lines">';
  MOCK_CODE_LINES.forEach(function (line) {
    var cls = line.key ? 'sl-code-line is-key' : 'sl-code-line';
    var text = '<span class="sl-code-line__text">';
    if (line.cls) {
      text += '<span class="' + line.cls + '">' + escapeHtml(line.text) + '</span>';
    } else {
      text += escapeHtml(line.text);
    }
    text += '</span>';
    h += '<div class="' + cls + '">' + text + '</div>';
  });
  h += '</div></div>';
  return h;
}

function formatCompareVal(val, unit) {
  if (!Number.isFinite(val)) return '— ' + (unit || '');
  var num = Number(val);
  if (Math.abs(num) >= 1000) return num.toFixed(0) + ' ' + (unit || '');
  if (Math.abs(num) >= 100) return num.toFixed(1) + ' ' + (unit || '');
  return num.toFixed(2) + ' ' + (unit || '');
}

function diffCardHtml(card) {
  const active = state.diffSelectedLane === card.leafKey;
  const barPct = Math.min(100, Math.max(2, card.diffPct));
  return '<div class="sl-diff-card ' + (active ? 'is-active' : '') + '" data-diff-lane="' + escapeHtml(card.leafKey) + '" role="button" tabindex="0">' +
    '<div class="sl-diff-card__path">' + escapeHtml(card.path) + ' <small>泳道</small></div>' +
    '<div class="sl-diff-card__meter-row">' +
      '<span class="sl-diff-card__pct">' + card.diffPct.toFixed(1) + '%</span>' +
      '<div class="sl-meter"><div class="sl-meter-fill" style="width:' + barPct + '%"></div></div>' +
    '</div>' +
    '<div class="sl-diff-card__vals"><span>' + (card.topUs / 1000).toFixed(2) + 'ms</span><span>' + (card.bottomUs / 1000).toFixed(2) + 'ms</span></div>' +
  '</div>';
}

function diffDashboardHtml() {
  var topRun = RUN_BY_ID[state.selectedRunId];
  var bottomRun = RUN_BY_ID[state.comparisonRunId];
  if (!topRun || !bottomRun) return '<div class="sl-empty-state">未找到可对比的运行。</div>';
  var topPhs = computeRunPhs(topRun);
  var bottomPhs = computeRunPhs(bottomRun);
  var topDotClass = runDotClass(topRun.id);
  var bottomDotClass = runDotClass(bottomRun.id);
  return '<div class="sl-compare-cards">' +
    '<div class="sl-compare-card is-baseline">' +
      '<div class="sl-compare-card__head">' +
        '<span class="sl-compare-card__dot dot ' + topDotClass + '"></span>' +
        '<span class="sl-compare-card__name" title="' + escapeHtml(topRun.id) + '">' + escapeHtml(topRun.id) + '</span>' +
      '</div>' +
      '<span class="sl-compare-card__badge">基线</span>' +
      '<div class="sl-compare-card__gauge" id="compareGaugeTop"></div>' +
    '</div>' +
    '<div class="sl-compare-card is-compared">' +
      '<div class="sl-compare-card__head">' +
        '<span class="sl-compare-card__dot dot ' + bottomDotClass + '"></span>' +
        '<span class="sl-compare-card__name" title="' + escapeHtml(bottomRun.id) + '">' + escapeHtml(bottomRun.id) + '</span>' +
      '</div>' +
      '<div class="sl-compare-card__gauge" id="compareGaugeBottom"></div>' +
    '</div>' +
  '</div>' +
  (function () {
    var cards = computeLaneDiffCards();
    if (!cards.length) return '';
    var lanesTotal = cards.length;
    var differingCards = cards.filter(function (c) { return c.diffPct >= DIFF_WARN_THRESHOLD; });
    var lanesDiffering = differingCards.length;
    var itemsDiffering = differingCards.reduce(function (sum, c) { return sum + c.itemCount; }, 0);
    return '' +
      '<div class="sl-diff-stat-card">' +
        '<div class="sl-diff-stat-card__row"><span class="sl-diff-stat-card__label">差异泳道</span><span class="sl-diff-stat-card__num">' + lanesDiffering + ' / ' + lanesTotal + '</span></div>' +
        '<div class="sl-diff-stat-card__row"><span class="sl-diff-stat-card__label">差异项</span><span class="sl-diff-stat-card__num">' + itemsDiffering + '</span></div>' +
      '</div>' +
      '<div class="sl-insp-section">' +
        '<div class="sl-insp-section-label">泳道差异 · 按差异幅度排序（' + cards.length + '）</div>' +
        '<div class="sl-diff-card-list">' + cards.map(function (c) { return diffCardHtml(c); }).join('') + '</div>' +
        '<div class="sl-insp-hint">差异幅度 = |基线 − 对比对象| 的 busy 时长占两者较大值的比例；差异泳道 / 差异项按差异幅度 ≥ ' + DIFF_WARN_THRESHOLD + '% 统计。点击卡片可在上下两栏泳道中定位并高亮对应行。</div>' +
      '</div>';
  })();
}

function expandLaneGroupOn(renderer, groupId) {
  if (!renderer?.collapsedGroups?.has(groupId)) return;
  renderer.collapsedGroups.delete(groupId);
  renderer._rebuildRows();
  renderer._resize();
}

function selectDiffLane(leafKey) {
  if (!leafKey) return;
  state.diffSelectedLane = leafKey;
  const groupId = laneGroupIdOf(leafKey);
  if (isAggregatedSwimlane()) {
    // 聚合视图下同一个叶子泳道被拆成 §base/§compare 两行紧邻显示，rowMeta 里没有
    // 裸 leafKey 这一行了——直接 scrollToCore(leafKey) 会因为找不到行而定位失败。
    // 定位到 base 行本身，再把 compare 行塞进 extraActiveLaneKeys 一起高亮，
    // 跟点击任务条时"两条相邻泳道一起亮"的行为保持一致。
    const renderer = trainRenderers.top;
    if (renderer?.parsedData) {
      expandLaneGroupOn(renderer, groupId);
      const baseKey = `${leafKey}§base`, compareKey = `${leafKey}§compare`;
      renderer.extraActiveLaneKeys = [compareKey];
      renderer.scrollToCore(baseKey);
    }
  } else {
    ['top', 'bottom'].forEach((key) => {
      const renderer = trainRenderers[key];
      if (!renderer?.parsedData) return;
      expandLaneGroupOn(renderer, groupId);
      renderer.scrollToCore(leafKey);
    });
  }
  renderInspector();
}

// 返回差异看板：只重置 inspector 面板状态是不够的——画布上被选中的任务条（含聚合视图下
// 对侧同位任务条的高亮、跨栏连线）也要一并清掉，否则退回看板后任务条仍显示"已选中"。
// 复用 selectGroupedTrainEvent(null) / selectAggregatedTrainEvent(renderer, null)，
// 两者本就是"清除选中"的唯一入口，传 null 即可让画布、inspector、连线三处一次性归位。
function goBackToDashboard() {
  state.diffSelectedLane = null;
  if (isAggregatedSwimlane()) {
    const renderer = trainRenderers.top;
    if (renderer) { selectAggregatedTrainEvent(renderer, null); return; }
  } else if (trainRenderers.top) {
    selectGroupedTrainEvent(null);
    return;
  }
  state.inspectorView = 'dashboard';
  state.detailTaskKey = null;
  hideCrossLaneConnectors();
  renderInspector();
}

const trainRenderers = { top: null, bottom: null };
const TRAIN_TL_IDS = {
  top: { canvas: 'trainTimelineTopCanvas', label: 'trainTimelineTopLabel' },
  bottom: { canvas: 'trainTimelineBottomCanvas', label: 'trainTimelineBottomLabel' },
};

function mountTrainSwimlane(which, run) {
  if (!run || typeof SwimlaneRenderer !== 'function' || typeof parseTraceJSON !== 'function') return;
  const ids = TRAIN_TL_IDS[which];
  let renderer = trainRenderers[which];
  if (!renderer) {
    const canvasEl = document.getElementById(ids.canvas);
    const labelEl = document.getElementById(ids.label);
    if (!canvasEl || !labelEl) return;
    // showRelationLines:false —— 跨栏/跨行连线统一由 profileCompare.html 自己的
    // SVG overlay（drawTaskConnector）负责，组件自带的细箭头关掉，避免两条线叠在一起。
    renderer = new SwimlaneRenderer(canvasEl, labelEl, { labelWidth: 200, colorMode: 'semantic', showRelationLines: false });
    trainRenderers[which] = renderer;
    bindTrainSwimlaneCoreSelectSync(which, renderer);
  }
  const built = buildTrainingSwimlaneData(run);
  const parsed = parseTraceJSON(built.coreTasks);
  let analysis;
  try { analysis = (typeof analyzePerformance === 'function') ? analyzePerformance(parsed) : undefined; }
  catch (e) { analysis = undefined; }
  renderer.loadData(parsed, analysis, built.laneTree);
}

/* 聚合视图：复用 top 面板实例装载合并数据集，bottom 面板整体隐藏（见 setMergedTrainPanelHidden），
   不再单独装载 bottom——避免两个实例各画一份，桌面空间也不用被两个面板对半分。 */
function mountAggregatedTrainSwimlane(topRun, bottomRun) {
  if (!topRun || !bottomRun || typeof SwimlaneRenderer !== 'function' || typeof parseTraceJSON !== 'function') return;
  const ids = TRAIN_TL_IDS.top;
  let renderer = trainRenderers.top;
  if (!renderer) {
    const canvasEl = document.getElementById(ids.canvas);
    const labelEl = document.getElementById(ids.label);
    if (!canvasEl || !labelEl) return;
    // showRelationLines:false —— 跨栏/跨行连线统一由 profileCompare.html 自己的
    // SVG overlay（drawTaskConnector）负责，组件自带的细箭头关掉，避免两条线叠在一起。
    renderer = new SwimlaneRenderer(canvasEl, labelEl, { labelWidth: 200, colorMode: 'semantic', showRelationLines: false });
    trainRenderers.top = renderer;
    bindTrainSwimlaneCoreSelectSync('top', renderer);
  }
  const built = buildAggregatedTrainingSwimlane(topRun, bottomRun);
  const parsed = parseTraceJSON(built.coreTasks);
  let analysis;
  try { analysis = (typeof analyzePerformance === 'function') ? analyzePerformance(parsed) : undefined; }
  catch (e) { analysis = undefined; }
  renderer.loadData(parsed, analysis, built.laneTree);
}

function renderTrainingComparison() {
  const topRun = RUN_BY_ID[state.selectedRunId];
  const bottomRun = RUN_BY_ID[state.comparisonRunId];
  if (state.swimlaneViewMode === 'aggregated') {
    mountAggregatedTrainSwimlane(topRun, bottomRun);
    window.requestAnimationFrame(() => window.requestAnimationFrame(() => {
      try { trainRenderers.top?.fitToView?.(); } catch (e) {}
    }));
    return;
  }
  if (topRun) mountTrainSwimlane('top', topRun);
  if (bottomRun) mountTrainSwimlane('bottom', bottomRun);
  bindTrainSwimlaneSync();
  // 双 rAF：等面板按新尺寸真正完成一次布局后再各自 fitToView + 对齐缩放，
  // 避免用隐藏态下的 0 宽度算出初始 xScale。
  window.requestAnimationFrame(() => window.requestAnimationFrame(() => {
    try { trainRenderers.top?.fitToView?.(); } catch (e) {}
    try { trainRenderers.bottom?.fitToView?.(); } catch (e) {}
    alignTrainSwimlaneZoom();
  }));
}

// 上下两栏对齐到同一 xScale（取两者各自 fitToView 后较小的一个，再额外放大一档），
// 保证同一屏幕像素对应同一段时间，后续 scrollLeft 像素镜像和滚轮缩放联动才有意义；
// 额外放大是因为按「铺满整段时长」的缩放下，任务条相对 step 间隔太窄，一眼看去全是空隙。
const TRAIN_TL_EXTRA_ZOOM = 2.2;
function alignTrainSwimlaneZoom() {
  const top = trainRenderers.top, bottom = trainRenderers.bottom;
  if (!top?.parsedData || !bottom?.parsedData) return;
  const scale = Math.min(top.xScale, bottom.xScale) * TRAIN_TL_EXTRA_ZOOM;
  if (top.xScale !== scale) { top.xScale = scale; top.onResize(); }
  if (bottom.xScale !== scale) { bottom.xScale = scale; bottom.onResize(); }
}

// 上下两栏「移动·选中·缩放」完全同步：
// - 移动：镜像 viewport 原生 scrollLeft/scrollTop（拖拽平移、滚轮纵向滚动都走这条路径）
// - 缩放：转发滚轮事件到另一侧调用同一因子的 _zoom()，两栏 xScale 由 alignTrainSwimlaneZoom 保持一致
// - 选中：转发 onCoreClick，按叶子泳道 leafKey（两栏树结构一致，见 buildTrainingSwimlaneData 的 id 命名）跨栏高亮同一行
let trainSwimlaneSyncBound = false;
let trainSwimlaneScrollSyncing = false;

// 泳道标签列横向固定：用 translateX 抵消 viewport.scrollLeft，使标签列（Host ▸ Rank ▸ ...
// 树）在横向滚动/缩放时始终保持在左侧可视区内。做法与 index_v3.html Timeline 页签的
// pinLabel 完全一致——CSS position:sticky 在嵌套 flex 里不可靠，这里用 JS 直接抵消。
function pinTrainSwimlaneLabel(vp, label) {
  if (!vp || !label) return;
  const sync = () => { label.style.transform = 'translateX(' + vp.scrollLeft + 'px)'; };
  vp.addEventListener('scroll', sync, { passive: true });
  sync();
}

function bindTrainSwimlaneSync() {
  if (trainSwimlaneSyncBound) return;
  trainSwimlaneSyncBound = true;
  ['top', 'bottom'].forEach((key) => {
    const other = key === 'top' ? 'bottom' : 'top';
    const vp = document.getElementById(key === 'top' ? 'trainTimelineTopViewport' : 'trainTimelineBottomViewport');
    const label = document.getElementById(key === 'top' ? 'trainTimelineTopLabel' : 'trainTimelineBottomLabel');
    pinTrainSwimlaneLabel(vp, label);
    if (vp) {
      vp.addEventListener('scroll', () => {
        if (trainSwimlaneScrollSyncing) return;
        const source = trainRenderers[key];
        const target = trainRenderers[other];
        const sv = source?._viewport?.();
        const tv = target?._viewport?.();
        if (sv && tv && (tv.scrollLeft !== sv.scrollLeft || tv.scrollTop !== sv.scrollTop)) {
          trainSwimlaneScrollSyncing = true;
          tv.scrollLeft = sv.scrollLeft;
          tv.scrollTop = sv.scrollTop;
          window.requestAnimationFrame(() => window.requestAnimationFrame(() => { trainSwimlaneScrollSyncing = false; }));
        }
        // 滚动时同步更新连线位置——聚合视图下没有 target（bottom 未挂载），
        // 上面两行会短路跳过，但连线仍然要跟着滚，所以这句不能放在 target 存在的分支里。
        if (trainRenderers.top?.selectedEvent) updateCrossLaneConnectors();
      }, { passive: true });
    }
    const canvasHost = document.getElementById(key === 'top' ? 'trainTimelineTopCanvas' : 'trainTimelineBottomCanvas');
    if (canvasHost) {
      canvasHost.addEventListener('wheel', (e) => {
        const source = trainRenderers[key];
        const target = trainRenderers[other];
        if (source?.canvas && target?.canvas && target.parsedData) {
          const factor = e.deltaY < 0 ? SWIMLANE_CONFIG.ZOOM_FACTOR : 1 / SWIMLANE_CONFIG.ZOOM_FACTOR;
          const sourceRect = source.canvas.getBoundingClientRect();
          const targetRect = target.canvas.getBoundingClientRect();
          const ratio = sourceRect.width ? (e.clientX - sourceRect.left) / sourceRect.width : 0.5;
          target._zoom(factor, ratio * targetRect.width);
        }
        // 缩放后更新连线位置——聚合视图下没有 target 可转发缩放，但本侧（source）自己的
        // 原生滚轮缩放仍会触发，连线跟着重算，所以这句同样不能挂在 target 存在的分支里。
        requestAnimationFrame(function () { updateCrossLaneConnectors(); });
      }, { passive: true });
    }
  });
}

// 聚合视图下叶子行的 coreName 带 §base/§compare 后缀（见 buildAggregatedTrainingSwimlane），
// 找同一逻辑任务在另一侧的定位 key，只需要把后缀换个边，其余（subGraphId/label/ordinal）不变。
function trainSiblingPositionalKey(key) {
  if (!key || !key.coreName) return null;
  if (key.coreName.endsWith('§base')) return Object.assign({}, key, { coreName: key.coreName.replace(/§base$/, '§compare') });
  if (key.coreName.endsWith('§compare')) return Object.assign({}, key, { coreName: key.coreName.replace(/§compare$/, '§base') });
  return null;
}

// 剥掉 §base/§compare 后缀，拿到跟视图模式无关的"裸" coreName + 记一下原来选的是哪一侧
// （聚合视图专用，分组视图下 side 恒为 null）。用于分组⇄聚合切换时换算回对应模式的 key。
function trainStripRunSuffix(coreName) {
  const m = /§(base|compare)$/.exec(coreName || '');
  return { coreName: (coreName || '').replace(/§(base|compare)$/, ''), side: m ? m[1] : null };
}

// 记录当前选中的任务（跟视图模式无关），供切换 分组⇄聚合 视图后原样换算回对应 key 找回选中。
function captureTrainSelection() {
  const topR = trainRenderers.top;
  const event = topR?.selectedEvent;
  const key = event ? topR.positionalKeyOfEvent(event) : null;
  if (!key) return null;
  const stripped = trainStripRunSuffix(key.coreName);
  return { baseKey: Object.assign({}, key, { coreName: stripped.coreName }), side: stripped.side };
}

// 聚合视图选中态的唯一入口：点击任务条 / 切视图后恢复选中，都走这一个函数，行为保持一致。
// 选中后把对侧同位任务条塞进 relatedEvents（保持高亮不被压暗），
// 并把对侧同位泳道行塞进 extraActiveLaneKeys（跟本侧泳道一起按"选中"样式高亮，
// 而不只是"不被压暗"）——这样 base/compare 两条相邻泳道会一起亮起来。
// 连线复用 updateCrossLaneConnectors。
function selectAggregatedTrainEvent(renderer, event) {
  renderer.selectedEvent = event || null;
  const key = event ? renderer.positionalKeyOfEvent(event) : null;
  const siblingKey = key ? trainSiblingPositionalKey(key) : null;
  const siblingEvent = siblingKey ? renderer.findEventByPositionalKey(siblingKey) : null;
  renderer.relatedEvents = siblingEvent ? [siblingEvent] : [];
  renderer.extraActiveLaneKeys = siblingKey ? [siblingKey.coreName] : [];
  renderer._render();
  renderer._renderLabels();
  state.detailTaskKey = key;
  state.inspectorView = event ? 'detail' : 'dashboard';
  renderInspector();
  updateCrossLaneConnectors();
}

// 分组视图选中态的唯一入口：baseKey 为空表示清除选中。top/bottom 两栏树结构一致，
// 直接用同一个 key 在两侧各自找回对应任务，驱动跨栏连线。
function selectGroupedTrainEvent(baseKey) {
  const topR = trainRenderers.top, bottomR = trainRenderers.bottom;
  const event = baseKey && topR ? topR.findEventByPositionalKey(baseKey) : null;
  if (topR) {
    topR.selectedEvent = event || null;
    topR.relatedEvents = [];
    topR._render();
    topR._renderLabels();
  }
  bottomR?.setSelectedEventByKey(event ? baseKey : null);
  state.detailTaskKey = event ? baseKey : null;
  state.inspectorView = event ? 'detail' : 'dashboard';
  renderInspector();
  updateCrossLaneConnectors();
}

// 上下两栏「泳道行选中 / 任务条选中 / 分组展开折叠」全部跨栏同步：两栏树结构一致（见
// buildTrainingSwimlaneData 的 id 命名），泳道行 key、分组 id 可以直接跨栏复用；任务条走
// positionalKeyOfEvent 的结构性定位。全部走目标实例的 set* 方法直接改状态，不触发目标自身的
// onXxx 回调，避免 A→B→A 的联动死循环。
function bindTrainSwimlaneCoreSelectSync(key, renderer) {
  const other = key === 'top' ? 'bottom' : 'top';
  renderer.onCoreClick = (coreName) => {
    const target = trainRenderers[other];
    if (!target || !target.rowMeta?.has(coreName) || target.selectedCore === coreName) return;
    target.selectedCore = coreName;
    target._render();
    target._renderLabels();
  };
  renderer.onEventClick = () => {
    // swimlane.js 的原生 click 处理器已经把 renderer.selectedEvent 切好了（再点一下同一条会切回 null）。
    if (state.swimlaneViewMode === 'aggregated') {
      selectAggregatedTrainEvent(renderer, renderer.selectedEvent);
      return;
    }
    const event = renderer.selectedEvent;
    const baseKey = event ? renderer.positionalKeyOfEvent(event) : null;
    selectGroupedTrainEvent(baseKey);
  };
  renderer.onGroupToggle = (groupId, collapsed) => {
    const target = trainRenderers[other];
    if (!target || !target.rowMeta?.has(`§g§${groupId}`)) return;
    target.setGroupCollapsed(groupId, collapsed);
  };
}

function renderSecondaryViewMode() {
  const graphMode = state.secondaryViewMode === 'graph';
  const comparisonMode = state.secondaryViewMode === 'comparison';
  if (blockGraphViewport) blockGraphViewport.hidden = !graphMode;
  if (compareSwimlaneView) {
    compareSwimlaneView.hidden = !comparisonMode;
    compareSwimlaneView.setAttribute('aria-hidden', String(!comparisonMode));
  }
  if (swimlaneWorkbenchEl) swimlaneWorkbenchEl.hidden = comparisonMode;
  if (trainTimelineTop) trainTimelineTop.hidden = !comparisonMode;
  updateCompareHeaderSearch();
}

// 对比模式下标题行的搜索框（纯样式占位，不接任何过滤逻辑）：
// 聚合视图只剩上栏可见，标题让位给搜索框；分组视图上下两栏标题都保留，
// 搜索框分别贴在各自标题行最右侧。
function updateCompareHeaderSearch() {
  const comparisonMode = state.secondaryViewMode === 'comparison';
  const aggregated = comparisonMode && state.swimlaneViewMode === 'aggregated';
  if (swimlanePaneTitle) swimlanePaneTitle.hidden = aggregated;
  if (cmpTopSearchbox) cmpTopSearchbox.hidden = !comparisonMode;
  if (cmpBottomSearchbox) cmpBottomSearchbox.hidden = !comparisonMode;
}

/* ── 跨栏 Bezier 连线（SVG overlay，白色曲线）── */
var crossLaneSvg = null;

function ensureCrossLaneOverlay() {
  if (crossLaneSvg) return;
  var container = document.getElementById('analysisColumn');
  if (!container) return;
  container.style.position = 'relative';
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'crossLaneSvgOverlay';
  svg.setAttribute('aria-hidden', 'true');
  container.appendChild(svg);
  crossLaneSvg = svg;
}

function hideCrossLaneConnectors() {
  if (crossLaneSvg) crossLaneSvg.innerHTML = '';
}

// 取一个任务条在自己所在 viewport 内的连线锚点（首尾 X + 行中 Y）。
// 分组视图两侧各自一个 viewport 各调一次；聚合视图两侧共用同一个 viewport 调两次
// （同一实例内不同的行/事件），端点坐标算法完全一致，不用另外调参。
function crossLaneConnectorPoint(renderer, event, viewportId, labelW) {
  var vp = document.getElementById(viewportId);
  if (!vp || !renderer?.parsedData) return null;
  var vpRect = vp.getBoundingClientRect();
  var scale = renderer.xScale;
  var scroll = renderer._getScrollLeft();
  var range = renderer.parsedData.timeRange;
  // 任务条的首/尾 X（viewport 内视觉坐标。canvas 上 task bar 左侧描边扩展
  // 0.5px，且 label 与 canvas 之间有微小间距，实测需 +2 / +1 补偿对齐）
  var canvasStartX = (event.ts - range.start) * scale + 2;
  var canvasEndX   = (event.ts + (event.dur || 0) - range.start) * scale + 1;
  var sx = labelW + canvasStartX - scroll;
  var ex = labelW + canvasEndX   - scroll;
  // 任务条的行 Y（viewport 内，取条正中）
  var pos = renderer._getEventPos(event);
  var y = pos ? pos.y - (renderer.yScrollTop || 0) + pos.h / 2 : vpRect.height * 0.5;
  return { vpRect: vpRect, sx: sx, ex: ex, y: y };
}

// 分组视图（两个独立实例/viewport）和聚合视图（同一实例内两行）共用这一份连线绘制：
// 只是喂进来的 {renderer, event, viewportId} 不同，端点/贝塞尔曲线/端点圆的画法原样不变。
function drawTaskConnector(specA, specB) {
  ensureCrossLaneOverlay();
  if (!crossLaneSvg) return;
  var labelW = specA.renderer.labelWidth || 200;
  var pa = crossLaneConnectorPoint(specA.renderer, specA.event, specA.viewportId, labelW);
  var pb = crossLaneConnectorPoint(specB.renderer, specB.event, specB.viewportId, labelW);
  if (!pa || !pb) { hideCrossLaneConnectors(); return; }

  // ── 容器坐标 ──
  var containerRect = crossLaneSvg.parentElement.getBoundingClientRect();
  function cvx(vpRect, vpX) { return vpRect.left - containerRect.left + vpX; }
  function cvy(vpRect, vpY) { return vpRect.top - containerRect.top + vpY; }

  var pTopStart  = { x: cvx(pa.vpRect, pa.sx), y: cvy(pa.vpRect, pa.y) };
  var pTopEnd    = { x: cvx(pa.vpRect, pa.ex), y: cvy(pa.vpRect, pa.y) };
  var pBotStart  = { x: cvx(pb.vpRect, pb.sx), y: cvy(pb.vpRect, pb.y) };
  var pBotEnd    = { x: cvx(pb.vpRect, pb.ex), y: cvy(pb.vpRect, pb.y) };

  // ── 曲线：纵向进出（控制点 x 与各自端点相同，y 取中点）──
  var midYS = (pTopStart.y + pBotStart.y) / 2;
  var midYE = (pTopEnd.y + pBotEnd.y) / 2;

  var d1 = 'M ' + pTopStart.x.toFixed(1) + ' ' + pTopStart.y.toFixed(1) +
    ' C ' + pTopStart.x.toFixed(1) + ' ' + midYS.toFixed(1) +
    ' ' + pBotStart.x.toFixed(1) + ' ' + midYS.toFixed(1) +
    ' ' + pBotStart.x.toFixed(1) + ' ' + pBotStart.y.toFixed(1);
  var d2 = 'M ' + pTopEnd.x.toFixed(1) + ' ' + pTopEnd.y.toFixed(1) +
    ' C ' + pTopEnd.x.toFixed(1) + ' ' + midYE.toFixed(1) +
    ' ' + pBotEnd.x.toFixed(1) + ' ' + midYE.toFixed(1) +
    ' ' + pBotEnd.x.toFixed(1) + ' ' + pBotEnd.y.toFixed(1);

  var w = containerRect.width, h = containerRect.height;
  crossLaneSvg.setAttribute('width', String(w));
  crossLaneSvg.setAttribute('height', String(h));
  crossLaneSvg.innerHTML = '';

  var path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path1.setAttribute('d', d1); crossLaneSvg.appendChild(path1);
  var path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path2.setAttribute('d', d2); crossLaneSvg.appendChild(path2);

  // 端点圆
  [pTopStart, pTopEnd, pBotStart, pBotEnd].forEach(function (pt) {
    var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', pt.x.toFixed(1)); c.setAttribute('cy', pt.y.toFixed(1));
    c.setAttribute('r', '3'); c.setAttribute('fill', 'rgba(255,255,255,0.85)');
    crossLaneSvg.appendChild(c);
  });
}

function updateCrossLaneConnectors() {
  if (state.swimlaneViewMode === 'aggregated') {
    // 聚合视图：同一个实例内，选中任务条 + 它在对侧（base/compare）的同位任务条，
    // 两个点都来自 trainTimelineTopViewport，画法和分组视图完全一样。
    var topR = trainRenderers.top;
    var event = topR?.selectedEvent;
    if (!event || !topR.parsedData) { hideCrossLaneConnectors(); return; }
    var key = topR.positionalKeyOfEvent(event);
    var siblingKey = trainSiblingPositionalKey(key);
    var siblingEvent = siblingKey ? topR.findEventByPositionalKey(siblingKey) : null;
    if (!siblingEvent) { hideCrossLaneConnectors(); return; }
    drawTaskConnector(
      { renderer: topR, event: event, viewportId: 'trainTimelineTopViewport' },
      { renderer: topR, event: siblingEvent, viewportId: 'trainTimelineTopViewport' }
    );
    return;
  }
  var topR = trainRenderers.top, bottomR = trainRenderers.bottom;
  var event = topR?.selectedEvent;
  if (!event || !topR.parsedData) { hideCrossLaneConnectors(); return; }
  var bottomEvent = bottomR?.selectedEvent;
  if (!bottomEvent) { hideCrossLaneConnectors(); return; }
  drawTaskConnector(
    { renderer: topR, event: event, viewportId: 'trainTimelineTopViewport' },
    { renderer: bottomR, event: bottomEvent, viewportId: 'trainTimelineBottomViewport' }
  );
}

function openCodePanel() {
  var terminalToggle = frameEl.querySelector('[data-ide-toggle="terminal"]');
  var terminalDock = document.getElementById('terminalDock');
  // 底部面板未展开则触发打开
  if (terminalDock && terminalDock.hidden) {
    if (terminalToggle) terminalToggle.click();
  }
  // 切换到代码视图
  setTimeout(function () {
    var terminalPane = document.getElementById('terminalPane');
    var codePane = document.getElementById('codePane');
    if (terminalPane) terminalPane.hidden = true;
    if (codePane) codePane.hidden = false;
    // 高亮关联代码 tab
    document.querySelectorAll('[data-code-tab]').forEach(function (el) {
      el.classList.add('is-selected');
    });
    // 只渲染一次（固定示例代码，不随任务变化）
    if (!CODE_PANEL_RENDERED) renderCodePanel();
    CODE_PANEL_RENDERED = true;
    // 刷新框架布局
    window.requestAnimationFrame(function () {
      frameController?.refresh?.();
      layout();
    });
  }, 80);
}

function renderCodePanel() {
  var container = document.getElementById('codeView');
  if (!container) return;
  var headHtml = '<div class="sl-code-view__header">' +
    '<span class="sl-code-view__filename">' +
      '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg>' +
      'ascend_kernels/attention/self_attention_fusion.py' +
    '</span>' +
  '</div>';
  var linesHtml = '<div class="sl-code-view__lines">';
  MOCK_CODE_LINES.forEach(function (line) {
    var cls = line.key ? 'sl-code-line is-key' : 'sl-code-line';
    var text = '<span class="sl-code-line__text">';
    if (line.cls) {
      text += '<span class="' + line.cls + '">' + escapeHtml(line.text) + '</span>';
    } else {
      text += escapeHtml(line.text);
    }
    text += '</span>';
    linesHtml += '<div class="' + cls + '">' + text + '</div>';
  });
  linesHtml += '</div>';
  container.innerHTML = headHtml + linesHtml;
}

/* ── 代码页签切换逻辑 ── */
function initCodeTabSwitch() {
  document.querySelectorAll('[data-code-tab]').forEach(function (tab) {
    tab.addEventListener('click', function () {
      var terminalPane = document.getElementById('terminalPane');
      var codePane = document.getElementById('codePane');
      if (tab.closest('#terminalPane')) {
        // 从终端面板点击"关联代码" → 切换到代码面板
        if (terminalPane) terminalPane.hidden = true;
        if (codePane) codePane.hidden = false;
        document.querySelectorAll('[data-code-tab]').forEach(function (el) { el.classList.add('is-selected'); });
        document.querySelectorAll('#terminalPane [data-code-tab]').forEach(function (el) { el.classList.remove('is-selected'); });
        if (!CODE_PANEL_RENDERED) renderCodePanel();
        CODE_PANEL_RENDERED = true;
      } else if (tab.closest('#codePane')) {
        // 从代码面板点击"终端" → 切换到终端面板
        if (codePane) codePane.hidden = true;
        if (terminalPane) terminalPane.hidden = false;
        document.querySelectorAll('[data-code-tab]').forEach(function (el) { el.classList.remove('is-selected'); });
      }
    });
  });
  // 复制按钮
  var copyBtn = document.getElementById('codeCopyBtn');
  if (copyBtn) {
    copyBtn.addEventListener('click', function () {
      var text = MOCK_CODE_LINES.map(function (l) { return l.text; }).join('\n');
      navigator.clipboard?.writeText(text).catch(function () {});
    });
  }
}

function blockGraphGutter() {
  const previous = blockGraphView?.previousElementSibling;
  return previous?.classList.contains('pto-workbench-shell__split-gutter') ? previous : null;
}

/* ── 分组视图 | 聚合视图 页签（顶部导航，替代原 projectName 占位）──
   聚合视图＝把上下两个对比面板合并成一个：隐藏下半屏（blockGraphView 本身），
   把训练泳道数据按叶子泳道拼接后整份装进 top 渲染实例。跟 setBlockGraphOpen(false)
   不同的是这里不清空 comparisonRunId/secondaryViewMode——聚合视图仍然是对比模式，
   只是换一种排布，不是退出对比。 */
function setMergedTrainPanelHidden(hidden) {
  if (!blockGraphView) return;
  blockGraphView.hidden = hidden;
  blockGraphView.setAttribute('aria-hidden', String(hidden));
  const gutter = blockGraphGutter();
  if (gutter) gutter.hidden = hidden;
  window.requestAnimationFrame(() => {
    frameController?.refresh?.();
    layout();
  });
}

function setSwimlaneViewMode(mode) {
  mode = mode === 'aggregated' ? 'aggregated' : 'grouped';
  const tabs = document.getElementById('swimlaneViewTabs');
  if (tabs) {
    tabs.querySelectorAll('[data-swimlane-view]').forEach((btn) => {
      const active = btn.dataset.swimlaneView === mode;
      btn.classList.toggle('is-selected', active);
      btn.setAttribute('aria-selected', String(active));
    });
  }
  if (state.swimlaneViewMode === mode) return;
  // 切换前先把当前选中的任务记下来（跟视图模式无关的裸 key + 原来选的是哪一侧），
  // 挂载新数据后再换算回对应模式的 key 找回同一个任务——分组⇄聚合切换要保持选中，
  // 连线跟着 selectedEvent 走，自然也就保留了。
  const pendingSelection = captureTrainSelection();
  state.swimlaneViewMode = mode;
  if (state.secondaryViewMode === 'comparison') {
    hideCrossLaneConnectors();
    setMergedTrainPanelHidden(mode === 'aggregated');
    renderTrainingComparison();
    restoreTrainSelection(pendingSelection, mode);
    updateCompareHeaderSearch();
  }
}

function restoreTrainSelection(pending, mode) {
  const topR = trainRenderers.top;
  if (!pending || !topR) return;
  if (mode === 'aggregated') {
    const suffix = pending.side || 'base';
    const mergedKey = Object.assign({}, pending.baseKey, { coreName: `${pending.baseKey.coreName}§${suffix}` });
    const event = topR.findEventByPositionalKey(mergedKey);
    if (event) selectAggregatedTrainEvent(topR, event);
  } else {
    selectGroupedTrainEvent(pending.baseKey);
  }
}

function bindSwimlaneViewTabs() {
  const tabs = document.getElementById('swimlaneViewTabs');
  if (!tabs) return;
  tabs.querySelectorAll('[data-swimlane-view]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const targetMode = btn.dataset.swimlaneView;
      // 聚合视图只在对比模式下有意义：不在对比模式时，先按左侧勾选栏当前/默认的
      // 对比对象进入对比模式，再切视图。
      if (state.secondaryViewMode !== 'comparison') {
        const runId = state.comparisonRunId || pickDefaultComparisonRunId();
        if (runId) openRunComparison(runId);
      }
      setSwimlaneViewMode(targetMode);
    });
  });
}

function applyBlockGraphTransform() {
  if (!blockGraphStage) return;
  blockGraphStage.style.transform = `translate(${blockGraphViewState.x}px, ${blockGraphViewState.y}px) scale(${blockGraphViewState.scale})`;
}

function blockGraphContentSize() {
  return {
    width: Math.max(1, blockGraphMount?.offsetWidth || blockGraphMount?.scrollWidth || 1),
    height: Math.max(1, blockGraphMount?.offsetHeight || blockGraphMount?.scrollHeight || 1),
  };
}

function centerBlockGraph(scale = 1) {
  if (!blockGraphViewport || !blockGraphMount || !blockGraphIsOpen() || state.secondaryViewMode !== 'graph') return;
  const content = blockGraphContentSize();
  blockGraphViewState.scale = Math.max(0.12, Math.min(1.8, scale));
  blockGraphViewState.x = (blockGraphViewport.clientWidth - content.width * blockGraphViewState.scale) / 2;
  blockGraphViewState.y = (blockGraphViewport.clientHeight - content.height * blockGraphViewState.scale) / 2;
  applyBlockGraphTransform();
}

function fitBlockGraph() {
  if (!blockGraphViewport || !blockGraphMount || !blockGraphIsOpen() || state.secondaryViewMode !== 'graph') return;
  const content = blockGraphContentSize();
  const inset = 24;
  const availableWidth = Math.max(1, blockGraphViewport.clientWidth - inset * 2);
  const availableHeight = Math.max(1, blockGraphViewport.clientHeight - inset * 2);
  const scale = Math.max(0.12, Math.min(1.25, Math.min(
    availableWidth / content.width,
    availableHeight / content.height,
  )));
  centerBlockGraph(scale);
}

function zoomBlockGraph(nextScale, anchorX = null, anchorY = null) {
  if (!blockGraphViewport || !blockGraphIsOpen() || state.secondaryViewMode !== 'graph') return;
  const previousScale = blockGraphViewState.scale;
  const scale = Math.max(0.12, Math.min(1.8, nextScale));
  const x = Number.isFinite(anchorX) ? anchorX : blockGraphViewport.clientWidth / 2;
  const y = Number.isFinite(anchorY) ? anchorY : blockGraphViewport.clientHeight / 2;
  const worldX = (x - blockGraphViewState.x) / previousScale;
  const worldY = (y - blockGraphViewState.y) / previousScale;
  blockGraphViewState.scale = scale;
  blockGraphViewState.x = x - worldX * scale;
  blockGraphViewState.y = y - worldY * scale;
  applyBlockGraphTransform();
}

function setBlockGraphOpen(open) {
  if (!blockGraphView) return;
  if (!open) {
    state.secondaryViewMode = null;
    state.comparisonRunId = null;
    state.diffSelectedLane = null;
    state.detailTaskKey = null;
    state.inspectorView = 'dashboard';
    setSwimlaneViewMode('grouped');
    hideCrossLaneConnectors();
    hideTimestampGuide();
  }
  renderSecondaryViewMode();
  renderInspector();
  blockGraphView.hidden = !open;
  blockGraphView.setAttribute('aria-hidden', String(!open));
  const gutter = blockGraphGutter();
  if (gutter) gutter.hidden = !open;
  window.requestAnimationFrame(() => {
    frameController?.refresh?.();
    layout();
    if (open && state.secondaryViewMode === 'graph') window.requestAnimationFrame(fitBlockGraph);
    if (open && state.secondaryViewMode === 'comparison') {
      window.requestAnimationFrame(() => renderTrainingComparison());
    }
  });
}

function openBlockGraph(t) {
  if (!t || !blockGraphView) return;
  state.secondaryViewMode = 'graph';
  state.comparisonRunId = null;
  renderBlockGraph(t);
  setBlockGraphOpen(true);
}

function openRunComparison(runId) {
  if (!runId || runId === state.selectedRunId || !blockGraphView) return;
  const comparedRun = RUN_BY_ID[runId];
  if (!comparedRun) return;
  state.secondaryViewMode = 'comparison';
  state.comparisonRunId = runId;
  state.diffSelectedLane = null;
  blockGraphTitle.textContent = comparedRun.id;
  setBlockGraphOpen(true);
}

function applyDefaultCompareMode() {
  // 对比模式是本页默认入口（不再需要 ?mode=compare 才触发）：直接打开本文件也一样默认进入对比。
  const params = new URLSearchParams(window.location.search);
  const requestedRunId = params.get('runId');
  const defaultRunId = (requestedRunId && RUN_BY_ID[requestedRunId] && requestedRunId !== state.selectedRunId)
    ? requestedRunId
    : pickDefaultComparisonRunId();
  if (defaultRunId) { openRunComparison(defaultRunId); renderRunHistory(); }
}

function bindBlockGraphPanel() {
  setBlockGraphOpen(false);
  blockGraphFit?.addEventListener('click', fitBlockGraph);
  blockGraphZoomOut?.addEventListener('click', () => zoomBlockGraph(blockGraphViewState.scale / 1.15));
  blockGraphZoomIn?.addEventListener('click', () => zoomBlockGraph(blockGraphViewState.scale * 1.15));

  if (blockGraphViewport) {
    blockGraphViewport.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;
      if (event.target.closest('button, .node-card, .sl-block-graph-canvas-tools')) return;
      blockGraphViewState.dragging = true;
      blockGraphViewState.pointerId = event.pointerId;
      blockGraphViewState.startClientX = event.clientX;
      blockGraphViewState.startClientY = event.clientY;
      blockGraphViewState.startX = blockGraphViewState.x;
      blockGraphViewState.startY = blockGraphViewState.y;
      blockGraphViewport.classList.add('is-panning');
      blockGraphViewport.setPointerCapture?.(event.pointerId);
    });
    blockGraphViewport.addEventListener('pointermove', (event) => {
      if (!blockGraphViewState.dragging || event.pointerId !== blockGraphViewState.pointerId) return;
      blockGraphViewState.x = blockGraphViewState.startX + event.clientX - blockGraphViewState.startClientX;
      blockGraphViewState.y = blockGraphViewState.startY + event.clientY - blockGraphViewState.startClientY;
      applyBlockGraphTransform();
    });
    const stopPanning = (event) => {
      if (!blockGraphViewState.dragging || event.pointerId !== blockGraphViewState.pointerId) return;
      blockGraphViewState.dragging = false;
      blockGraphViewState.pointerId = null;
      blockGraphViewport.classList.remove('is-panning');
      blockGraphViewport.releasePointerCapture?.(event.pointerId);
    };
    blockGraphViewport.addEventListener('pointerup', stopPanning);
    blockGraphViewport.addEventListener('pointercancel', stopPanning);
    blockGraphViewport.addEventListener('click', (event) => {
      if (event.target.closest('button, .node-card, .sl-block-graph-canvas-tools')) return;
      blockGraphMount.querySelectorAll('.node-card.selected').forEach((item) => item.classList.remove('selected'));
    });
    blockGraphViewport.addEventListener('wheel', (event) => {
      event.preventDefault();
      const rect = blockGraphViewport.getBoundingClientRect();
      const factor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomBlockGraph(
        blockGraphViewState.scale * factor,
        event.clientX - rect.left,
        event.clientY - rect.top,
      );
    }, { passive: false });
    blockGraphViewport.addEventListener('dblclick', fitBlockGraph);
    blockGraphViewport.addEventListener('keydown', (event) => {
      if (event.key === '+' || event.key === '=') zoomBlockGraph(blockGraphViewState.scale * 1.15);
      else if (event.key === '-') zoomBlockGraph(blockGraphViewState.scale / 1.15);
      else if (event.key.toLowerCase() === 'f') fitBlockGraph();
      else return;
      event.preventDefault();
    });
  }

  if ('ResizeObserver' in window && blockGraphViewport) {
    graphResizeObserver = new ResizeObserver(() => {
      if (blockGraphIsOpen() && state.secondaryViewMode === 'graph') window.requestAnimationFrame(fitBlockGraph);
    });
    graphResizeObserver.observe(blockGraphViewport);
  }
  frameEl.addEventListener('pto-ide-bottom-panel-change', () => {
    window.requestAnimationFrame(() => {
      layout();
      if (blockGraphIsOpen() && state.secondaryViewMode === 'graph') window.requestAnimationFrame(fitBlockGraph);
      if (blockGraphIsOpen() && state.secondaryViewMode === 'comparison') window.requestAnimationFrame(syncComparisonCanvases);
    });
  });
}

function bindTopPanelActions() {
  const railExplorerToggle = frameEl.querySelector('[data-ide-toggle="explorer"]');
  const terminalToggle = frameEl.querySelector('[data-ide-toggle="terminal"]');
  const explorerIsOpen = () => railExplorerToggle?.getAttribute('aria-expanded') !== 'false';
  const setExplorerOpen = (open) => {
    if (railExplorerToggle && explorerIsOpen() !== open) railExplorerToggle.click();
  };
  // 左侧导航顶部的文件夹图标（以及它在顶栏的镜像按钮）改为跳转回 index_v3.html，不再收起/
  // 展开「任务对比」面板；但响应式布局（applyResponsivePaneState）仍靠 setExplorerOpen()
  // 用 .click() 模拟点击来自动收起——那是非可信事件（isTrusted:false），这里只拦截真实
  // 用户点击（isTrusted:true），程序模拟的点击照常放行给原生 toggle 逻辑，避免收起功能被打断。
  const goToOverview = (event) => {
    if (!event.isTrusted) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    window.location.href = 'index_v3.html';
  };
  railExplorerToggle?.addEventListener('click', goToOverview, { capture: true });
  topExplorerToggle?.addEventListener('click', goToOverview, { capture: true });
  const setInspectorOpen = (open) => {
    if (!topInspectorToggle || !inspectorPane) return;
    inspectorPane.hidden = !open;
    const leftGutter = inspectorPane.previousElementSibling;
    if (leftGutter?.classList.contains('pto-workbench-shell__split-gutter')) {
      leftGutter.hidden = !open;
    }
    topInspectorToggle.classList.toggle('is-selected', open);
    topInspectorToggle.setAttribute('aria-expanded', String(open));
    topInspectorToggle.setAttribute('aria-pressed', String(open));
    refreshFrameLayout();
  };

  if (topExplorerToggle && railExplorerToggle) {
    const syncExplorerState = () => {
      const expanded = explorerIsOpen();
      topExplorerToggle.classList.toggle('is-selected', expanded);
      topExplorerToggle.setAttribute('aria-expanded', String(expanded));
      topExplorerToggle.setAttribute('aria-pressed', String(expanded));
    };
    topExplorerToggle.addEventListener('click', () => railExplorerToggle.click());
    new MutationObserver(syncExplorerState).observe(railExplorerToggle, {
      attributes: true,
      attributeFilter: ['aria-expanded', 'aria-pressed', 'class'],
    });
    syncExplorerState();
  }

  if (topInspectorToggle && inspectorPane) {
    topInspectorToggle.addEventListener('click', () => setInspectorOpen(inspectorPane.hidden));
    setInspectorOpen(!inspectorPane.hidden);
  }

  if (railTerminalToggle && terminalToggle) {
    const syncTerminalState = () => {
      const expanded = terminalToggle.getAttribute('aria-expanded') === 'true';
      railTerminalToggle.classList.toggle('is-selected', expanded);
      railTerminalToggle.setAttribute('aria-expanded', String(expanded));
      railTerminalToggle.setAttribute('aria-pressed', String(expanded));
    };
    railTerminalToggle.addEventListener('click', () => terminalToggle.click());
    new MutationObserver(syncTerminalState).observe(terminalToggle, {
      attributes: true,
      attributeFilter: ['aria-expanded', 'aria-pressed', 'class'],
    });
    syncTerminalState();
  }

  return {
    explorerIsOpen,
    setExplorerOpen,
    inspectorIsOpen: () => !inspectorPane.hidden,
    setInspectorOpen,
  };
}

function applyResponsivePaneState() {
  if (!panelActions) return;
  const width = frameEl.getBoundingClientRect().width;
  const nextMode = width <= 840 ? 'compact' : width <= 1180 ? 'medium' : 'wide';
  if (nextMode === responsivePaneMode) return;
  responsivePaneMode = nextMode;

  if (nextMode === 'compact') {
    if (panelActions.explorerIsOpen()) {
      autoCollapsedExplorer = true;
      panelActions.setExplorerOpen(false);
    }
    if (panelActions.inspectorIsOpen()) {
      autoCollapsedInspector = true;
      panelActions.setInspectorOpen(false);
    }
    return;
  }

  if (nextMode === 'medium') {
    if (panelActions.explorerIsOpen()) {
      autoCollapsedExplorer = true;
      panelActions.setExplorerOpen(false);
    }
    if (autoCollapsedInspector) {
      panelActions.setInspectorOpen(true);
      autoCollapsedInspector = false;
    }
    return;
  }

  if (autoCollapsedExplorer) {
    panelActions.setExplorerOpen(true);
    autoCollapsedExplorer = false;
  }
  if (autoCollapsedInspector) {
    panelActions.setInspectorOpen(true);
    autoCollapsedInspector = false;
  }
}

function init() {
  bindSwimlaneViewTabs();
  const initialFrameWidth = frameEl.getBoundingClientRect().width;
  if (initialFrameWidth <= 1180) {
    frameEl.dataset.explorerCollapsed = 'true';
    document.getElementById('scenarioPane').hidden = true;
    autoCollapsedExplorer = true;
  }
  if (initialFrameWidth <= 840) {
    inspectorPane.hidden = true;
    autoCollapsedInspector = true;
  }
  frameController = window.PtoIdeFrame?.init(frameEl, {
    splitOptions: {
      default: {
        onResize: () => window.requestAnimationFrame(() => layout()),
      },
    },
  });
  // 对比框上下两栏固定 50/50、禁止拖拽：CSS 已去掉分隔条的指针交互，这里再把键盘焦点也
  // 断掉（split 库创建分隔条时 tabIndex 默认可聚焦+方向键调整，光 pointer-events:none 拦不住）。
  const analysisGutter = document.querySelector('[data-ide-split="swimlane-analysis"] > .pto-workbench-shell__split-gutter');
  if (analysisGutter) {
    analysisGutter.tabIndex = -1;
    analysisGutter.setAttribute('aria-hidden', 'true');
  }
  buildOrder();
  renderRunHistory();
  layout();
  renderInspector();
  panelActions = bindTopPanelActions();
  bindBlockGraphPanel();
  applyDefaultCompareMode();
  initSharedCanvasTooltip();
  initCodeTabSwitch();
  applyResponsivePaneState();
  if ('ResizeObserver' in window && canvasPane) {
    canvasResizeObserver = new ResizeObserver(() => window.requestAnimationFrame(() => layout()));
    canvasResizeObserver.observe(canvasPane);
    frameResizeObserver = new ResizeObserver(() => window.requestAnimationFrame(applyResponsivePaneState));
    frameResizeObserver.observe(frameEl);
  }
  if ('ResizeObserver' in window && canvasPane && blockGraphView) {
    const trainTlResizeObserver = new ResizeObserver(() => window.requestAnimationFrame(() => {
      if (state.secondaryViewMode !== 'comparison') return;
      trainRenderers.top?.onResize();
      trainRenderers.bottom?.onResize();
    }));
    trainTlResizeObserver.observe(canvasPane);
    trainTlResizeObserver.observe(blockGraphView);
  }
}
init();
</script>
</body>
</html>
