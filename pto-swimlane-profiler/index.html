.sl-counter-name {

}

.sl-counter-val {

.sl-counter-note {

.sl-empty-state {

.sl-top-task {

.sl-top-task__id {

.sl-top-task__row {

.sl-top-task__row .v {

.sl-top-task__sub {

.sl-task-detail-head {

.sl-task-back {

.sl-task-back svg {

  stroke-linejoin: round;
}

.sl-task-detail-title {
  min-width: 0;
  overflow: hidden;
  color: var(--foreground);
  font: var(--text-title-2);
  text-overflow: ellipsis;

}

#globalRulerTicks {

  inset: 0;
}

.sl-global-ruler__tick {

}

.sl-global-ruler__tick.is-major {

}

.sl-global-ruler__brush {

  background: color-mix(in srgb, var(--accent) 20%, transparent);

  pointer-events: none;
}

.sl-swimlane-scroll-shell {

.sl-timeline-band {

}

.sl-timeline-corner {

.sl-corner-title {

.sl-corner-meta {
  display: none;
  color: var(--foreground-muted);
  font: var(--text-label);
}

.sl-timeline-right {
  min-width: 0;
}

.sl-axis-wrap,

.sl-overview svg {

  height: 100%;

.sl-overview-marker {

.sl-overview-cursor {

  bottom: 0;

  width: 1px;
  background: color-mix(in srgb, var(--foreground) 54%, transparent);

.sl-overview-tooltip {

  z-index: 60;
  min-width: 214px;
  pointer-events: none;
}

.sl-overview-tooltip.is-visible {

}

.sl-overview-tooltip[hidden],
.sl-overview-cursor[hidden] {
  display: none;
}

.sl-overview-tip-swatch {

  width: 9px;
  height: 3px;
  margin-right: 5px;
  border-radius: 2px;
  vertical-align: middle;
}

.pto-swimlane-task-tooltip__key {
  letter-spacing: normal;
  text-transform: none;
}

.sl-history-stack {

  flex-direction: column;
  gap: var(--space-3);
  padding: 0 0 var(--space-2);
}

.sl-run-card {

  flex-direction: column;
  gap: var(--space-3);
  padding: var(--space-3);
  border-radius: var(--radius-lg);
  background: var(--surface-2);
}

.sl-run-card.is-selected {
  background: var(--surface-3);
  box-shadow: inset 3px 0 0 var(--accent);
}

.sl-run-card--past:not(.is-expanded) {

}

.sl-run-card__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  width: 100%;
  padding: 0;
  margin: 0;
  border: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  text-align: left;
}

.sl-run-card__toggle {
  width: 15px;
  height: 15px;

}

.sl-run-card:hover .sl-run-card__toggle {
  opacity: 1;
}

.sl-run-card__toggle.is-open {

}

.sl-run-id {
  overflow-wrap: anywhere;
  color: var(--foreground);
  font: var(--text-mono);
}

.sl-run-card--past .sl-run-id {
  color: var(--foreground-secondary);
}

.sl-history-kv {

  font: var(--text-body-sm);
}

.sl-history-kv dt {
  color: var(--foreground-muted);
  font: var(--text-label);
  white-space: nowrap;
}

.sl-history-kv dd {
  margin: 0;
  overflow-wrap: anywhere;
  color: var(--foreground);
  font-family: var(--font-mono);
  text-align: right;
}

.sl-history-sm {
  font: var(--text-label);
}

.sl-history-divider {

  margin: var(--space-2) 0;

  background: var(--border-subtle);
}

}

.sl-history-artifact .nm {

  font-family: var(--font-mono);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sl-history-artifact .rl {
  flex: none;
  color: var(--foreground-muted);
  font: var(--text-label);
  white-space: nowrap;
}

.sl-banner {
  display: block;
  padding: var(--space-3);
  border-radius: var(--radius-md);
  background: color-mix(in srgb, var(--warning) 12%, transparent);
  color: var(--foreground-secondary);
}

.sl-banner span {
  display: block;
  margin-top: var(--space-1);
  line-height: 1.55;
}

.sl-grid {
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  grid-template-columns: 184px minmax(0, 1fr);
  grid-template-rows: minmax(0, 1fr);
}

.sl-lane-wrap,
.sl-body-wrap {
  min-width: 0;
  min-height: 0;
}

.sl-body-wrap::-webkit-scrollbar-thumb {
  border-color: color-mix(in srgb, var(--background) 80%, transparent);
}

.sl-insp-section {
  margin-top: var(--space-4);
}

.sl-soft-card {
  border-radius: var(--radius-md);
  background: color-mix(in srgb, var(--surface-3) 48%, transparent);
  padding: var(--space-3);
}

.sl-soft-card.is-warning {
  background: color-mix(in srgb, var(--warning) 13%, transparent);
}

.sl-soft-card.is-success {

}

.sl-callout {

  padding: var(--space-3);
  border-radius: var(--radius-md);
  background: color-mix(in srgb, var(--warning) 13%, transparent);
  font: var(--text-body-sm);
  color: var(--foreground-secondary);
  line-height: 1.6;
}

.sl-callout.is-success {
  background: color-mix(in srgb, var(--success) 12%, transparent);
}

.sl-rail-spacer {
  flex: 1 1 auto;
}

.sl-visually-disabled {
  opacity: 0.38;
  pointer-events: none;
}

.sl-terminal-prompt {
  color: var(--foreground);
  font-weight: var(--font-weight-semibold);
}

@media (max-width: 1120px) {
  .sl-app {
    padding: 0 0 var(--space-2);
  }

  .sl-frame {
    height: calc(100vh - var(--space-2));
  }
}
</style>
</head>

/* ============================================================

   剧本: 一个 transformer 解码层跑 3 次迭代 (L0/L1/L2)。
   解码层被切成 8 个 mix 子图, 静态绑定到 32 个 1C2V wrap
   (每子图 4 个 wrap; 每个 wrap = 1 AIC + 2 AIV)。

   植入瓶颈:
     - 子图 g1 "Attention Score" 是全局瓶颈。
     - 根因在 g1 的 Wrap 06: 该 wrap 的 AIC 跑了一个超大 BMM
       (K 维未切分), 单 task 耗时 ~2.5x 正常值。
     - Wrap 06 的两个 AIV 算完一小段后, 长时间等待该 AIC 的 SyncSet。
     - g1 其余 wrap (04/05/07) 的 AIC 早早算完, AIV 也早完 -> 出现明显空转,
       形成"负载不均": 一个 wrap 拖慢整个子图。
   ============================================================ */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const SCENARIO = {
  bottleneckGroup: 1,   // Attention Score
  slowWrap: 6,          // 全局 wrap 编号 (g1 的本地 k=2)
};

function buildModel() {
  const rand = mulberry32(0x5117A2);
  const rnd = (a, b) => a + rand() * (b - a);
  const rndi = (a, b) => Math.floor(a + rand() * (b - a + 1));
  const pick = (arr) => arr[Math.floor(rand() * arr.length)];

  /* 8 个 mix 子图 (颜色属 data-viz exempt) */
  const groups = [
    { id: 0, name: 'QKV Projection',     short: 'QKV',    color: '#3F7DF6', cScale: 1.00, wChar: 0.20 },
    { id: 1, name: 'Attention Score',    short: 'AttnQK', color: '#9B6BF0', cScale: 1.08, wChar: 0.30 },
    { id: 2, name: 'Attention Context',  short: 'AttnV',  color: '#1FB6C9', cScale: 1.00, wChar: 0.22 },
    { id: 3, name: 'FFN Up · GeLU',      short: 'FFN-Up', color: '#EF8A3C', cScale: 1.06, wChar: 0.18 },
    { id: 4, name: 'FFN Down',           short: 'FFN-Dn', color: '#86C541', cScale: 1.04, wChar: 0.24 },
    { id: 5, name: 'Residual · RMSNorm', short: 'Resid',  color: '#E25A92', cScale: 0.72, wChar: 0.12 },
    { id: 6, name: 'Output Projection',  short: 'OutProj', color: '#6FAE9A', cScale: 0.86, wChar: 0.18 },
    { id: 7, name: 'KV Cache Update',    short: 'KV-Upd',  color: '#C9A24B', cScale: 0.78, wChar: 0.16 },
  ];

  /* Host + A5: 4 AI CPU + 32 AIC + 64 AIV (显示顺序见 buildOrder) */
  const cores = [];
  cores.push({ key: 'host_cpu', label: 'Host CPU', kind: 'host', section: 'Host', laneGroup: 'host' });
  cores.push({ key: 'host_memory', label: 'Memory', kind: 'memory', section: 'Host', laneGroup: 'host' });
  cores.push({ key: 'cpu_ctrl', label: 'AI CPU 控制', kind: 'cpu', section: 'AI CPU', laneGroup: 'ai_cpu' });
  for (let i = 1; i <= 3; i++) {
    cores.push({ key: 'cpu_sched_' + i, label: 'AI CPU 调度 ' + i, kind: 'cpu', section: 'AI CPU', laneGroup: 'ai_cpu' });
  }

      const wrap = (die - 1) * 16 + (core - 1);
      cores.push({
        key: 'aic_' + wrap,
        label: `Core_${core}_AIC`,
        kind: 'aic',
        section: 'AIC',
        laneGroup: 'die' + die,
        die,
        core,
        group: Math.floor(wrap / 4),
        wrap,
      });

    for (let core = 1; core <= 16; core++) {
      const wrap = (die - 1) * 16 + (core - 1);
      for (let vec = 0; vec < 2; vec++) {
        cores.push({
          key: 'aiv_' + (2 * wrap + vec),
          label: `Core_${core}_AIV_${vec}`,
          kind: 'aiv',
          section: 'AIV',
          laneGroup: 'die' + die,
          die,
          core,
          vector: vec,
          group: Math.floor(wrap / 4),
          wrap,
        });
      }
    }
  }

  const idxOf = {};
  cores.forEach((c) => { idxOf[c.key] = c.idx; });

  const aivIdxOfWrap = (w) => [idxOf['aiv_' + (2 * w)], idxOf['aiv_' + (2 * w + 1)]];

  const AIC_OPS = ['MatMul Tile', 'BMM K-split', 'MatMul Accum', 'GEMM Pack'];
  const AIC_SLOW_OP = 'BMM (K 未切分)';
  const AIV_OPS = ['Softmax', 'RMSNorm', 'GeLU Act', 'Add Bias', 'Cast fp16', 'Reduce Sum', 'Eltwise Mul', 'RoPE Apply'];

  const tasks = [];
  const edges = [];
  let taskSeq = 0, edgeSeq = 0;
  const tasksByCore = cores.map(() => []);
  const mk = (coreIdx, name, start, computeEnd, end, group, wrap, kind, inN, outN) => {
    const t = {
      id: 't' + (taskSeq++), coreIdx, name, start, computeEnd, end, group, wrap, kind,
      inputRawMagic: Array.from({ length: inN }, (_, i) => 'in' + i),
      outputRawMagic: Array.from({ length: outN }, (_, i) => 'out' + i),
      syncIn: [], syncOut: [],
    };
    tasks.push(t);
    tasksByCore[coreIdx].push(t);
    return t;
  };
  const addEdge = (group, wrap, dir, prod, prodT, waiter, waitStartT) => {
    const e = {
      id: 'e' + (edgeSeq++), group, wrap, dir,
      fromCore: prod.coreIdx, fromT: prodT, fromTask: prod.id,
      toCore: waiter.coreIdx, toT: waitStartT, toTask: waiter.id,
      wait: waiter.end - waitStartT,
    };

    prod.syncOut.push(e.id);
    waiter.syncIn.push(e.id);

  for (let L = 0; L < LAYERS; L++) {

    mk(idxOf['cpu_ctrl'], '层调度', layerStart - 50, layerStart - 26, layerStart - 26, null, null, 'cpu', 0, 0);

    for (let g = 0; g < groups.length; g++) {
      const gcfg = groups[g];
      const winStart = layerStart + g * STAGGER;
      const schedCore = idxOf['cpu_sched_' + ((g % 3) + 1)];
      mk(schedCore, '子图启动', winStart - 22, winStart - 8, winStart - 8, g, null, 'cpu', 0, 0);

      let groupComputeEnd = winStart;

      for (let k = 0; k < 4; k++) {
        const w = g * 4 + k;
        const isSlow = (w === SCENARIO.slowWrap);
        const aicCore = aicIdxOfWrap(w);
        const aivCores = aivIdxOfWrap(w);

        /* ---- AIC: matmul tile ---- */
        const aicTasks = [];
        let cursor = winStart + 10 + rnd(0, 12);
        if (isSlow) {
          /* 超大 BMM: 3 个长 task, 几乎无等待 (它是被等的一方) */
          for (let s = 0; s < 3; s++) {
            const dur = rnd(78, 116);
            const start = cursor, computeEnd = start + dur, end = computeEnd + rnd(0, 6);
            aicTasks.push(mk(aicCore, s === 0 ? AIC_SLOW_OP : 'BMM Accum', start, computeEnd, end, g, w, 'aic', 3, 1));
            cursor = end + rnd(4, 9);
          }
        } else {
          const n = rndi(4, 6);
          for (let s = 0; s < n; s++) {
            const dur = rnd(16, 40) * gcfg.cScale;
            const wait = rand() < 0.22 ? rnd(8, 22) : 0;
            const start = cursor, computeEnd = start + dur, end = computeEnd + wait;
            aicTasks.push(mk(aicCore, pick(AIC_OPS), start, computeEnd, end, g, w, 'aic', rndi(2, 3), 1));
            cursor = end + rnd(3, 8);
          }
        }
        const aicComputeDone = aicTasks[aicTasks.length - 1].computeEnd;
        groupComputeEnd = Math.max(groupComputeEnd, aicComputeDone);

        /* ---- AIV: 向量算子, 等待 AIC ---- */
        aivCores.forEach((aivCore, half) => {
          let cur = winStart + 26 + rnd(0, 14);
          const n = isSlow ? rndi(5, 6) : rndi(6, 9);
          for (let s = 0; s < n; s++) {
            const dur = rnd(9, 24);
            let wait = 0, prod = null, waitStartT = null;
            if (isSlow && s < 3) {
              /* 剧本核心: 算一小段后长时间停等 Wrap06 的超大 BMM */
              prod = aicTasks[s];
              waitStartT = cur + dur;
              const end = prod.computeEnd + rnd(5, 16);
              const t = mk(aivCore, pick(AIV_OPS), cur, waitStartT, Math.max(end, waitStartT + 6), g, w, 'aiv', rndi(1, 2), 1);
              addEdge(g, w, 'aic2aiv', prod, prod.computeEnd, t, waitStartT);
              cur = t.end + rnd(2, 6);
              continue;
            }
            /* 普通 wrap: 部分 task 等待对应 AIC */
            if (rand() < 0.42) {
              prod = aicTasks[Math.min(aicTasks.length - 1, 1 + (s % 2))];
              if (prod.computeEnd > cur + dur + 2) {
                waitStartT = cur + dur;
                wait = prod.computeEnd - waitStartT + rnd(3, 12) * (1 + gcfg.wChar);
              }
            }
            const start = cur, computeEnd = start + dur, end = computeEnd + Math.max(0, wait);
            const t = mk(aivCore, pick(AIV_OPS), start, computeEnd, end, g, w, 'aiv', rndi(1, 2), 1);
            if (prod && waitStartT != null) addEdge(g, w, 'aic2aiv', prod, prod.computeEnd, t, computeEnd);
            cur = end + rnd(2, 7);
          }
        });

        /* AIV → AIC 回写同步 (普通 wrap, 1 条/wrap): AIC 末 task 等 AIV 结果 */
        if (!isSlow && rand() < 0.7) {
          const aivList = tasksByCore[aivCores[0]];
          const prod = aivList[rndi(1, Math.max(1, aivList.length - 2))];
          const lastAic = aicTasks[aicTasks.length - 1];
          if (prod && prod.computeEnd > lastAic.computeEnd - 6) {
            lastAic.end = prod.computeEnd + rnd(5, 14);
            addEdge(g, w, 'aiv2aic', prod, prod.computeEnd, lastAic, lastAic.computeEnd);
          }
        }
      }
    }
  }

  const timelineEnd = Math.max(...tasks.map((t) => t.end)) + 70;
  const layerMarks = [];
  for (let L = 0; L < LAYERS; L++) layerMarks.push({ t: LAYER0 + L * LAYER_SPAN, label: String(L + 1), layer: L });

  return { cores, groups, tasks, edges, timelineEnd, layerMarks, idxOf, aicIdxOfWrap, aivIdxOfWrap, LAYERS, LAYER0, LAYER_SPAN, STAGGER };
}

    if (state.collapsedLaneGroups.has(group.id)) return;

  return [Math.min(...rows), Math.max(...rows)];
}

const bodyCanvas = document.getElementById('bodyCanvas');
const axisCanvas = document.getElementById('axisCanvas');
const laneCanvas = document.getElementById('laneCanvas');
const bodyWrap = document.getElementById('bodyWrap');
const axisWrap = document.getElementById('axisWrap');
const laneWrap = document.getElementById('laneWrap');
const overviewWrap = document.getElementById('overviewWrap');
const overviewBand = document.getElementById('overviewBand');
const globalRulerScale = document.getElementById('globalRulerScale');
const globalRulerTicks = document.getElementById('globalRulerTicks');
const globalRulerBrush = document.getElementById('globalRulerBrush');
const taskSearch = document.getElementById('taskSearch');
const zoomSlider = document.getElementById('zoomSlider');
const mixModeBtn = document.getElementById('mixModeBtn');
const syncPathBtn = document.getElementById('syncPathBtn');
const runHistoryBody = document.getElementById('runHistoryBody');
const tooltip = document.getElementById('tooltip');
const frameEl = document.querySelector('[data-ide-frame]');
const canvasPane = document.getElementById('canvasPane');
const inspectorPane = document.getElementById('inspectorPane');
const topExplorerToggle = document.getElementById('topExplorerToggle');
const topInspectorToggle = document.getElementById('topInspectorToggle');
let bctx, actx, lctx;
let frameController = null;
let canvasResizeObserver = null;
let overviewMetricSeries = [];

const LABEL_W = 184;
function visibleTrackW() {
  const measured = bodyWrap?.clientWidth || axisWrap?.clientWidth || Math.max(0, (canvasPane?.clientWidth || 0) - LABEL_W);
  return Math.max(360, measured || 760);
}
function bodyW() {
  return Math.ceil(visibleTrackW() * (state.zoomPct / 100));
}
function pxPerUs() { return Math.max(0.1, (bodyW() - 8) / MODEL.timelineEnd); }
function bodyH() { return rowItems.reduce((sum, item) => sum + item.h, 0); }
function rowTop(row) { return rowItems[row]?.y ?? 0; }
function rowHeight(row) { return rowItems[row]?.h ?? ROW_H; }
function rowBottom(row) { return rowTop(row) + rowHeight(row); }
function rowMidY(row) { return rowTop(row) + rowHeight(row) / 2; }
function hitRowAt(y) {
  return rowItems.findIndex((item) => y >= item.y && y < item.y + item.h);
}
function rowLaneKey(row) {
  const item = rowItems[row];
  if (!item) return null;
  if (item.type === 'core') return `core:${item.coreIdx}`;
  if (item.type === 'subcore') return `sub:${item.coreIdx}:${item.sublane}`;
  return null;
}
function laneKeyForTask(t) {
  const core = MODEL.cores[t.coreIdx];
  const sublane = taskSublane(t);
  if (sublane && state.expandedLaneCores.has(core.idx)) return `sub:${core.idx}:${sublane}`;
  return `core:${core.idx}`;
}
function isRowHovered(row) {
  const key = rowLaneKey(row);
  return key && key === state.hoverLaneKey;
}
function barMetricsForRow(row) {
  const item = rowItems[row];
  if (item?.type === 'subcore') return { pad: SUB_BAR_PAD, height: SUB_BAR_H };
  return { pad: BAR_PAD, height: BAR_H };
}
function hexToRgba(hex, a) {
  const v = parseInt(hex.slice(1), 16);
  return `rgba(${v >> 16},${(v >> 8) & 0xff},${v & 0xff},${a})`;
}
function laneDieLabel(core) {
  return core?.die != null ? `DIE ${core.die - 1}` : '';
}
function laneDisplayLabel(core) {
  const die = laneDieLabel(core);
  return die ? `${die} · ${core.label}` : core.label;
}
function laneDisplayWithSublane(core, sublane) {
  return sublane ? `${laneDisplayLabel(core)} · ${sublane}` : laneDisplayLabel(core);
}
function taskLaneDisplayLabel(t) {
  const core = MODEL.cores[t.coreIdx];
  const sublane = state.expandedLaneCores.has(core.idx) ? taskSublane(t) : null;
  return laneDisplayWithSublane(core, sublane);
}
function taskBaseColor(t) {
  const grp = t.group != null ? MODEL.groups[t.group] : null;
  return grp ? grp.color : KIND_ACCENT[t.kind];
}
function taskMatchesQuery(t) {
  const q = state.query.trim().toLowerCase();
  if (!q) return true;
  const core = MODEL.cores[t.coreIdx];
  const grp = t.group != null ? MODEL.groups[t.group] : null;
  return [
    t.name,
    core.label,
    laneDisplayLabel(core),
    laneDieLabel(core),
    core.section,
    grp?.name,
    grp?.short,
    t.wrap != null ? 'Wrap ' + String(t.wrap).padStart(2, '0') : '',
  ].some((value) => String(value || '').toLowerCase().includes(q));
}
function setupCanvas(canvas, wCss, hCss) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(wCss * dpr);
  canvas.height = Math.round(hCss * dpr);
  canvas.style.width = wCss + 'px';
  canvas.style.height = hCss + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}

/* ============================================================
   7. 主体画布渲染
   ============================================================ */
function focusInfo() {
  /* 返回当前需高亮的 task / edge / group / wrap, 用于渐进式聚焦 */
  const relTasks = new Set();
  const relEdges = new Set();
  let dimGroup = null, dimWrap = null;
  const focusTask = state.selTask || state.hoverTask;
  if (state.level === 'group' && state.selGroup != null) dimGroup = state.selGroup;
  if (state.level === 'wrap' && state.selWrap != null) { dimGroup = Math.floor(state.selWrap / 4); dimWrap = state.selWrap; }
  if (state.level === 'task' && state.selTask) {
    dimGroup = state.selTask.group;
    dimWrap = state.selTask.wrap;
  }
  if (state.selTask) {
    const dep = dependencyClosure(state.selTask);
    dep.tasks.forEach((id) => relTasks.add(id));
    dep.edges.forEach((id) => relEdges.add(id));
  } else if (focusTask) {
    relTasks.add(focusTask.id);
    focusTask.syncIn.concat(focusTask.syncOut).forEach((eid) => {
      relEdges.add(eid);
      relTasks.add(edgeById[eid].fromTask);
      relTasks.add(edgeById[eid].toTask);
    });
  }
  return { relTasks, relEdges, dimGroup, dimWrap, focusTask, dependencyMode: Boolean(state.selTask) };
}

function dependencyClosure(rootTask) {
  const tasks = new Set([rootTask.id]);
  const edges = new Set();
  const visit = (seed, edgeKey, nextKey) => {
    const queue = [seed];
    const seen = new Set([seed.id]);
    while (queue.length) {
      const cur = queue.shift();
      cur[edgeKey].forEach((eid) => {
        const e = edgeById[eid];
        if (!e) return;
        edges.add(eid);
        const next = taskById[e[nextKey]];
        if (!next) return;
        tasks.add(next.id);
        if (!seen.has(next.id)) {
          seen.add(next.id);
          queue.push(next);
        }
      });
    }
  };
  visit(rootTask, 'syncIn', 'fromTask');
  visit(rootTask, 'syncOut', 'toTask');
  return { tasks, edges };
}

function drawBody() {
  const w = bodyW(), h = bodyH(), scale = pxPerUs();
  bctx.clearRect(0, 0, w, h);
  const fi = focusInfo();

  /* 行底纹 */
  for (let row = 0; row < rowItems.length; row++) {
    const item = rowItems[row];
    const y = rowTop(row), rh = rowHeight(row);
    if (item.type === 'section') {
      bctx.fillStyle = 'rgba(255,255,255,0.026)';
      bctx.fillRect(0, y, w, rh);
      continue;
    }
    if (isRowHovered(row)) {
      bctx.fillStyle = 'rgba(255,255,255,0.045)';
      bctx.fillRect(0, y, w, rh);
    }
  }

  /* mix: group 染色带 (连续 12 行/子图, 圆角虚线框) */
  if (state.mixMode) drawGroupBands(fi);

  /* 时间网格 + 迭代 barrier */
  bctx.strokeStyle = 'rgba(255,255,255,0.05)'; bctx.lineWidth = 1;
  for (let t = 0; t <= MODEL.timelineEnd; t += 100) {
    const x = Math.round(t * scale) + 0.5;
    bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, h); bctx.stroke();
  }
  MODEL.layerMarks.forEach((m) => {
    const x = Math.round(m.t * scale) + 0.5;
    bctx.strokeStyle = 'rgba(255,255,255,0.15)'; bctx.setLineDash([4, 4]);
    bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, h); bctx.stroke();
    bctx.setLineDash([]);
  });

  /* section / wrap / group 分隔线 */
  drawSeparators(bctx, w);

  /* task bars */
  const fontFamily = "'Inter', sans-serif";
  for (const t of MODEL.tasks) {
    const row = taskRow(t);
    if (!Number.isFinite(row)) continue;
    const x = t.start * scale;
    const computeW = (t.computeEnd - t.start) * scale;
    const bar = barMetricsForRow(row);
    const y = rowTop(row) + bar.pad;
    const related = !fi.dependencyMode || fi.relTasks.has(t.id);
    const baseColor = related ? taskBaseColor(t) : '#6F7480';

    let alpha = 1;
    if (state.syncPathOnly && t.syncIn.length === 0 && t.syncOut.length === 0) alpha = 0.16;
    if (fi.dependencyMode) {
      if (!related) alpha = Math.min(alpha, 0.24);
    } else {
      if (fi.dimWrap != null) { if (t.wrap !== fi.dimWrap) alpha = Math.min(alpha, 0.2); }
      else if (fi.dimGroup != null) { if (t.group !== fi.dimGroup) alpha = Math.min(alpha, 0.2); }
      if (fi.focusTask && !fi.relTasks.has(t.id)) alpha = Math.min(alpha, 0.34);
    }
    if (!taskMatchesQuery(t)) alpha = Math.min(alpha, 0.15);

    bctx.globalAlpha = alpha;
    if (computeW >= 1) {
      window.PtoSwimlaneTaskPattern.drawTaskBar(bctx, {
        x, y, width: computeW, height: bar.height, baseColor, fontFamily, task: t,
        isSelected: state.selTask && state.selTask.id === t.id,
        isRelated: fi.relTasks.has(t.id) && fi.focusTask && fi.focusTask.id !== t.id,
        isEmphasized: state.hoverTask && state.hoverTask.id === t.id,
      });
    }
    const waitW = (t.end - t.computeEnd) * scale;
    if (waitW >= 1) drawWaitSegment(x + computeW, y, waitW, bar.height, fi.dependencyMode && !related);
    bctx.globalAlpha = 1;
  }

  if (fi.dependencyMode) drawDependencyArcs(fi);
  else if (state.mixMode) drawArcs(fi);
}

function drawGroupBands(fi) {
  const scale = pxPerUs();
  for (let L = 0; L < MODEL.LAYERS; L++) {
    for (let g = 0; g < MODEL.groups.length; g++) {
      const range = groupRowRange(g);
      if (!range) continue;
      const isFocus = fi.dimGroup === g;
      const faded = fi.dimGroup != null && !isFocus;
      const grp = MODEL.groups[g];
      const winStart = (MODEL.LAYER0 + L * MODEL.LAYER_SPAN + g * MODEL.STAGGER - 40) * scale;
      const winW = (MODEL.STAGGER + 320) * scale;
      const [r0, r1] = range;
      const y = rowTop(r0), bh = rowBottom(r1) - rowTop(r0);
      bctx.fillStyle = hexToRgba(grp.color, faded ? 0.025 : (isFocus ? 0.085 : 0.045));
      bctx.fillRect(winStart, y, winW, bh);
      bctx.strokeStyle = hexToRgba(grp.color, faded ? 0.18 : (isFocus ? 0.62 : 0.32));
      bctx.lineWidth = 1; bctx.setLineDash([5, 3]);
      bctx.beginPath();
      bctx.roundRect(winStart + 0.5, y + 1.5, winW - 1, bh - 3, 8);
      bctx.stroke();
      bctx.setLineDash([]);
      /* wrap 选中: 在 group 带内再描出 wrap 子框 */
      if (fi.dimWrap != null && Math.floor(fi.dimWrap / 4) === g) {
        const wrapRange = wrapRowRange(fi.dimWrap);
        if (!wrapRange) continue;
        const [wr0, wr1] = wrapRange;
        bctx.strokeStyle = hexToRgba(grp.color, 0.92);
        bctx.lineWidth = 1.4;
        bctx.beginPath();
        bctx.roundRect(winStart + 2.5, rowTop(wr0) + 1.5, winW - 5, rowBottom(wr1) - rowTop(wr0) - 3, 6);
        bctx.stroke();
      }
    }
  }
}

function drawSeparators(ctx, w) {
  const line = (row, color, weight) => {
    const y = rowTop(row) + 0.5;
    ctx.strokeStyle = color; ctx.lineWidth = weight;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  };
  rowItems.forEach((item, row) => {
    if (item.type === 'section') line(row, 'rgba(255,255,255,0.16)', 1);
  });
}

function drawWaitSegment(x, y, w, h, muted = false) {
  const waitColor = muted ? '#6F7480' : '#FFAA3B';
  bctx.save();
  bctx.beginPath(); bctx.roundRect(x, y, w, h, 2); bctx.clip();
  bctx.fillStyle = hexToRgba(waitColor, muted ? 0.18 : 0.14);
  bctx.fillRect(x, y, w, h);
  bctx.strokeStyle = muted ? 'rgba(111,116,128,0.48)' : 'rgba(255,170,59,0.5)';
  bctx.lineWidth = 1;
  for (let i = -h; i < w + h; i += 5) {
    bctx.beginPath(); bctx.moveTo(x + i, y + h); bctx.lineTo(x + i + h, y); bctx.stroke();
  }
  bctx.restore();
  bctx.strokeStyle = muted ? 'rgba(111,116,128,0.44)' : 'rgba(255,170,59,0.4)';
  bctx.lineWidth = 1;
  bctx.beginPath(); bctx.roundRect(x + 0.5, y + 0.5, Math.max(0, w - 1), h - 1, 2); bctx.stroke();
  if (w >= 6) {
    bctx.fillStyle = waitColor;
    bctx.beginPath();
    bctx.moveTo(x, y - 1); bctx.lineTo(x + 5, y - 1); bctx.lineTo(x + 2.5, y + 3.5);
    bctx.closePath(); bctx.fill();
  }
}

/* 同步弧线: 渐进显示
   overview -> 不画; group -> 该子图弧线中等; wrap -> 该 wrap 弧线强;
   任务 -> 选中任务弧线最强, 同 Wrap 其余弱 */
function drawDependencyArcs(fi) {
  const edges = MODEL.edges.filter((e) => fi.relEdges.has(e.id));
  edges.forEach((e) => drawArc(e, true));
}

function drawArcs(fi) {
  let visible, strongPred;
  if (fi.focusTask) {
    visible = MODEL.edges.filter((e) => e.wrap === fi.focusTask.wrap);
    strongPred = (e) => fi.relEdges.has(e.id);
  } else if (fi.dimWrap != null) {
    visible = MODEL.edges.filter((e) => e.wrap === fi.dimWrap);
    strongPred = () => true;
  } else if (fi.dimGroup != null) {
    visible = MODEL.edges.filter((e) => e.group === fi.dimGroup);
    strongPred = () => false;
  } else {
    return; /* overview: 保持干净, 不画弧线 */
  }
  /* 先弱后强, 保证强线在上层 */
  visible.filter((e) => !strongPred(e)).forEach((e) => drawArc(e, false));
  visible.filter((e) => strongPred(e)).forEach((e) => drawArc(e, true));
  /* 选中 task 的同步点 barrier 竖线 */
  if (fi.focusTask) {
    fi.focusTask.syncIn.concat(fi.focusTask.syncOut).forEach((eid) => {
      const e = edgeById[eid];
      drawBarrier(e.fromT, MODEL.groups[e.group].color);
      drawBarrier(e.toT, MODEL.groups[e.group].color);
    });
  }
}

function drawArc(e, strong) {
  const scale = pxPerUs();
  const fromRow = taskRow(taskById[e.fromTask]), toRow = taskRow(taskById[e.toTask]);
  if (!Number.isFinite(fromRow) || !Number.isFinite(toRow)) return;
  const x1 = e.fromT * scale, y1 = rowMidY(fromRow);
  const x2 = e.toT * scale, y2 = rowMidY(toRow);
  const fromColor = taskBaseColor(taskById[e.fromTask]);
  const toColor = taskBaseColor(taskById[e.toTask]);
  const grad = bctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, hexToRgba(fromColor, strong ? 0.98 : 0.32));
  grad.addColorStop(1, hexToRgba(toColor, strong ? 0.98 : 0.32));
  const bow = Math.max(14, Math.abs(y2 - y1) * 0.55) * (strong ? 1.15 : 1);
  bctx.save();
  bctx.strokeStyle = grad;
  bctx.lineWidth = strong ? 1.7 : 1;
  /* 控制点右推 -> 平滑外凸曲线 */
  bctx.beginPath();
  bctx.moveTo(x1, y1);
  bctx.bezierCurveTo(x1 + bow, y1, x2 + bow, y2, x2, y2);
  bctx.stroke();
  bctx.fillStyle = hexToRgba(fromColor, strong ? 1 : 0.5);
  bctx.beginPath(); bctx.arc(x1, y1, strong ? 2.6 : 1.8, 0, Math.PI * 2); bctx.fill();
  bctx.fillStyle = hexToRgba(toColor, strong ? 1 : 0.5);
  const arrow = strong ? 5.2 : 4.2;
  bctx.beginPath();
  bctx.moveTo(x2, y2);
  bctx.lineTo(x2 + arrow, y2 - arrow * 0.72);
  bctx.lineTo(x2 + arrow, y2 + arrow * 0.72);
  bctx.closePath();
  bctx.fill();
  bctx.restore();
}

function drawBarrier(tUs, color) {
  const x = Math.round(tUs * pxPerUs()) + 0.5;
  bctx.save();
  bctx.strokeStyle = hexToRgba(color, 0.45);
  bctx.lineWidth = 1; bctx.setLineDash([2, 3]);
  bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, bodyH()); bctx.stroke();
  bctx.restore();
}

/* ---- 时间轴 ---- */
function drawAxis() {
  const w = bodyW(), scale = pxPerUs();
  actx.clearRect(0, 0, w, AXIS_H);
  actx.fillStyle = 'rgba(255,255,255,0.40)';
  actx.font = "500 10px 'JetBrains Mono', monospace";
  actx.textBaseline = 'middle';
  for (let t = 0; t <= MODEL.timelineEnd; t += 50) {
    const x = Math.round(t * scale) + 0.5;
    const major = t % 100 === 0;
    actx.strokeStyle = major ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
    actx.beginPath();
    actx.moveTo(x, major ? AXIS_H - 11 : AXIS_H - 6); actx.lineTo(x, AXIS_H); actx.stroke();
    if (major) { actx.textAlign = 'left'; actx.fillText(t + 'μs', x + 3, 9); }
  }
  MODEL.layerMarks.forEach((m) => {
    const x = m.t * scale;
    actx.fillStyle = 'rgba(255,255,255,0.62)';
    actx.font = "600 10px 'Inter', sans-serif";
    actx.textAlign = 'left';
    actx.fillText('迭代 ' + m.label, x + 4, 22);
  });
}

function layerWindow(layer) {
  const startBound = MODEL.LAYER0 + layer * MODEL.LAYER_SPAN - 60;
  const endBound = MODEL.LAYER0 + (layer + 1) * MODEL.LAYER_SPAN;
  const tasks = MODEL.tasks.filter((t) => t.start >= startBound && t.start < endBound);
  if (!tasks.length) return null;
  const start = Math.max(0, Math.min(...tasks.map((t) => t.start)) - 8);
  const end = Math.min(MODEL.timelineEnd, Math.max(...tasks.map((t) => t.end)) + 8);
  return { start, end };
}

function fitLayer(layer) {
  const win = layerWindow(layer);
  if (!win) return;
  const span = Math.max(1, win.end - win.start);
  const desiredZoom = Math.floor((MODEL.timelineEnd / span) * 100);
  setZoom(desiredZoom);
  window.requestAnimationFrame(() => {
    bodyWrap.scrollLeft = Math.max(0, win.start * pxPerUs());
    axisWrap.scrollLeft = bodyWrap.scrollLeft;
    overviewWrap.scrollLeft = bodyWrap.scrollLeft;
    syncGlobalRulerBrush();
  });
}

function hitLayerLabel(canvasX, canvasY) {
  if (canvasY < 8 || canvasY > AXIS_H) return null;
  const scale = pxPerUs();
  return MODEL.layerMarks.find((m) => {
    const x = m.t * scale;
    return canvasX >= x && canvasX <= x + 62;
  }) || null;
}

function laneUtil(coreIdx, sublane = null) {
  let active = 0;
  MODEL.tasks.forEach((t) => {
    if (t.coreIdx !== coreIdx) return;
    if (sublane && taskSublane(t) !== sublane) return;
    active += t.end - t.start;
  });
  const ratio = Math.max(0, Math.min(1, active / Math.max(1, MODEL.timelineEnd)));
  return { active, ratio };
}
function laneUtilForItem(item) {
  if (!item || (item.type !== 'core' && item.type !== 'subcore')) return null;
  return laneUtil(item.coreIdx, item.type === 'subcore' ? item.sublane : null);
}

function hitLaneUtil(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  if (canvasX < 104 || canvasX > LABEL_W - 2) return null;
  const item = rowItems[row];
  const coreIdx = rowToCore[row];
  if (coreIdx == null || (item.type !== 'core' && item.type !== 'subcore')) return null;
  return { core: MODEL.cores[coreIdx], sublane: item.sublane || null, item, util: laneUtilForItem(item), key: rowLaneKey(row) };
}

function hitLaneSection(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  const item = rowItems[row];
  if (item.type !== 'section') return null;
  return item;
}

function hitExpandableLane(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  const item = rowItems[row];
  if (item.type !== 'core') return null;
  const core = MODEL.cores[item.coreIdx];
  if (!isExpandableCore(core)) return null;
  return { item, core, row, inIcon: canvasX >= 4 && canvasX <= 22 };
}

/* ---- 泳道标签列 ---- */
function drawLanes() {
  const h = bodyH();
  lctx.clearRect(0, 0, LABEL_W, h);
  lctx.textBaseline = 'middle';
  const fi = focusInfo();
  for (let row = 0; row < rowItems.length; row++) {
    const item = rowItems[row];
    const y = rowTop(row), rh = rowHeight(row);
    if (item.type === 'section') {
      const collapsed = state.collapsedLaneGroups.has(item.id);
      lctx.fillStyle = 'rgba(255,255,255,0.04)';
      lctx.fillRect(0, y, LABEL_W, rh);
      lctx.fillStyle = 'rgba(255,255,255,0.72)';
      lctx.font = "700 10px 'Inter', sans-serif";
      lctx.textAlign = 'left';
      lctx.beginPath();
      if (collapsed) {
        lctx.moveTo(9, y + ROW_H / 2 - 4);
        lctx.lineTo(15, y + ROW_H / 2);
        lctx.lineTo(9, y + ROW_H / 2 + 4);
      } else {
        lctx.moveTo(7, y + ROW_H / 2 - 2);
        lctx.lineTo(16, y + ROW_H / 2 - 2);
        lctx.lineTo(11.5, y + ROW_H / 2 + 4);
      }
      lctx.closePath();
      lctx.fill();
      lctx.fillText(item.label, 24, y + ROW_H / 2 + 0.5);
      lctx.fillStyle = 'rgba(255,255,255,0.34)';
      lctx.font = "600 9px 'JetBrains Mono', monospace";
      lctx.textAlign = 'right';
      lctx.fillText(String(item.count), LABEL_W - 8, y + ROW_H / 2 + 0.5);
      continue;
    }
    if (item.type !== 'core' && item.type !== 'subcore') continue;

    const c = MODEL.cores[item.coreIdx];
    const hovered = isRowHovered(row);
    if (hovered) {
      lctx.fillStyle = 'rgba(255,255,255,0.055)';
      lctx.fillRect(0, y, LABEL_W, rh);
    }
    const dim = (fi.dimWrap != null && c.wrap !== fi.dimWrap)
      || (fi.dimWrap == null && fi.dimGroup != null && c.group !== fi.dimGroup);

    if (item.type === 'core' && c.kind === 'aic') {
      lctx.fillStyle = dim ? 'rgba(124,141,184,0.24)' : 'rgba(124,141,184,0.68)';
      lctx.fillRect(0, y + 2, 3, Math.max(2, rh - 4));
    }

    if (item.type === 'core' && hovered && isExpandableCore(c)) {
      const expanded = state.expandedLaneCores.has(c.idx);
      lctx.fillStyle = 'rgba(255,255,255,0.62)';
      lctx.beginPath();
      if (expanded) {
        lctx.moveTo(8, y + rh / 2 - 2);
        lctx.lineTo(17, y + rh / 2 - 2);
        lctx.lineTo(12.5, y + rh / 2 + 4);
      } else {
        lctx.moveTo(10, y + rh / 2 - 4);
        lctx.lineTo(16, y + rh / 2);
        lctx.lineTo(10, y + rh / 2 + 4);
      }
      lctx.closePath();
      lctx.fill();
    }

    /* 标签 */
    lctx.fillStyle = dim ? 'rgba(255,255,255,0.3)' : (item.type === 'subcore' ? 'rgba(255,255,255,0.56)' : 'rgba(255,255,255,0.8)');
    lctx.font = item.type === 'subcore' ? "500 10px 'Inter', sans-serif" : "500 11px 'Inter', sans-serif";
    lctx.textAlign = 'left';
    const label = item.type === 'subcore' ? item.sublane : c.label;
    const labelX = item.type === 'subcore' ? 38 : 24;
    const labelMax = item.type === 'subcore' ? 62 : 80;
    lctx.fillText(label, labelX, y + rh / 2 + 0.5, labelMax);

    const util = laneUtilForItem(item);
    const ux = 108;
    const uh = item.type === 'subcore' ? 5 : 8;
    const uy = y + rh / 2 - uh / 2;
    const uw = 42;
    const utilHovered = state.hoverLaneUtilKey === rowLaneKey(row);
    lctx.fillStyle = utilHovered ? 'rgba(255,255,255,0.11)' : 'rgba(255,255,255,0.055)';
    lctx.beginPath();
    lctx.roundRect(ux, uy, uw, uh, 2);
    lctx.fill();
    lctx.fillStyle = dim ? 'rgba(124,141,184,0.28)' : (utilHovered ? 'rgba(124,141,184,0.86)' : 'rgba(124,141,184,0.62)');
    lctx.beginPath();
    lctx.roundRect(ux, uy, Math.max(2, uw * util.ratio), uh, 2);
    lctx.fill();
    if (utilHovered) {
      lctx.strokeStyle = 'rgba(255,255,255,0.24)';
      lctx.lineWidth = 1;
      lctx.beginPath();
      lctx.roundRect(ux + 0.5, uy + 0.5, uw - 1, uh - 1, 2);
      lctx.stroke();
    }
    lctx.fillStyle = dim ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.42)';
    lctx.font = item.type === 'subcore' ? "600 8px 'JetBrains Mono', monospace" : "600 9px 'JetBrains Mono', monospace";
    lctx.textAlign = 'right';
    lctx.fillText(Math.round(util.ratio * 100) + '%', LABEL_W - 7, y + rh / 2 + 0.5);
  }
  /* 分隔线 */
  const line = (row, color, weight) => {
    const yy = rowTop(row) + 0.5;
    lctx.strokeStyle = color; lctx.lineWidth = weight;
    lctx.beginPath(); lctx.moveTo(0, yy); lctx.lineTo(LABEL_W, yy); lctx.stroke();
  };
  rowItems.forEach((item, row) => {
    if (item.type === 'section') line(row, 'rgba(255,255,255,0.16)', 1);
  });
}

function smoothPath(points) {
  if (!points.length) return '';
  if (points.length === 1) return `M${points[0].x},${points[0].y}`;
  let d = `M${points[0].x.toFixed(2)},${points[0].y.toFixed(2)}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(points.length - 1, i + 2)];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
  }
  return d;
}

function clampMetric(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function buildOverviewMetrics() {
  const samples = 72;
  const metricDefs = [
    { key: 'hostQueue', label: 'Host CPU 队列', unit: '', max: 8, color: '#7C8DB8' },
    { key: 'activeAi', label: '活跃 AI Core', unit: ' 核', max: 32, color: '#5A92E6' },
    { key: 'aivIdle', label: 'AIV 空闲', unit: '%', max: 100, color: '#FFAA3B' },
    { key: 'ubLive', label: 'UB Live', unit: '%', max: 100, color: '#9B6BF0' },
    { key: 'mteBw', label: 'MTE 带宽', unit: ' GB/s', max: 900, color: '#04D793' },
  ];
  const series = metricDefs.map((m) => ({ ...m, values: [] }));
  for (let i = 0; i < samples; i++) {
    const f = i / Math.max(1, samples - 1);
    const t = f * MODEL.timelineEnd;
    let hostActive = 0, aivTotal = 0, aivWaiting = 0, mteActive = 0;
    const activeWraps = new Set();
    MODEL.tasks.forEach((task) => {
      const core = MODEL.cores[task.coreIdx];
      const active = t >= task.start && t <= task.end;
      const computing = t >= task.start && t <= task.computeEnd;
      const waiting = t > task.computeEnd && t <= task.end;
      if (core.kind === 'cpu' && active) hostActive++;
      if ((core.kind === 'aic' || core.kind === 'aiv') && computing) activeWraps.add(core.wrap);
      if (core.kind === 'aiv') {
        aivTotal++;
        if (waiting) aivWaiting++;
      }
      if (core.kind === 'mte' && active) mteActive++;
    });
    const aiCompute = activeWraps.size;
    const pulse = 0.5 + 0.5 * Math.sin(f * Math.PI * 9);
    const bottleneck = Math.exp(-Math.pow((t - (MODEL.LAYER0 + MODEL.LAYER_SPAN + MODEL.STAGGER * 1.4)) / 230, 2));
    series[0].values.push(clampMetric(hostActive + 1.6 * pulse + 2.2 * bottleneck, 0, 8));
    series[1].values.push(clampMetric(aiCompute, 0, 32));
    series[2].values.push(clampMetric((aivWaiting / Math.max(1, aivTotal)) * 100 + 20 * bottleneck, 0, 100));
    series[3].values.push(clampMetric(34 + aiCompute * 0.72 + mteActive * 8 + 18 * bottleneck + 8 * pulse, 0, 100));
    series[4].values.push(clampMetric(120 + mteActive * 230 + 90 * pulse + 140 * Math.max(0, Math.sin(f * Math.PI * 6)), 0, 900));
  }
  return series;
}

function renderOverviewBand() {
  const w = bodyW();
  const h = 62;
  const top = 7;
  const bottom = 9;
  overviewMetricSeries = buildOverviewMetrics();
  const grid = [0.25, 0.5, 0.75].map((p) => {
    const y = top + (h - top - bottom) * p;
    return `<path d="M0 ${y.toFixed(2)} H${w}" stroke="rgba(255,255,255,0.055)" stroke-width="1"></path>`;
  }).join('');
  const paths = overviewMetricSeries.map((metric) => {
    const points = metric.values.map((value, i) => {
      const f = i / Math.max(1, metric.values.length - 1);
      const y = top + (1 - value / metric.max) * (h - top - bottom);
      return { x: f * w, y };
    });
    const line = smoothPath(points);
    const area = `${line} L${w.toFixed(2)},${(h - bottom).toFixed(2)} L0,${(h - bottom).toFixed(2)} Z`;
    return `<path d="${area}" fill="${metric.color}" opacity="0.10"></path><path d="${line}" fill="none" stroke="${metric.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"></path>`;
  }).join('');
  let marker = '';
  if (state.selTask) {
    const x = state.selTask.start * pxPerUs();
    const mw = Math.max(2, (state.selTask.end - state.selTask.start) * pxPerUs());
    marker = `<div class="sl-overview-marker" style="left:${x}px;width:${mw}px"></div>`;
  }
  overviewBand.style.width = w + 'px';
  overviewBand.innerHTML = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">${grid}${paths}</svg>${marker}<div class="sl-overview-cursor" id="overviewCursor" hidden></div><div class="sl-overview-tooltip pto-swimlane-task-tooltip" id="overviewTooltip" hidden aria-hidden="true"></div>`;
}

function renderGlobalRuler() {
  if (!globalRulerTicks) return;
  globalRulerScale.style.width = visibleTrackW() + 'px';
  let html = '';
  for (let t = 0; t <= MODEL.timelineEnd; t += 100) {
    const major = t % 200 === 0;
    html += `<div class="sl-global-ruler__tick ${major ? 'is-major' : ''}" style="left:${(t / MODEL.timelineEnd * 100).toFixed(4)}%">${major ? t + 'μs' : ''}</div>`;
  }
  globalRulerTicks.innerHTML = html;
  syncGlobalRulerBrush();
}

function syncGlobalRulerBrush() {
  if (!globalRulerBrush) return;
  const w = bodyW();
  const visible = Math.max(1, bodyWrap.clientWidth || visibleTrackW());
  const leftF = Math.max(0, Math.min(1, bodyWrap.scrollLeft / w));
  const widthF = Math.max(0.01, Math.min(1 - leftF, visible / w));
  const trackW = visibleTrackW();
  const isFull = leftF <= 0.002 && widthF >= 0.998;
  globalRulerBrush.style.left = (isFull ? 0 : leftF * trackW) + 'px';
  globalRulerBrush.style.width = (isFull ? trackW : Math.max(3, widthF * trackW)) + 'px';
}

function formatMetricValue(metric, value) {
  if (metric.key === 'hostQueue') return value.toFixed(1);
  if (metric.key === 'activeAi') return Math.round(value) + metric.unit;
  if (metric.key === 'mteBw') return Math.round(value) + metric.unit;
  return value.toFixed(1) + metric.unit;
}

function showOverviewTooltip(e) {
  if (!overviewMetricSeries.length) return;
  const rect = overviewBand.getBoundingClientRect();
  if (!rect.width) return;
  const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
  const f = x / rect.width;
  const idx = Math.max(0, Math.min(overviewMetricSeries[0].values.length - 1, Math.round(f * (overviewMetricSeries[0].values.length - 1))));
  const t = f * MODEL.timelineEnd;
  const cursor = document.getElementById('overviewCursor');
  const tip = document.getElementById('overviewTooltip');
  if (!cursor || !tip) return;
  cursor.hidden = false;
  cursor.style.left = x + 'px';
  const rows = overviewMetricSeries.map((metric) => (
    `<div class="pto-swimlane-task-tooltip__row"><span class="pto-swimlane-task-tooltip__key"><span class="sl-overview-tip-swatch" style="background:${metric.color}"></span>${metric.label}</span><span class="pto-swimlane-task-tooltip__value">${formatMetricValue(metric, metric.values[idx])}</span></div>`
  )).join('');
  tip.innerHTML = `<div class="pto-swimlane-task-tooltip__title">时间戳 ${t.toFixed(1)}μs</div>${rows}`;
  tip.hidden = false;
  tip.classList.add('is-visible');
  tip.setAttribute('aria-hidden', 'false');
  const tw = tip.offsetWidth || 214;
  const left = x + 12 + tw > rect.width ? x - tw - 12 : x + 12;
  tip.style.left = Math.max(2, Math.min(rect.width - tw - 2, left)) + 'px';
  tip.style.top = '6px';
}

function hideOverviewTooltip() {
  const cursor = document.getElementById('overviewCursor');
  const tip = document.getElementById('overviewTooltip');
  if (cursor) cursor.hidden = true;
  if (tip) {
    tip.classList.remove('is-visible');
    tip.setAttribute('aria-hidden', 'true');
    tip.hidden = true;
  }
}

function runCardHtml(r) {

    `<div class="sl-history-artifact"><span class="nm" title="${escapeHtml(a.name)}">${escapeHtml(a.name)}</span><span class="rl">${escapeHtml(ARTIFACT_ZH[a.role] || '')}</span></div>`

function renderRunHistory() {
  if (!runHistoryBody) return;

  runHistoryBody.querySelectorAll('[data-run-id]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.runId;
      if (state.expandedRuns.has(id)) state.expandedRuns.delete(id);
      else state.expandedRuns.add(id);
      renderRunHistory();
    });
  });
  const meta = document.getElementById('runHistoryMeta');
  if (meta) meta.textContent = '';
}

function layout() {
  const w = bodyW(), h = bodyH();
  bctx = setupCanvas(bodyCanvas, w, h);
  actx = setupCanvas(axisCanvas, w, AXIS_H);
  lctx = setupCanvas(laneCanvas, LABEL_W, h);
  renderGlobalRuler();
  renderOverviewBand();
  drawAxis(); drawLanes(); drawBody();
}
function refresh() { renderGlobalRuler(); renderOverviewBand(); drawLanes(); drawBody(); }

function hitTest(px, py) {
  const row = hitRowAt(py);
  if (row < 0 || row >= rowItems.length) return null;
  const coreIdx = rowToCore[row];
  if (coreIdx == null) return null;
  const scale = pxPerUs();
  for (const t of MODEL.tasks) {
    if (t.coreIdx !== coreIdx) continue;
    if (taskRow(t) !== row) continue;
    if (px >= t.start * scale - 1 && px <= t.end * scale + 1) return t;
  }
  return null;
}

/* ============================================================
   8. 交互
   ============================================================ */
bodyWrap.addEventListener('scroll', () => {
  axisWrap.scrollLeft = bodyWrap.scrollLeft;
  overviewWrap.scrollLeft = bodyWrap.scrollLeft;
  laneWrap.scrollTop = bodyWrap.scrollTop;
  syncGlobalRulerBrush();
});
overviewBand.addEventListener('mousemove', showOverviewTooltip);
overviewBand.addEventListener('mouseleave', hideOverviewTooltip);
axisCanvas.addEventListener('mousemove', (e) => {
  const rect = axisCanvas.getBoundingClientRect();
  axisCanvas.style.cursor = hitLayerLabel(e.clientX - rect.left, e.clientY - rect.top) ? 'pointer' : 'default';
});
axisCanvas.addEventListener('mouseleave', () => {
  axisCanvas.style.cursor = 'default';
});
axisCanvas.addEventListener('click', (e) => {
  const rect = axisCanvas.getBoundingClientRect();
  const mark = hitLayerLabel(e.clientX - rect.left, e.clientY - rect.top);
  if (mark) fitLayer(mark.layer);
});
laneCanvas.addEventListener('mousemove', (e) => {
  const rect = laneCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const hit = hitLaneUtil(x, y);
  const section = hitLaneSection(x, y);
  const expandable = hitExpandableLane(x, y);
  const hitRow = hitRowAt(y);
  const nextLaneKey = hitRow >= 0 ? rowLaneKey(hitRow) : null;
  const nextUtilKey = hit ? hit.key : null;
  if (state.hoverLaneKey !== nextLaneKey || state.hoverLaneUtilKey !== nextUtilKey) {
    state.hoverLaneKey = nextLaneKey;
    state.hoverLaneUtilKey = nextUtilKey;
    drawLanes();
    drawBody();
  }
  laneCanvas.style.cursor = section || expandable?.inIcon ? 'pointer' : 'default';
  if (hit) showLaneUtilTooltip(hit, e.clientX, e.clientY);
  else hideTaskTooltip();
});
laneCanvas.addEventListener('mouseleave', () => {
  laneCanvas.style.cursor = 'default';
  state.hoverLaneKey = null;
  state.hoverLaneUtilKey = null;
  drawLanes();
  drawBody();
  hideTaskTooltip();
});
laneCanvas.addEventListener('click', (e) => {
  const rect = laneCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const expandable = hitExpandableLane(x, y);
  if (expandable?.inIcon) {
    if (state.expandedLaneCores.has(expandable.core.idx)) state.expandedLaneCores.delete(expandable.core.idx);
    else state.expandedLaneCores.add(expandable.core.idx);
    buildOrder();
    state.hoverLaneKey = null;
    state.hoverLaneUtilKey = null;
    layout();
    return;
  }
  const section = hitLaneSection(x, y);
  if (section) {
    if (state.collapsedLaneGroups.has(section.id)) state.collapsedLaneGroups.delete(section.id);
    else state.collapsedLaneGroups.add(section.id);
    buildOrder();
    state.hoverLaneKey = null;
    state.hoverLaneUtilKey = null;
    layout();
  }
});

bodyCanvas.addEventListener('mousemove', (e) => {
  const rect = bodyCanvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const row = hitRowAt(py);
  const nextLaneKey = row >= 0 ? rowLaneKey(row) : null;
  const t = hitTest(px, py);
  const taskLaneKey = t ? laneKeyForTask(t) : nextLaneKey;
  if (t !== state.hoverTask) {
    state.hoverTask = t;
    bodyCanvas.style.cursor = t ? 'pointer' : 'default';
  }
  if (state.hoverLaneKey !== taskLaneKey) state.hoverLaneKey = taskLaneKey;
  drawLanes();
  drawBody();
  if (t) showTooltip(t, e.clientX, e.clientY);
  else hideTaskTooltip();
});
bodyCanvas.addEventListener('mouseleave', () => {
  state.hoverTask = null;
  state.hoverLaneKey = null;
  hideTaskTooltip();
  drawLanes();
  drawBody();
});
bodyCanvas.addEventListener('click', (e) => {
  const rect = bodyCanvas.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const t = hitTest(px, py);
  if (t) { selectTask(t); return; }
  /* 点空白: Mix 模式下按所在 wrap / group 下钻 */
  if (state.mixMode) {
    const row = hitRowAt(py);
    const coreIdx = rowToCore[row];
    const core = coreIdx != null ? MODEL.cores[coreIdx] : null;
    if (core && core.wrap != null) {
      const w = core.wrap;
      const g = Math.floor(w / 4);
      if (state.level === 'wrap' && state.selWrap === w) selectGroup(g);
      else if (state.selGroup === g && state.level !== 'overview') selectWrap(w);
      else selectGroup(g);
      return;
    }
  }
  goOverview();
});

function selectTask(t) {
  state.level = 'task'; state.selTask = t;
  state.selGroup = t.group; state.selWrap = t.wrap;
  refresh(); renderInspector();
  document.getElementById('inspBody').scrollTop = 0;
}
function selectGroup(g) {
  state.level = 'group'; state.selGroup = g; state.selWrap = null; state.selTask = null;
  refresh(); renderInspector();
}
function selectWrap(w) {
  state.level = 'wrap'; state.selWrap = w; state.selGroup = Math.floor(w / 4); state.selTask = null;
  refresh(); renderInspector(); scrollWrapIntoView(w);
}
function goOverview() {
  state.level = 'overview'; state.selGroup = null; state.selWrap = null; state.selTask = null;
  refresh(); renderInspector();
  document.getElementById('inspBody').scrollTop = 0;
}
function scrollWrapIntoView(w) {
  let range = wrapRowRange(w);
  if (!range) {
    const core = MODEL.cores[MODEL.aicIdxOfWrap(w)];
    if (core?.laneGroup) state.collapsedLaneGroups.delete(core.laneGroup);
    buildOrder();
    layout();
    range = wrapRowRange(w);
  }
  if (!range) return;
  const [r0, r1] = range;
  const top = rowTop(r0), mid = (top + rowBottom(r1)) / 2;
  bodyWrap.scrollTop = Math.max(0, mid - bodyWrap.clientHeight / 2);
}

function scrollTaskIntoView(t) {
  let row = taskRow(t);
  if (!Number.isFinite(row)) {
    const core = MODEL.cores[t.coreIdx];
    if (core?.laneGroup) state.collapsedLaneGroups.delete(core.laneGroup);
    buildOrder();
    layout();
    row = taskRow(t);
  }
  if (!Number.isFinite(row)) return;
  const y = rowMidY(row);
  const x = (t.start + t.end) / 2 * pxPerUs();
  bodyWrap.scrollTop = Math.max(0, y - bodyWrap.clientHeight / 2);
  bodyWrap.scrollLeft = Math.max(0, x - bodyWrap.clientWidth / 2);
  axisWrap.scrollLeft = bodyWrap.scrollLeft;
  overviewWrap.scrollLeft = bodyWrap.scrollLeft;
  laneWrap.scrollTop = bodyWrap.scrollTop;
  syncGlobalRulerBrush();
}

function showTooltip(t, cx, cy) {
  const grp = t.group != null ? MODEL.groups[t.group] : null;
  const compute = (t.computeEnd - t.start).toFixed(1);
  const wait = (t.end - t.computeEnd).toFixed(1);
  const total = (t.end - t.start) || 1;
  const ratio = ((t.end - t.computeEnd) / total * 100).toFixed(0);
  const color = grp ? grp.color : KIND_ACCENT[t.kind];
  tooltip.innerHTML = `
    <div class="pto-swimlane-task-tooltip__title"><span class="sl-task-tooltip-dot" style="background:${color}"></span>${escapeHtml(t.name)}</div>
    <div class="pto-swimlane-task-tooltip__row"><span class="pto-swimlane-task-tooltip__key">泳道</span><span class="pto-swimlane-task-tooltip__value">${escapeHtml(taskLaneDisplayLabel(t))}</span></div>

/* ============================================================
   9. Inspector (概览 → 子图 → Wrap → Task 下钻)
   ============================================================ */
function coreStats(coreIdx, group, wrap) {
  let compute = 0, wait = 0, n = 0;
  for (const t of MODEL.tasks) {
    if (t.coreIdx !== coreIdx) continue;
    if (group != null && t.group !== group) continue;
    compute += t.computeEnd - t.start; wait += t.end - t.computeEnd; n++;
  }
  return { compute, wait, n, ratio: wait / (compute + wait || 1) };
}
function groupStats(g) {
  let compute = 0, wait = 0;
  for (const t of MODEL.tasks) {
    if (t.group !== g) continue;
    if (MODEL.cores[t.coreIdx].kind !== 'aic' && MODEL.cores[t.coreIdx].kind !== 'aiv') continue;
    compute += t.computeEnd - t.start; wait += t.end - t.computeEnd;
  }
  return { compute, wait, ratio: wait / (compute + wait || 1) };
}
function wrapStats(w) {
  const aic = MODEL.aicIdxOfWrap(w), aiv = MODEL.aivIdxOfWrap(w);
  const s = (ci) => coreStats(ci);
  const all = [s(aic), s(aiv[0]), s(aiv[1])];
  let compute = 0, wait = 0;
  all.forEach((x) => { compute += x.compute; wait += x.wait; });
  return { aic: all[0], aiv0: all[1], aiv1: all[2], ratio: wait / (compute + wait || 1) };
}

function runMetricChips() {
  let compute = 0, wait = 0;
  MODEL.tasks.forEach((t) => { compute += t.computeEnd - t.start; wait += t.end - t.computeEnd; });
  const ratio = (wait / (compute + wait) * 100).toFixed(1);
  return `<div class="sl-report-metrics">
    <span class="stat-chip">${MODEL.cores.length} 条泳道</span>
    <span class="stat-chip">${MODEL.tasks.length} 个任务</span>
    <span class="stat-chip">${MODEL.edges.length} 条同步边</span>
    <span class="stat-chip" style="color:var(--warning)">同步等待 ${ratio}%</span>
  </div>`;
}

function runAggregateStats() {
  let compute = 0, wait = 0, active = 0;
  const laneUtils = MODEL.cores.map((_, coreIdx) => laneUtil(coreIdx).ratio);
  MODEL.tasks.forEach((t) => {
    compute += t.computeEnd - t.start;
    wait += t.end - t.computeEnd;
    active += t.end - t.start;
  });
  const total = compute + wait || 1;
  const avgLaneUtil = active / Math.max(1, MODEL.timelineEnd * MODEL.cores.length);
  const minUtil = Math.min(...laneUtils);
  const maxUtil = Math.max(...laneUtils);
  const balance = maxUtil > 0 ? minUtil / maxUtil : 1;
  return {
    tasks: MODEL.tasks.length,
    syncEdges: MODEL.edges.length,
    duration: MODEL.timelineEnd,
    waitRatio: wait / total,
    avgLaneUtil,
    avgBubble: 1 - avgLaneUtil,
    loadBalance: balance,
    extraGmUbKiB: 384,
    ubHeadroomKiB: 13.5,
    mte2Util: 0.81,
  };
}

function topTasks() {
  return [...MODEL.tasks]
    .map((t) => {
      const compute = t.computeEnd - t.start;
      const wait = t.end - t.computeEnd;
      const total = t.end - t.start || 1;
      const score = wait * 2 + total * 0.25;
      return { task: t, compute, wait, total, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="sl-pill" style="color:${grp.color}"><span class="sl-dot" style="width:8px;height:8px;background:${grp.color}"></span>${grp.short}</span>
      <span class="sl-pill ${ws.ratio >= 0.4 ? 'is-warn' : 'is-ok'}">${ws.ratio >= 0.4 ? '同步瓶颈' : '健康'}</span>
    </div>
    <div class="sl-insp-hint">1C2V 单元 = 1 个 Cube 核 + 2 个 Vector 核, 物理上协同执行。</div>
  </div>
  <div class="sl-insp-section"><div class="sl-insp-section-label">单元内三核 · 计算与同步等待</div>`;
  cores3.forEach((c) => {
    const tot = c.st.compute + c.st.wait || 1;
    const cp = (c.st.compute / tot * 100), wp = (c.st.wait / tot * 100);
    html += `<div style="margin-top:8px">
      <div class="sl-kv" style="padding-bottom:3px;border:0">
        <span class="sl-kv-key">${laneDisplayLabel(MODEL.cores[c.ci])} · ${c.role}</span>
        <span class="sl-kv-val">计算 ${c.st.compute.toFixed(0)} / 等待 ${c.st.wait.toFixed(0)}μs</span></div>
      <div class="sl-meter">
        <div class="sl-meter-fill" style="width:${cp}%;background:${grp.color};float:left"></div>
        <div class="sl-meter-fill" style="width:${wp}%;background:repeating-linear-gradient(135deg,rgba(255,170,59,0.9) 0 3px,rgba(255,170,59,0.35) 3px 6px);float:left"></div>
      </div></div>`;
  });
  html += `</div>`;
  const edgeN = MODEL.edges.filter((e) => e.wrap === w).length;
  html += `<div class="sl-insp-section">
    <div class="sl-kv"><span class="sl-kv-key">单元内同步边</span><span class="sl-kv-val">${edgeN}</span></div>
  </div>`;
  if (w === SCENARIO.slowWrap) {
    html += `<div class="sl-callout">
      <b>根因锁定</b> —— <b>${laneDisplayLabel(MODEL.cores[aicCore])}</b> 在跑一个「K 维未切分」的超大 BMM,
      单任务计算量约为正常 tile 的 2.5x。它一直没发出 SyncSet,
      配对的两个 AIV 算完一小段后就长时间停等。<br>
      优化方向: 对该 BMM 做 K-split, 把单核长任务拆成多个 tile, 让 AIV 不必整段等待。</div>`;
  } else {
    html += `<div class="sl-callout is-success">
      该 Wrap 三核耗时较均衡。点击任务查看单个任务的同步事件。</div>`;
  }
  return html;
}

function taskDetailHtml(t) {
  const grp = t.group != null ? MODEL.groups[t.group] : null;
  const compute = t.computeEnd - t.start, wait = t.end - t.computeEnd;
  const total = (t.end - t.start) || 1, ratio = wait / total;
  const pct = (ratio * 100).toFixed(0);
  let html = `<div class="sl-task-detail-head">
    <button class="btn btn-sm btn-ghost sl-task-back" type="button" data-return-default aria-label="返回性能统计默认态">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"></path></svg>
      <span>返回</span>
    </button>
    <div class="sl-task-detail-title" title="${escapeHtml(t.name)}">${escapeHtml(t.name)}</div>
  </div>
  <div class="sl-insp-section">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="sl-pill" style="color:${grp ? grp.color : 'var(--accent)'}">
        <span class="sl-dot" style="width:8px;height:8px;background:${grp ? grp.color : 'var(--accent)'}"></span>
        ${grp ? grp.short : MODEL.cores[t.coreIdx].section}</span>
      <span class="sl-pill ${ratio >= 0.3 ? 'is-warn' : 'is-ok'}">${ratio >= 0.3 ? '同步瓶颈' : '计算主导'}</span>
    </div>
    <div class="sl-kv"><span class="sl-kv-key">泳道</span><span class="sl-kv-val">${taskLaneDisplayLabel(t)}</span></div>
    <div class="sl-kv"><span class="sl-kv-key">所属 Wrap</span><span class="sl-kv-val">${t.wrap != null ? 'W' + String(t.wrap).padStart(2, '0') : '—'}</span></div>
    <div class="sl-kv"><span class="sl-kv-key">区间</span><span class="sl-kv-val">${t.start.toFixed(1)}–${t.end.toFixed(1)}μs</span></div>
    <div class="sl-kv"><span class="sl-kv-key">输入 / 输出</span><span class="sl-kv-val">输入 ${t.inputRawMagic.length} · 输出 ${t.outputRawMagic.length}</span></div>
  </div>
  <div class="sl-insp-section"><div class="sl-insp-section-label">计算与同步等待</div>
    <div class="sl-meter" style="height:14px">
      <div class="sl-meter-fill" style="width:${compute / total * 100}%;background:${grp ? grp.color : 'var(--accent)'};float:left"></div>
      <div class="sl-meter-fill" style="width:${pct}%;background:repeating-linear-gradient(135deg,rgba(255,170,59,0.9) 0 3px,rgba(255,170,59,0.35) 3px 6px);float:left"></div>
    </div>
    <div class="sl-kv"><span class="sl-kv-key">计算段</span><span class="sl-kv-val">${compute.toFixed(1)}μs</span></div>
    <div class="sl-kv"><span class="sl-kv-key">同步等待段</span><span class="sl-kv-val" style="color:var(--warning)">${wait.toFixed(1)}μs · ${pct}%</span></div>
  </div>`;
  const ins = t.syncIn.map((id) => edgeById[id]);
  const outs = t.syncOut.map((id) => edgeById[id]);
  html += `<div class="sl-insp-section"><div class="sl-insp-section-label">同步事件 (${ins.length + outs.length})</div>`;
  if (ins.length + outs.length === 0) {
    html += `<div class="sl-insp-hint">该任务无登记的核间同步边。${wait > 0 ? '末段为未归因的屏障等待。' : ''}</div>`;
  }
  ins.forEach((e) => {
    html += `<div class="sl-sync-item">▼ <b>SyncWait</b> · 等待 <span class="mono">${laneDisplayLabel(MODEL.cores[e.fromCore])}</span>
      的 SyncSet @ <span class="mono">${e.fromT.toFixed(1)}μs</span>, 等待耗时 <span class="mono">${e.wait.toFixed(1)}μs</span></div>`;
  });
  outs.forEach((e) => {
    html += `<div class="sl-sync-item">▲ <b>SyncSet</b> · 向 <span class="mono">${laneDisplayLabel(MODEL.cores[e.toCore])}</span>
      发出信号 @ <span class="mono">${e.fromT.toFixed(1)}μs</span></div>`;
  });
  html += `</div>`;
  if (wait > 0) {
    html += `<div class="sl-callout">
      该任务实际计算仅 <b>${compute.toFixed(0)}μs</b>, 另有 <b>${wait.toFixed(0)}μs</b> 在等待同步。
      ${ins.length ? '优先缩短上游 <b>' + laneDisplayLabel(MODEL.cores[ins[0].fromCore]) + '</b> 的前序计算量。'
        : '检查同 Wrap 内核间负载是否均衡。'}</div>`;
  }
  return html;
}

function bindInspector() {
  const body = document.getElementById('inspBody');
  body.querySelectorAll('.sl-crumb-item').forEach((el) => {
    el.addEventListener('click', () => {
      const nav = el.dataset.nav;
      if (nav === 'overview') goOverview();
      else if (nav === 'group' && state.selGroup != null) selectGroup(state.selGroup);
      else if (nav === 'wrap' && state.selWrap != null) selectWrap(state.selWrap);
    });
  });
  body.querySelectorAll('[data-group]').forEach((el) => {
    el.addEventListener('click', () => selectGroup(Number(el.dataset.group)));
  });
  body.querySelectorAll('[data-wrap]').forEach((el) => {
    el.addEventListener('click', () => selectWrap(Number(el.dataset.wrap)));
  });
  body.querySelectorAll('[data-report-tab]').forEach((el) => {
    el.addEventListener('click', () => {
      state.reportTab = el.dataset.reportTab;
      renderInspector();
      document.getElementById('inspBody').scrollTop = 0;
    });
  });
  body.querySelectorAll('[data-pmu-group]').forEach((el) => {
    el.addEventListener('click', () => {
      state.pmuGroup = Number(el.dataset.pmuGroup);
      renderInspector();
      document.getElementById('inspBody').scrollTop = 0;
    });
  });
  body.querySelectorAll('[data-task-id]').forEach((el) => {
    el.addEventListener('click', () => {
      const task = taskById[el.dataset.taskId];
      if (!task) return;
      selectTask(task);
      scrollTaskIntoView(task);
    });
  });
  const returnDefault = body.querySelector('[data-return-default]');
  if (returnDefault) returnDefault.addEventListener('click', () => {
    state.reportTab = 'overview';
    goOverview();
  });
  const drill = body.querySelector('[data-drill="bottleneck"]');
  if (drill) drill.addEventListener('click', () => selectWrap(SCENARIO.slowWrap));
}

function refreshFrameLayout() {
  window.requestAnimationFrame(() => {
    frameController?.refresh?.();
    layout();
  });
}

function bindTopPanelActions() {
  const railExplorerToggle = frameEl.querySelector('[data-ide-toggle="explorer"]');
  if (topExplorerToggle && railExplorerToggle) {
    const syncExplorerState = () => {
      const expanded = railExplorerToggle.getAttribute('aria-expanded') !== 'false';
      topExplorerToggle.classList.toggle('is-selected', expanded);
      topExplorerToggle.setAttribute('aria-expanded', String(expanded));
      topExplorerToggle.setAttribute('aria-pressed', String(expanded));
    };
    topExplorerToggle.addEventListener('click', () => railExplorerToggle.click());
    new MutationObserver(syncExplorerState).observe(railExplorerToggle, {
      attributes: true,
      attributeFilter: ['aria-expanded', 'aria-pressed', 'class'],
    });
    syncExplorerState();
  }

  if (topInspectorToggle && inspectorPane) {
    const setInspectorOpen = (open) => {
      inspectorPane.hidden = !open;
      const leftGutter = inspectorPane.previousElementSibling;
      if (leftGutter?.classList.contains('pto-workbench-shell__split-gutter')) {
        leftGutter.hidden = !open;
      }
      topInspectorToggle.classList.toggle('is-selected', open);
      topInspectorToggle.setAttribute('aria-expanded', String(open));
      topInspectorToggle.setAttribute('aria-pressed', String(open));
      refreshFrameLayout();
    };
    topInspectorToggle.addEventListener('click', () => setInspectorOpen(inspectorPane.hidden));
    setInspectorOpen(!inspectorPane.hidden);
  }
}

/* ============================================================
   10. 启动
   ============================================================ */
function init() {
  frameController = window.PtoIdeFrame?.init(frameEl, {
    splitOptions: {
      default: {
        onResize: () => window.requestAnimationFrame(() => layout()),
      },
    },
  });
  buildOrder();
  renderRunHistory();
  layout();
  renderInspector();
  bindTopPanelActions();
  if ('ResizeObserver' in window && canvasPane) {
    canvasResizeObserver = new ResizeObserver(() => window.requestAnimationFrame(() => layout()));
    canvasResizeObserver.observe(canvasPane);
  }
}
init();
</script>
