<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (() => {
      const theme = new URLSearchParams(location.search).get('theme');
      if (theme === 'light' || theme === 'dark' || theme === 'glass') {
        document.documentElement.dataset.theme = theme;
      }
      if (window.parent !== window) {
        document.documentElement.classList.add('is-embedded-frame');
      }
    })();
  </script>
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/foundation.css?v=2412220">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/semantic.css?v=2412220">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/components.css?v=2412220">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aic-core-object/pattern.css?v=2412220">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aiv-core-object/pattern.css?v=2412220">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/memory-architecture/pattern.css?v=ub-reuse-split-v6">
  <style>
    html,
    body {
      width: max-content;
      height: max-content;
      margin: 0;
      padding: 52px;
      overflow: hidden;
      color: var(--foreground, rgba(255, 255, 255, 0.9));
      font-family: var(--font-sans, Inter, "Source Han Sans SC", "PingFang SC", "Noto Sans SC", sans-serif);
      box-sizing: border-box;
    }

    html {
      min-width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--foreground, rgba(255, 255, 255, 0.9)) 14%, transparent) 1px, transparent 1.5px),
        linear-gradient(180deg, color-mix(in srgb, var(--foreground, rgba(255, 255, 255, 0.9)) 4%, transparent), transparent 46%),
        var(--background, #101010);
      background-size: 26px 26px, auto, auto;
      background-position: 0 0, 0 0, 0 0;
    }

    html[data-theme='light'] {
      background: #ffffff;
    }

    body {
      background: transparent;
    }

    #hardwareHost {
      width: max-content;
      height: max-content;
      overflow: visible;
    }

    #hardwareHost [data-pto-mem-arch="true"],
    #hardwareHost .pto-mem950 {
      min-width: 0;
    }

    #hardwareHost .pto-mem950__notes {
      display: none;
    }

    .hardware-frame-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md, 8px);
      background: color-mix(in srgb, var(--background-elevated, #101010) 88%, transparent);
      box-shadow: var(--shadow-md, 0 8px 24px rgba(0, 0, 0, 0.16));
      backdrop-filter: var(--surface-backdrop-filter-soft, none);
      -webkit-backdrop-filter: var(--surface-backdrop-filter-soft, none);
    }

    .is-embedded-frame .hardware-frame-controls {
      display: none;
    }

    .hardware-frame-theme-toggle {
      height: 28px;
      min-width: 52px;
      padding: 0 10px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm, 6px);
      background: color-mix(in srgb, var(--surface-2, #181818) 90%, transparent);
      color: var(--foreground-secondary, rgba(255, 255, 255, 0.72));
      font: var(--text-body-sm, 13px/1.3 system-ui);
      cursor: pointer;
    }

    .hardware-frame-theme-toggle:hover {
      color: var(--foreground, white);
      border-color: var(--border-default);
      background: var(--state-hover, rgba(255, 255, 255, 0.08));
    }

    .is-path-focused [data-aic-node],
    .is-path-focused [data-aiv-node],
    .is-path-focused [data-mem950-node^="rail:"] {
      opacity: 0.58;
      filter: saturate(0.68);
      transition: opacity 160ms ease, filter 160ms ease, outline-color 160ms ease;
    }

    .is-path-focused .is-hardware-active {
      opacity: 1 !important;
      filter: none !important;
      outline: 2px solid color-mix(in srgb, #ffaa3b 80%, white);
      outline-offset: 3px;
      box-shadow: 0 0 0 4px color-mix(in srgb, #ffaa3b 16%, transparent);
      position: relative;
      z-index: 8;
    }

    .is-path-focused .pto-mem950__overlay [data-route-id] {
      opacity: 0.18;
    }

    .is-path-focused .pto-mem950__overlay [data-route-default-hidden="true"] {
      opacity: 0.08;
    }

    .is-path-focused .pto-mem950__overlay [data-route-id].is-route-active {
      opacity: 1;
      filter: drop-shadow(0 0 7px color-mix(in srgb, #ffaa3b 72%, transparent));
    }

    .is-path-focused .pto-mem950__overlay [data-route-id].is-route-active path {
      stroke-width: 3;
    }

    .is-path-focused .pto-aiv-core__route {
      opacity: 0.18;
      filter: saturate(0.65);
    }

    .is-path-focused .pto-aiv-core__route.is-internal-route-active {
      opacity: 0.96;
      filter: drop-shadow(0 0 6px color-mix(in srgb, #ffaa3b 58%, transparent));
      stroke-width: 2.6;
    }

    .is-path-focused .pto-aic-core__route {
      opacity: 0.18;
      filter: saturate(0.65);
    }

    .is-path-focused .pto-aic-core__transport-pill {
      opacity: 0.18;
      filter: saturate(0.65);
    }

    .is-path-focused .pto-aic-core__route.is-internal-route-active {
      opacity: 0.96;
      filter: drop-shadow(0 0 6px color-mix(in srgb, #ffaa3b 58%, transparent));
      stroke-width: 2.6;
    }

    .is-path-focused .pto-aic-core__transport-pill.is-internal-route-active {
      opacity: 1;
      filter: drop-shadow(0 0 6px color-mix(in srgb, #ffaa3b 48%, transparent));
      background: #ffdf1f;
      border-color: #ffdf1f;
      color: #111111;
    }

    .has-instruction-focus .instruction-sequence-chip {
      opacity: 0.34;
      filter: saturate(0.62);
      transition: opacity 160ms ease, filter 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .has-instruction-focus .instruction-sequence-chip.is-instruction-active {
      opacity: 1;
      filter: none;
      border-color: color-mix(in srgb, #ffaa3b 76%, white);
      background: color-mix(in srgb, #ffaa3b 86%, white);
      color: #111111;
      box-shadow:
        0 0 0 1px color-mix(in srgb, #ffaa3b 34%, transparent),
        0 0 12px color-mix(in srgb, #ffaa3b 28%, transparent);
    }
  </style>
</head>
<body>
  <div class="hardware-frame-controls" aria-label="硬件图显示控制">
    <button class="hardware-frame-theme-toggle" id="frameThemeToggle" type="button" aria-pressed="false">浅色</button>
  </div>
  <div id="hardwareHost"></div>
  <script src="../vendor/pto-design-system/patterns/aiv-core-object/pattern.js?v=2412220"></script>
  <script src="../vendor/pto-design-system/patterns/aic-core-object/pattern.js?v=2412220"></script>
  <script src="../vendor/pto-design-system/patterns/memory-architecture/pattern.js?v=ub-reuse-split-v6"></script>
  <script>
    let overlay = null;
    let hoverInteractions = null;
    let activationInteractions = null;
    const INITIAL_PRESET = new URLSearchParams(location.search).get('preset');
    let currentPreset = (INITIAL_PRESET === 'ascend910b' || INITIAL_PRESET === 'ascend950b')
      ? INITIAL_PRESET
      : 'ascend950b';
    let detailsVisible = true;
    let aivFolded = false;
    let viewportScale = 1;
    let pendingFocus = { selectors: [], routes: [], instructionTags: [] };

    const qs = (selector, root = document) => root.querySelector(selector);
    const qsa = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    function normalizeTheme(value) {
      return value === 'light' ? 'light' : 'dark';
    }

    function syncFrameThemeToggle() {
      const button = qs('#frameThemeToggle');
      if (!button) return;
      const isLight = normalizeTheme(document.documentElement.dataset.theme) === 'light';
      button.textContent = isLight ? '深色' : '浅色';
      button.title = isLight ? '切换到深色模式' : '切换到浅色模式';
      button.setAttribute('aria-label', button.title);
      button.setAttribute('aria-pressed', isLight ? 'true' : 'false');
    }

    function setFrameTheme(theme) {
      document.documentElement.dataset.theme = normalizeTheme(theme);
      syncFrameThemeToggle();
      requestAnimationFrame(() => {
        overlay?.update?.();
        postSize();
      });
    }

    const BLEED = 52;
    function postSize(type = 'hardware-size') {
      const stage = qs('#hardwareHost .pto-mem950');
      if (!stage) return;
      const rect = stage.getBoundingClientRect();
      parent.postMessage({
        type,
        width: Math.ceil(rect.width) + BLEED * 2,
        height: Math.ceil(rect.height) + BLEED * 2,
      }, '*');
    }

    function activeRouteEndpoints(routeIds) {
      const preset = window.PtoMemoryArchitecturePattern?.presets?.[currentPreset];
      if (!preset) return [];
      return (preset.routes || [])
        .filter((route) => routeIds.includes(route.id))
        .flatMap((route) => [route.from, route.to])
        .filter(Boolean);
    }

    function clearFocus() {
      qsa('.is-hardware-active').forEach((el) => el.classList.remove('is-hardware-active'));
      qsa('.is-route-active').forEach((el) => el.classList.remove('is-route-active'));
      qsa('.is-internal-route-active').forEach((el) => el.classList.remove('is-internal-route-active'));
      qsa('.is-instruction-active').forEach((el) => el.classList.remove('is-instruction-active'));
    }

    function attrValue(value) {
      return String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function normalizeInstructionTag(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[_-]+/g, '');
    }

    function applyInternalRouteFocus(host) {
      qsa('.pto-aic-core__route[data-aic-route-from][data-aic-route-to]', host).forEach((routeEl) => {
        const core = routeEl.closest('.pto-aic-core');
        const fromEl = core?.querySelector(`[data-aic-node="${attrValue(routeEl.dataset.aicRouteFrom)}"]`);
        const toEl = core?.querySelector(`[data-aic-node="${attrValue(routeEl.dataset.aicRouteTo)}"]`);
        const isActive = Boolean(
          fromEl?.classList.contains('is-hardware-active') &&
          toEl?.classList.contains('is-hardware-active')
        );
        routeEl.classList.toggle('is-internal-route-active', isActive);
        if (isActive) {
          core?.querySelectorAll(`[data-aic-transport-to="${attrValue(routeEl.dataset.aicRouteTo)}"]`)
            .forEach((pill) => pill.classList.add('is-internal-route-active'));
        }
      });

      qsa('.pto-aiv-core__route[data-aiv-route-from][data-aiv-route-to]', host).forEach((routeEl) => {
        const core = routeEl.closest('.pto-aiv-core');
        const fromEl = core?.querySelector(`[data-aiv-node="${attrValue(routeEl.dataset.aivRouteFrom)}"]`);
        const toEl = core?.querySelector(`[data-aiv-node="${attrValue(routeEl.dataset.aivRouteTo)}"]`);
        const isActive = Boolean(
          fromEl?.classList.contains('is-hardware-active') &&
          toEl?.classList.contains('is-hardware-active')
        );
        routeEl.classList.toggle('is-internal-route-active', isActive);
      });
    }

    function applyInstructionFocus(host, instructionTags = []) {
      const tags = instructionTags.map(normalizeInstructionTag).filter(Boolean);
      host.classList.toggle('has-instruction-focus', tags.length > 0);
      if (tags.length === 0) return;
      qsa('.instruction-sequence-chip', host).forEach((chip) => {
        const text = normalizeInstructionTag(chip.textContent);
        const active = tags.some((tag) => text.includes(tag) || tag.includes(text));
        chip.classList.toggle('is-instruction-active', active);
      });
    }

    function applyFocus(selectors = [], routeIds = [], instructionTags = []) {
      const host = qs('#hardwareHost');
      clearFocus();
      host.classList.toggle('is-path-focused', selectors.length > 0 || routeIds.length > 0);

      [...selectors, ...activeRouteEndpoints(routeIds)].forEach((selector) => {
        qsa(selector, host).forEach((el) => el.classList.add('is-hardware-active'));
      });

      routeIds.forEach((routeId) => {
        qsa(`[data-route-id="${routeId}"]`, host).forEach((el) => el.classList.add('is-route-active'));
      });

      applyInternalRouteFocus(host);
      applyInstructionFocus(host, instructionTags);
    }

    function applyAivFolded(folded = false) {
      const host = qs('#hardwareHost');
      aivFolded = folded === true;
      window.PtoMemoryArchitecturePattern?.setAivFolded?.(host, aivFolded);
      requestAnimationFrame(() => overlay?.update?.());
    }

    function setTooltipViewportScale(scale = 1) {
      const numericScale = Number(scale);
      viewportScale = Number.isFinite(numericScale) && numericScale > 0 ? numericScale : 1;
      hoverInteractions?.setViewportScale?.(viewportScale);
    }

    function render() {
      const host = qs('#hardwareHost');
      overlay?.destroy?.();
      hoverInteractions?.destroy?.();
      activationInteractions?.destroy?.();
      window.PtoMemoryArchitecturePattern.renderArchitecture(host, currentPreset);
      overlay = window.PtoMemoryArchitecturePattern.createRouteOverlay(host, currentPreset);
      hoverInteractions = window.PtoMemoryArchitecturePattern.attachHoverInteractions(host, currentPreset, { viewportScale });
      activationInteractions = window.PtoMemoryArchitecturePattern.attachNodeActivation?.(host, currentPreset, {
        selector: '[data-aiv-node="buffer:UB"]',
        label: (target, detail) => `Open ${detail.coreTitle || detail.coreId} UB memory reuse analysis`,
        onActivate: (target, detail) => {
          parent.postMessage({
            type: 'hardware-node-activate',
            node: detail.node,
            buffer: detail.buffer,
            coreId: detail.coreId,
            coreKind: detail.coreKind,
            coreTitle: detail.coreTitle,
            preset: currentPreset,
          }, '*');
        },
      });
      window.PtoMemoryArchitecturePattern.setDetailVisibility(host, detailsVisible);
      applyAivFolded(aivFolded);
      requestAnimationFrame(() => {
        overlay?.update?.();
        applyFocus(pendingFocus.selectors, pendingFocus.routes, pendingFocus.instructionTags);
        requestAnimationFrame(() => {
          postSize('hardware-ready');
        });
      });
    }

    window.addEventListener('message', (event) => {
      if (!event.data) return;
      if (event.data.type === 'hardware-arch-change') {
        const nextPreset = event.data.preset || 'ascend950b';
        if (nextPreset === currentPreset) return;
        currentPreset = nextPreset;
        render();
        return;
      }
      if (event.data.type === 'hardware-details') {
        detailsVisible = event.data.visible !== false;
        window.PtoMemoryArchitecturePattern.setDetailVisibility(qs('#hardwareHost'), detailsVisible);
        requestAnimationFrame(() => {
          overlay?.update?.();
          postSize();
        });
        return;
      }
      if (event.data.type === 'hardware-scale') {
        setTooltipViewportScale(event.data.scale);
        return;
      }
      if (event.data.type === 'hardware-aiv-fold') {
        applyAivFolded(event.data.folded);
        requestAnimationFrame(() => {
          overlay?.update?.();
          postSize();
        });
        return;
      }
      if (event.data.type !== 'hardware-focus') return;
      pendingFocus = {
        selectors: event.data.selectors || [],
        routes: event.data.routes || [],
        instructionTags: event.data.instructionTags || []
      };
      if (Object.prototype.hasOwnProperty.call(event.data, 'foldAiv')) {
        applyAivFolded(event.data.foldAiv);
      }
      applyFocus(pendingFocus.selectors, pendingFocus.routes, pendingFocus.instructionTags);
      requestAnimationFrame(() => {
        overlay?.update?.();
        postSize();
      });
    });

    window.addEventListener('resize', () => postSize());
    qs('#frameThemeToggle')?.addEventListener('click', () => {
      setFrameTheme(normalizeTheme(document.documentElement.dataset.theme) === 'light' ? 'dark' : 'light');
    });

    syncFrameThemeToggle();
    render();
    if (document.fonts && typeof document.fonts.ready?.then === 'function') {
      document.fonts.ready.then(() => {
        overlay?.update?.();
        postSize();
      });
    }
  </script>
</body>
</html>
