<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 96 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Ascend / CANN 约束映射图</title>
  <desc id="desc">展示 CANN 软件栈、workload semantics、网表约束和物理布局布线之间的映射关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2d3748"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f6f7fb; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .laneTitle { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .note { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7c2d12; }
      .card { fill: #ffffff; stroke: #d8e0ec; stroke-width: 1.4; rx: 12; filter: url(#shadow); }
      .box { fill: #f8fafc; stroke: #d8e0ec; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #2d3748; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .accent1 { fill: #eff6ff; stroke: #bfdbfe; }
      .accent2 { fill: #ecfdf5; stroke: #bbf7d0; }
      .accent3 { fill: #fff7ed; stroke: #fed7aa; }
      .accent4 { fill: #f5f3ff; stroke: #ddd6fe; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <rect class="card" x="64" y="150" width="250" height="470"/>
  <text class="laneTitle" x="92" y="190">CANN Stack</text>
  <rect class="box accent1" x="92" y="222" width="194" height="52"/>
  <text class="label" x="112" y="254">Graph Engine</text>
  <rect class="box accent1" x="92" y="292" width="194" height="52"/>
  <text class="label" x="112" y="324">Ascend C / Operators</text>
  <rect class="box accent1" x="92" y="362" width="194" height="52"/>
  <text class="label" x="112" y="394">Communication Library</text>
  <rect class="box accent1" x="92" y="432" width="194" height="52"/>
  <text class="label" x="112" y="464">Runtime / Driver</text>
  <rect class="box accent1" x="92" y="502" width="194" height="52"/>
  <text class="label" x="112" y="534">Profiling / Tuning</text>

  <path class="arrow" d="M320 385 C362 385 374 385 414 385"/>

  <rect class="card" x="420" y="150" width="250" height="470"/>
  <text class="laneTitle" x="448" y="190">Workload Semantics</text>
  <rect class="box accent2" x="448" y="222" width="194" height="52"/>
  <text class="label" x="468" y="254">Operator Fusion</text>
  <rect class="box accent2" x="448" y="292" width="194" height="52"/>
  <text class="label" x="468" y="324">Traffic Matrix</text>
  <rect class="box accent2" x="448" y="362" width="194" height="52"/>
  <text class="label" x="468" y="394">Memory Locality</text>
  <rect class="box accent2" x="448" y="432" width="194" height="52"/>
  <text class="label" x="468" y="464">AllReduce Pattern</text>
  <rect class="box accent2" x="448" y="502" width="194" height="52"/>
  <text class="label" x="468" y="534">Latency Budget</text>

  <path class="arrow" d="M676 385 C718 385 730 385 770 385"/>

  <rect class="card" x="776" y="150" width="250" height="470"/>
  <text class="laneTitle" x="804" y="190">Netlist Constraints</text>
  <rect class="box accent3" x="804" y="222" width="194" height="52"/>
  <text class="label" x="824" y="254">Net Weights</text>
  <rect class="box accent3" x="804" y="292" width="194" height="52"/>
  <text class="label" x="824" y="324">Bandwidth Classes</text>
  <rect class="box accent3" x="804" y="362" width="194" height="52"/>
  <text class="label" x="824" y="394">Placement Regions</text>
  <rect class="box accent3" x="804" y="432" width="194" height="52"/>
  <text class="label" x="824" y="464">Routing Priority</text>
  <rect class="box accent3" x="804" y="502" width="194" height="52"/>
  <text class="label" x="824" y="534">Power / Clock Domains</text>

  <path class="arrow" d="M1032 385 C1074 385 1086 385 1126 385"/>

  <rect class="card" x="1132" y="150" width="90" height="470"/>
  <text class="laneTitle" x="1148" y="190">P&amp;R</text>
  <rect class="box accent4" x="1150" y="226" width="54" height="48"/>
  <text class="small" x="1158" y="255">Floor</text>
  <rect class="box accent4" x="1150" y="304" width="54" height="48"/>
  <text class="small" x="1157" y="333">Place</text>
  <rect class="box accent4" x="1150" y="382" width="54" height="48"/>
  <text class="small" x="1160" y="411">CTS</text>
  <rect class="box accent4" x="1150" y="460" width="54" height="48"/>
  <text class="small" x="1154" y="489">Route</text>
  <rect class="box accent4" x="1150" y="538" width="54" height="48"/>
  <text class="small" x="1156" y="567">Check</text>

  <path class="dash" d="M1176 626 C1040 698 762 698 546 626"/>
  <text class="small" x="632" y="694">QoR feedback: timing / congestion / IR drop / EM / thermal</text>

  <rect x="64" y="652" width="548" height="52" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="note" x="88" y="684">边界说明：公开资料不包含 Ascend 910B/950 版图级 netlist、PDK 或真实 floorplan；此图表达的是可公开推导的约束映射方法。</text>
</svg>
