<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 96 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">网表到图算法的抽象图</title>
  <desc id="desc">展示芯片网表如何抽象为图或超图，用于自动布局、布线和优化算法。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f3a4a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f6f7fb; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .section { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #d9e0ea; stroke-width: 1.4; rx: 12; filter: url(#shadow); }
      .pill { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; rx: 16; }
      .arrow { stroke: #2f3a4a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .softArrow { stroke: #718096; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .node { fill: #2563eb; stroke: #ffffff; stroke-width: 4; }
      .macro { fill: #0f766e; stroke: #ffffff; stroke-width: 4; }
      .clock { fill: #7c3aed; stroke: #ffffff; stroke-width: 4; }
      .net { stroke: #f97316; stroke-width: 4; fill: none; stroke-linecap: round; }
      .hyper { fill: none; stroke: #f97316; stroke-width: 3; stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <rect class="card" x="64" y="150" width="320" height="500"/>
  <text class="section" x="92" y="192">Netlist Objects</text>

  <rect class="pill" x="92" y="222" width="236" height="48"/>
  <text class="label" x="116" y="253">Instance / Cell / Macro</text>
  <text class="small" x="116" y="292">标准单元、寄存器、SRAM、NoC router</text>

  <rect class="pill" x="92" y="328" width="236" height="48"/>
  <text class="label" x="116" y="359">Net / Bus / Clock</text>
  <text class="small" x="116" y="398">连接、总线、时钟树、跨域路径</text>

  <rect class="pill" x="92" y="434" width="236" height="48"/>
  <text class="label" x="116" y="465">Constraints</text>
  <text class="small" x="116" y="504">SDC、功耗域、时钟域、物理区域</text>

  <rect class="pill" x="92" y="540" width="236" height="48"/>
  <text class="label" x="116" y="571">Runtime Semantics</text>
  <text class="small" x="116" y="610">traffic、reuse、bandwidth、hot path</text>

  <path class="arrow" d="M390 400 C445 400 455 400 505 400"/>

  <rect class="card" x="512" y="150" width="320" height="500"/>
  <text class="section" x="540" y="192">Graph / Hypergraph Model</text>

  <path class="hyper" d="M622 303 C650 260 725 260 753 303 C785 350 748 424 690 426 C630 428 590 352 622 303 Z"/>
  <path class="net" d="M650 330 C680 310 710 310 740 330"/>
  <path class="net" d="M650 330 C653 375 680 392 710 388"/>
  <path class="net" d="M740 330 C744 368 730 388 710 388"/>

  <circle class="node" cx="650" cy="330" r="34"/>
  <text class="tiny" x="632" y="335">Cell</text>
  <circle class="macro" cx="740" cy="330" r="34"/>
  <text class="tiny" x="716" y="335">Macro</text>
  <circle class="node" cx="710" cy="388" r="34"/>
  <text class="tiny" x="690" y="393">Reg</text>
  <circle class="clock" cx="675" cy="255" r="28"/>
  <text class="tiny" x="658" y="260">CLK</text>
  <path class="softArrow" d="M675 283 C670 296 660 309 650 330"/>
  <path class="softArrow" d="M675 283 C699 300 724 312 740 330"/>

  <text class="small" x="550" y="482">节点 = instance / macro / register</text>
  <text class="small" x="550" y="512">超边 = multi-pin net / bus / clock domain</text>
  <text class="small" x="550" y="542">权重 = timing + traffic + congestion + power</text>
  <text class="small" x="550" y="572">属性 = area、domain、fixed、halo、affinity</text>

  <path class="arrow" d="M838 400 C895 400 905 400 956 400"/>

  <rect class="card" x="960" y="150" width="256" height="500"/>
  <text class="section" x="988" y="192">Optimization Outputs</text>

  <text class="label" x="992" y="248">Placement</text>
  <text class="small" x="992" y="276">cluster / region / density</text>
  <line x1="992" y1="296" x2="1184" y2="296" stroke="#d9e0ea"/>

  <text class="label" x="992" y="342">Routing</text>
  <text class="small" x="992" y="370">guides / layers / congestion</text>
  <line x1="992" y1="390" x2="1184" y2="390" stroke="#d9e0ea"/>

  <text class="label" x="992" y="436">Timing</text>
  <text class="small" x="992" y="464">critical path / slack repair</text>
  <line x1="992" y1="484" x2="1184" y2="484" stroke="#d9e0ea"/>

  <text class="label" x="992" y="530">Reliability</text>
  <text class="small" x="992" y="558">IR drop / EM / thermal hot spot</text>

  <text class="small" x="64" y="708">核心映射：Instance / Cell / Macro → Node；Net / Bus / Clock → Hyperedge；Timing / Traffic → Edge Weight；Power / Clock Domain → Node Attribute。</text>
</svg>
